# vicsek_swirl -- Vicsek active matter (radius_graph + alignment + cruise): chiral self-propulsion -> rotating swirls
# Reproduces a prototype/well active-matter regime. Refs: Vicsek et al., PRL 75 (1995);
# The Well (Ohana et al., NeurIPS 2024). Chirality on.
general: {name: vicsek_swirl, seed: 0, n_frames: 1200, dt: 0.25, boundary: periodic}
sets:
  particle:
    n: 2000
    vel_init: 0.005
fields: {}
operators:
  - {op: radius_graph, at: particle, radius: 0.05}
  - {op: alignment,    at: particle, a: 0.5}          # Vicsek nominal (gate=none, per_type=false)
  - {op: cruise,  at: particle, v0: 0.005, noise: 0.002, chirality: 0.05}
schedule: [radius_graph, alignment, cruise]
plotting:
  background: black
  marker: triangle
  triangle_size: 0.01
  colormap: tab10

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation shows a collection of blue triangular particles moving in a complex, fluid-like
      motion. Over time, the particles appear to flow and swirl, forming dense clusters and sparse regions.
      The movement suggests a dynamic system governed by underlying physical forces or agent-based rules.
      The overall pattern evolves while maintaining a consistent distribution of density and orientation.
    objects: The scene contains numerous small, blue triangular particles distributed across a black background.
      These objects are arranged in irregular, swirling clusters that vary in density throughout the space.
      Each triangle is uniform in size and color, appearing as thin outlines. The particles are not connected
      but move collectively to form large-scale structures.
