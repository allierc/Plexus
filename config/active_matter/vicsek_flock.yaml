# vicsek_flock -- Vicsek active matter (radius_graph + alignment + cruise): low noise -> polar order (phi->1)
# Reproduces a prototype/well active-matter regime. Refs: Vicsek et al., PRL 75 (1995);
# The Well (Ohana et al., NeurIPS 2024). Ordered flock.
general: {name: vicsek_flock, seed: 0, n_frames: 1200, dt: 0.25, boundary: periodic}
sets:
  particle:
    n: 2000
    vel_init: 0.005
fields: {}
operators:
  - {op: radius_graph, at: particle, radius: 0.05}
  - {op: alignment,    at: particle, a: 0.5}          # Vicsek nominal (gate=none, per_type=false)
  - {op: cruise,  at: particle, v0: 0.005, noise: 0.001, chirality: 0.0}
schedule: [radius_graph, alignment, cruise]
plotting:
  background: black
  marker: triangle
  triangle_size: 0.01
  colormap: tab10

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation shows a collection of blue triangular particles moving in a complex, fluid-like
      motion. Over time, the particles form swirling patterns and dense clusters that shift and evolve
      across the black background. The flow exhibits turbulent characteristics, with some areas showing
      high concentration and others remaining sparse. The overall movement suggests a dynamic system governed
      by collective behavior or fluid dynamics.
    objects: The scene contains numerous small, blue triangular particles distributed across a black field.
      These particles are arranged in irregular, swirling clusters and elongated filaments that suggest
      a flow field. Each individual triangle is uniform in size and color, providing a consistent visual
      representation of the data. The topology of the objects changes as they aggregate into dense regions
      and disperse into more scattered formations.
