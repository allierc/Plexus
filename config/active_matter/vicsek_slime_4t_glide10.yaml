# NOISE SWEEP variant -- glide translational-noise = 0.010.
# vicsek_slime_4t -- a MIX of vicsek_4t (active matter) and slime_four (Physarum):
# four species rendered as oriented triangles (the active-matter marker), each one
# FLOWING ALONG ITS OWN SLIME TRAIL. The slime mechanism does the steering: every
# type deposits into its own field channel (deposit), the trail diffuses + decays,
# and `sense` (cross=-1) makes a type follow its OWN channel and avoid the others --
# so the four colours self-organise into four interleaving transport networks, with
# the triangles streaming along them. Heading-kinematic (sense->glide, 1st order):
# the same paradigm as slime, so triangles orient along the heading they are steered.
# Periodic (toroidal) world: particles wrap, and the chemical field wraps with them
# (diffuse uses circular padding, sense wraps its window) -- so the trail networks are
# seamless across every edge. No `bounce`: there are no walls on a torus.
# Refs: Vicsek et al., PRL 75 (1995); Jones/Physarum (Jones, Artif. Life 2010).
general: {name: vicsek_slime_4t_glide10, seed: 0, n_frames: 1200, dt: 1.0, boundary: periodic}
sets:
  cell:
    n: 9000
    spawn: random
    types:
      a: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      d: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.024}
- {op: diffuse, at: chemical, rate: 0.013}
- {op: decay,   at: chemical, rate: 0.002}
- {op: sense,   at: cell, from: chemical, cross: -1.0, noise: 1.0}   # follow own trail, avoid the others
- {op: glide,   at: cell, noise: 0.010}
schedule: [deposit, diffuse, decay, sense, glide]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
  background: black
  marker: triangle
  triangle_size: 0.009
  gamma: 0.7
  overlay: true        # extra movie: the trail field with the triangles streaming on top

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a dense collection of small, multi-colored particles moving in a
      complex, fluid-like motion. Over time, the particles appear to form and dissolve transient clusters
      or filaments of similar colors. The overall distribution remains relatively uniform, but local density
      fluctuations create a shimmering, turbulent effect. The motion is continuous and stochastic, with
      no single large-scale structure emerging or disappearing.
    objects: The scene contains thousands of tiny, irregular, and jagged particles scattered across a
      black background. These particles are colored in distinct shades of red, green, blue, and yellow.
      They are arranged in a disordered, high-density state where they frequently overlap and interact.
      Each individual particle is very small and maintains a consistent size throughout the entire simulation.
  movie_chemical:
    description: The simulation shows a collection of elongated, worm-like structures moving and twisting
      in a fluid-like motion. Over time, these filaments appear to undergo continuous deformation, stretching
      and curving as they interact with one another. The movement is dynamic, with the structures shifting
      positions and changing their orientations within the frame. The overall evolution suggests a complex,
      interconnected system of flowing filaments.
    objects: The scene contains multiple elongated, filamentary objects that are distributed throughout
      the space. These objects are colored in distinct shades of red, green, blue, and yellow. They are
      arranged in a dense, overlapping network where they appear to intertwine and bend around each other.
      Each filament varies slightly in length and thickness, maintaining a consistent worm-like topology.
  movie_overlay_chemical:
    description: The simulation shows a dense collection of small, multi-colored particles moving in a
      complex, chaotic manner. Over time, these particles appear to form larger, elongated, and somewhat
      fluid-like structures that shift and morph. These larger structures exhibit distinct colors, including
      red, blue, green, and yellow, and they seem to flow and interact with one another. The overall motion
      is turbulent, with the structures constantly changing shape and position while maintaining a high
      level of local density.
    objects: The scene contains thousands of tiny, individual particles that are scattered throughout
      the entire frame. These particles are colored in primary and secondary hues, specifically red, blue,
      green, and yellow. They aggregate into larger, elongated, and worm-like structures that appear to
      be connected or flowing together. These larger structures vary in size and length, with some being
      quite long and others appearing as smaller, more compact clusters.
