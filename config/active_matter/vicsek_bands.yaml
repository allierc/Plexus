# vicsek_bands -- Vicsek active matter (radius_graph + alignment + cruise): near-critical, dense -> travelling bands
# Reproduces a prototype/well active-matter regime. Refs: Vicsek et al., PRL 75 (1995);
# The Well (Ohana et al., NeurIPS 2024). Coexistence.
general: {name: vicsek_bands, seed: 0, n_frames: 1200, dt: 0.25, boundary: periodic}
sets:
  particle:
    n: 4000
    vel_init: 0.005
fields: {}
operators:
  - {op: radius_graph, at: particle, radius: 0.05}
  - {op: alignment,    at: particle, a: 0.5}          # Vicsek nominal (gate=none, per_type=false)
  - {op: cruise,  at: particle, v0: 0.005, noise: 0.0021, chirality: 0.0}
schedule: [radius_graph, alignment, cruise]
plotting:
  background: black
  marker: triangle
  triangle_size: 0.01
  colormap: tab10

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation shows a collection of blue triangular particles moving in a complex, fluid-like
      motion. Over time, the particles form swirling, turbulent structures that resemble vortices or eddies
      in a liquid. These clusters shift and merge as they flow across the black background, creating a
      dynamic sense of motion. The overall pattern evolves from a relatively uniform distribution into
      distinct, organized flow patterns.
    objects: The scene contains thousands of small, blue triangular particles. These particles are arranged
      in dense, swirling clusters that form interconnected, filamentary structures. Each individual triangle
      is uniform in size and color, appearing as a bright blue outline against the black void. The topology
      of the objects is characterized by high-density regions of flow and sparse areas of low concentration.
