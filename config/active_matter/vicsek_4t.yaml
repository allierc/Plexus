# vicsek_4t -- multi-species Vicsek active matter: 4 types with DIFFERENT per-type alignment
# strengths (the boids special case of `alignment`, per_type: true) + shared cruise.
# Strong-alignment species flock; weak ones stay a disordered gas -- coloured by species.
# Refs: Vicsek et al., PRL 75 (1995); The Well (Ohana et al., NeurIPS 2024).
general: {name: vicsek_4t, seed: 0, n_frames: 1200, dt: 0.25, boundary: periodic}
sets:
  particle:
    n: 3000
    vel_init: 0.005
    types:
      t0: {fraction: 0.25, alignment: 1.0}
      t1: {fraction: 0.25, alignment: 0.7}
      t2: {fraction: 0.25, alignment: 0.4}
      t3: {fraction: 0.25, alignment: 0.1}
fields: {}
operators:
  - {op: radius_graph, at: particle, radius: 0.05}
  - {op: alignment,    at: particle, a: 0.6, per_type: true}   # boids special case: per-type weight
  - {op: cruise,  at: particle, v0: 0.005, noise: 0.0015}
schedule: [radius_graph, alignment, cruise]
plotting: {background: black, marker: triangle, triangle_size: 0.01, colormap: tab10}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation shows a collection of small, multi-colored particles moving in a complex,
      fluid-like motion. Over time, the particles appear to form and dissolve into dense, swirling clusters
      or filaments. These structures shift and evolve, exhibiting dynamic interactions that suggest a
      turbulent or self-organizing flow. The overall movement is continuous, with the density of the clusters
      fluctuating as they migrate across the frame.
    objects: The scene contains thousands of tiny, triangular or wedge-shaped particles scattered across
      a black background. These objects are colored in a mix of red, green, blue, and yellow, often appearing
      in close proximity to one another. They are arranged in loose, elongated clusters that resemble
      turbulent eddies or filaments in a fluid. Each individual particle is very small and uniform in
      size, but their collective arrangement creates large, complex topological structures.
