# vicsek_disorder -- Vicsek active matter (radius_graph + alignment + cruise): high noise -> disorder (phi->0)
# Reproduces a prototype/well active-matter regime. Refs: Vicsek et al., PRL 75 (1995);
# The Well (Ohana et al., NeurIPS 2024). Disordered gas.
general: {name: vicsek_disorder, seed: 0, n_frames: 1200, dt: 0.25, boundary: periodic}
sets:
  particle:
    n: 2000
    vel_init: 0.005
fields: {}
operators:
  - {op: radius_graph, at: particle, radius: 0.05}
  - {op: alignment,    at: particle, a: 0.5}          # Vicsek nominal (gate=none, per_type=false)
  - {op: cruise,  at: particle, v0: 0.005, noise: 0.015, chirality: 0.0}
schedule: [radius_graph, alignment, cruise]
plotting:
  background: black
  marker: triangle
  triangle_size: 0.01
  colormap: tab10

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The video shows a static distribution of blue geometric shapes on a black background.
      There is no visible movement or evolution of the particles between the frames. The spatial arrangement
      of the elements remains constant throughout the entire sequence. The simulation appears to be a
      steady-state representation of a granular or particle system.
    objects: The scene contains numerous small, blue, triangular and linear geometric shapes. These objects
      are distributed randomly across the entire frame without any specific connectivity or clustering.
      Each individual element is very small in size relative to the overall canvas. The uniform blue color
      of the shapes contrasts sharply against the solid black background.
