# Coulomb_3_3d -- Coulomb (electrostatic inverse-square) in a periodic 3D box.
# charges [2, 1, -1]; ported from ParticleGraph Coulomb (PDE_E).
# Coulomb is 2nd-derivative + add-aggregated; like charges repel, opposite attract.
# `charge` is a per-type parameter (electron/proton = types, per the Plexus type rule);
# the engine broadcasts it to a per-particle buffer the operator reads.
general: {name: Coulomb_3_3d, seed: 0, n_frames: 32000, dt: 0.0000015, boundary: free, dim: 3, world: [1.0, 1.0, 1.0]}
sets:
  particle:
    n: 960
    vel_init: 0.0001
    types:
      q_p2: {fraction: 0.3333, charge: 2}
      q_p1: {fraction: 0.3333, charge: 1}
      q_n1: {fraction: 0.3334, charge: -1}
fields: {}
operators:
  - {op: radius_graph, at: particle, radius: 0.15, min_radius: 0.001}
  - {op: Coulomb,      at: particle, clamp: 1000000.0}
schedule: [radius_graph, Coulomb]
plotting:
  background: black
  size_by: charge          # point size ~ |charge|
  colors:                  # ParticleGraph PDE_E colour code (by type index)
    q_p2: [1, 1, 1]
    q_p1: [0, 0.5, 0.75]
    q_n1: [1, 0, 0]
  splat_size: 1.9
  splat_res: 820

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: A dense cluster of particles is centered in a black void. Over time, the cluster expands
      outward as the particles move away from the center. The expansion appears relatively uniform, with
      the overall shape maintaining a roughly circular or diamond-like distribution. By the final frame,
      the particles are more dispersed than they were at the beginning.
    objects: 'The scene contains a large number of small, point-like particles. These particles are colored
      in three distinct shades: white, red, and blue. They are arranged in a dense, stochastic cluster
      that lacks a rigid geometric structure. Each individual particle is uniform in size and appears
      as a single pixel or small dot.'
