# Full match to ParticleGraph arbitrary_3_1: 3 types, 30000 particles, sigma=0.005,
# max_radius=0.075, periodic, first_derivative, dt=0.1, 250 frames. Now feasible
# because attraction_repulsion runs on a radius neighbour graph (O(E)), not dense.
general:
  name: arbitrary_3
  seed: 0
  n_frames: 250
  dt: 0.1
  boundary: periodic

sets:
  particle:
    n: 30000
    types:
      t0: {fraction: 0.34, p: [1.6233, 1.0413, 1.6012, 1.5615]}
      t1: {fraction: 0.33, p: [1.7667, 1.8308, 1.0855, 1.9055]}
      t2: {fraction: 0.33, p: [1.7226, 1.7850, 1.0584, 1.8579]}

fields: {}

operators:
  - {op: radius_graph,         at: particle, radius: 0.075}
  - {op: attraction_repulsion, at: particle, sigma: 0.005}

schedule: [radius_graph, attraction_repulsion]

plotting:                      # render STYLE (read by plexus.plot; engine ignores it)
  background: black
  colormap: tab10
  point_size: 2.0

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation begins with a dense, uniform distribution of multicolored particles across
      the entire field. Over time, the particles begin to aggregate into distinct, circular clusters with
      dark centers. These clusters grow in size and number as the particles organize into a cellular-like
      structure. By the final frame, the particles have formed a highly structured network of interconnected
      circular domains.
    objects: The scene contains thousands of tiny, individual particles in blue, green, and orange. These
      particles are initially scattered randomly but eventually form large, circular clusters. Each cluster
      features a dark, empty center surrounded by a dense ring of multicolored particles. The final topology
      consists of a repeating, honeycomb-like pattern of these interconnected circular structures.
