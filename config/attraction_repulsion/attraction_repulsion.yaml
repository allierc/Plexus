# Analytic attraction-repulsion with per-type interaction parameters.
# Each type carries p = [p1, p2, p3, p4]: the difference-of-Gaussians force law
#   f(r) = p1*exp(-r^(2 p2)/2sigma^2) - p3*exp(-r^(2 p4)/2sigma^2)
# summed over neighbours within `radius`. First-derivative law (returns velocity).
general:
  name: attraction_repulsion
  seed: 0
  n_frames: 250
  dt: 0.05
  boundary: periodic           # torus: minimum-image displacement in the force

sets:
  particle:
    n: 1200
    types:                            # three populations, each its own force law
      t0: {fraction: 0.34, p: [1.3453, 1.5175, 1.1073, 1.0233]}
      t1: {fraction: 0.33, p: [1.9893, 1.2029, 1.7467, 1.2261]}
      t2: {fraction: 0.33, p: [1.7790, 1.7066, 1.7218, 1.0976]}

fields: {}

operators:
  - {op: radius_graph,         at: particle, radius: 0.075}   # rebuild neighbour graph
  - {op: attraction_repulsion, at: particle, sigma: 0.005}    # message pass over it

schedule: [radius_graph, attraction_repulsion]

plotting:
  background: black

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The video shows a static field of multicolored particles against a black background.
      There is no visible movement or evolution of the particles between the four keyframes. The distribution
      of the dots remains constant throughout the sequence. The scene represents a steady-state distribution
      of discrete points.
    objects: 'The scene contains thousands of small, circular dots scattered across the frame. These particles
      are arranged in a random, non-connected distribution with no discernible patterns. The dots appear
      in three distinct colors: orange, blue, and green. Each particle is uniform in size and maintains
      a consistent diameter throughout the video.'
