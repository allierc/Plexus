# Exact reproduction of the ParticleGraph reference dataset
# graphs_data/arbitrary/arbitrary: 4800 particles, 3 types (1600 each), 1000
# frames, sigma=0.005, max_radius=0.075, dt=0.025, periodic, first_derivative,
# mean aggregation. With identical initial conditions the trajectory should match.
general:
  name: arbitrary_repro
  seed: 0
  n_frames: 1000
  dt: 0.025
  boundary: periodic

sets:
  particle:
    n: 4800
    types:
      t0: {fraction: 0.3333333, p: [1.6233, 1.0413, 1.6012, 1.5615]}
      t1: {fraction: 0.3333333, p: [1.7667, 1.8308, 1.0855, 1.9055]}
      t2: {fraction: 0.3333334, p: [1.7226, 1.7850, 1.0584, 1.8579]}

fields: {}

operators:
  - {op: radius_graph,         at: particle, radius: 0.075}
  - {op: attraction_repulsion, at: particle, sigma: 0.005, aggr: mean}

schedule: [radius_graph, attraction_repulsion]

plotting:
  background: black
  colormap: tab10
  point_size: 4.0

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation shows a large number of small particles distributed across a black background.
      Over time, the particles appear to move and shift their positions slightly, creating a flickering
      effect. There is no significant global movement or large-scale structural change visible between
      the frames. The overall density and distribution of the particles remain relatively constant throughout
      the sequence.
    objects: The scene contains thousands of tiny, point-like particles scattered randomly across the
      frame. These particles are primarily colored in shades of blue, orange, and green. They are arranged
      in a sparse, non-connected distribution with no clear geometric patterns or clusters. Each individual
      particle is uniform in size and maintains a consistent appearance across all time steps.
