# boids_rand_24t_3d -- 3D variant of boids_rand_24t: the three flocking rules (cohesion /
# alignment / separation) in a periodic 3D box. The rules are dimension-generic
# (neighbour_mean is N-D; SUPPORTED_DIMS=[2,3]); only the container changes
# (dim: 3, world: [1,1,1]). Interaction radius bumped 0.1 (from 0.04) so 3D
# neighbour counts (~density*(4/3)pi r^3) match the 2D sweep; weights unchanged.
general: {name: boids_rand_24t_3d, seed: 0, n_frames: 16000, dt: 0.5, boundary: periodic, dim: 3, world: [1.0, 1.0, 1.0]}
sets:
  particle:
    n: 16384
    vel_init: 0.0004
    types:
      t00: {fraction: 0.041667, cohesion: 38.2, alignment: 2.4, separation: 83.3}
