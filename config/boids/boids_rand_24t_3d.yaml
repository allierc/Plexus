fields: {}
operators:
  - {op: radius_graph, at: particle, radius: 0.1, min_radius: 0.005}
  - {op: cohesion,     at: particle}
  - {op: alignment,    at: particle}
  - {op: separation,   at: particle}
schedule: [radius_graph, cohesion, alignment, separation]
plotting:
  background: black
  colormap: tab20
  point_size: 6

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation begins with a dense, uniform cloud of multicolored particles distributed
      across a diamond-shaped area. Over time, the particles begin to aggregate into distinct, spherical
      clusters while the background density decreases. These clusters grow in size and become more defined
      as the surrounding individual particles are pulled into them. By the final frame, the system has
      transitioned from a homogeneous distribution to a collection of large, concentrated masses separated
      by a sparse field of remaining particles.
    objects: The scene contains thousands of small, individual particles that are primarily cyan, orange,
      and white in color. These particles are initially arranged in a loose, high-density cloud that fills
      a central diamond-shaped region. As the simulation progresses, the particles organize into several
      large, spherical clusters that appear as dense, multi-colored masses. These clusters vary in size
      and are distributed somewhat evenly throughout the central area, surrounded by a thinning mist of
      individual points.
