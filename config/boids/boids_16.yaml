# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation begins with a dense, uniform distribution of multi-colored particles across
      a black background. Over time, the particles begin to aggregate into distinct, high-density clusters
      while leaving large voids in the center. These clusters grow in size and complexity as they move
      and merge with one another. By the final frame, the particles have organized into several large,
      concentrated circular formations surrounded by a sparse field of scattered points.
    objects: The scene contains thousands of small, circular particles of varying colors including white,
      red, blue, green, and orange. Initially, these objects are distributed randomly and independently
      across the entire 2D space. As the simulation progresses, the particles form dense, circular topologies
      where they are packed closely together. The size of each individual particle remains constant, but
      the collective size of the clusters increases significantly over time.
