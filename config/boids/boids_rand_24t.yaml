# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_particle:
    description: The simulation begins with a sparse distribution of multicolored particles scattered
      across a black background. Over time, the density of these particles increases significantly as
      they populate the entire frame. The particles appear to move and redistribute, maintaining a relatively
      uniform but stochastic spatial arrangement. By the final frame, the field is densely packed with
      a high concentration of points across the entire area.
    objects: The scene contains thousands of small, circular particles distributed throughout the 2D space.
      These particles are arranged in a stochastic, non-connected topology with no visible clustering
      or patterns. They feature a diverse color palette including shades of blue, orange, yellow, green,
      and pink. Each individual particle is uniform in size, appearing as a single pixel or a small cluster
      of pixels.
