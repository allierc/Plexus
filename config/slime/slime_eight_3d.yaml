# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, uniform cloud of multicolored particles forming a
      diamond-shaped cluster. As time progresses, internal structures begin to emerge as particles organize
      into distinct, winding filaments and interconnected networks. These filaments grow more pronounced
      and complex, weaving through the center of the cluster while maintaining the overall diamond boundary.
      By the final frame, the system has transitioned from a stochastic distribution to a highly structured,
      web-like topology of dense threads.
    objects: The scene contains thousands of small, point-like particles distributed within a diamond-shaped
      volume. These particles are multi-colored, featuring a mix of red, blue, green, orange, and purple
      hues. Initially, the particles are arranged in a relatively homogeneous, disordered cloud with no
      clear connectivity. Over time, they organize into elongated, curvilinear filaments that form a complex,
      interconnected topological network.
  movie_chemical:
    description: The simulation begins with a dense cloud of individual particles distributed within a
      diamond-shaped boundary. Over time, these particles begin to coalesce and elongate into distinct,
      thread-like filaments. As the simulation progresses, the filaments become more defined and begin
      to weave through one another. By the final frame, the system has transitioned from a granular state
      into a complex, interconnected network of long, winding fibers.
    objects: The scene contains a large number of small, multi-colored particles that are initially scattered
      randomly. These particles evolve into elongated, worm-like filaments that maintain a high degree
      of curvature. The filaments are colored in a variety of hues, including purple, orange, green, and
      blue. The objects are arranged in a dense, overlapping mesh that fills the diamond-shaped volume
      of the simulation space.
