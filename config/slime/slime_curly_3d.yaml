# 3D variant of slime_curly -- N-D scalar field + vector-heading agents
# (sense cone sensing / advance / bounce). Field res 80.
general:
  name: slime_curly_3d
  seed: 1
  n_frames: 800
  dt: 1.0
  boundary: wall
  dim: 3
  world:
  - 1.0
  - 1.0
  - 1.0
sets:
  cell:
    n: 12000
    spawn: disc
    spawn_radius: 0.32
    types:
      a:
        fraction: 1.0
        move_speed: 0.006
        turn_speed: 0.95
        sensor_angle: 45
        sensor_dist: 0.013
        sensor_size: 1
fields:
  chemical:
    frame: grid
    res: 80
    couples_to: cell
operators:
- op: deposit
  at: cell
  to: chemical
  amount: 0.045
- op: diffuse
  at: chemical
  rate: 0.015
- op: decay
  at: chemical
  rate: 0.00075
- op: sense
  at: cell
  from: chemical
  cross: -1.0
- op: bounce
  at: cell
- op: advance
  at: cell
schedule:
- deposit
- diffuse
- decay
- sense
- bounce
- advance
plotting:
  colors:
    a:
    - 0.45
    - 0.75
    - 1.0
  background: black
  splat_size: 2.4
  splat_sharpness: 0.85
  splat_transparency: 0.14
  splat_fog: 0.5
  camera_azim: 0.7
  camera_elev: 0.5

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A cluster of blue particles begins as a dense, roughly spherical mass. Over time, the
      cluster undergoes a process of expansion and fragmentation. Individual particles and small sub-clusters
      break away from the main body, moving outward into the surrounding space. By the final frame, the
      central mass has become more porous and irregular as the surrounding cloud of particles grows larger.
    objects: The primary object is a large, irregular cluster of blue particles. These particles are arranged
      in a dense, roughly spherical topology with a porous internal structure. The color of the particles
      is a consistent muted blue against a solid black background. The size of the cluster is large relative
      to the frame, while the individual particles are very small and point-like.
  movie_chemical:
    description: A single blue spherical cluster remains stationary in the center of a black void. The
      cluster exhibits a slightly irregular, textured surface that appears to fluctuate subtly. There
      is no significant change in the overall size or position of the object across the frames. The simulation
      shows a stable, static state of a single particle or aggregate.
    objects: The scene contains a single, large, roughly spherical cluster. It is colored in a uniform
      shade of muted blue. The object has a porous or granular texture, giving it a non-smooth appearance.
      It is isolated in the center of a completely black, featureless background.
