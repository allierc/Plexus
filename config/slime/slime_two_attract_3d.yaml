# 3D variant of slime_two_attract -- N-D scalar field + vector-heading agents
# (sense cone sensing / advance / bounce). Field res 80.
general:
  name: slime_two_attract_3d
  seed: 0
  n_frames: 840
  dt: 1.0
  boundary: wall
  dim: 3
  world:
  - 1.0
  - 1.0
  - 1.0
sets:
  cell:
    n: 11000
    spawn: random
    types:
      a:
        fraction: 0.5
        move_speed: 0.006
        turn_speed: 0.42
        sensor_angle: 28
        sensor_dist: 0.032
        sensor_size: 1
      b:
        fraction: 0.5
        move_speed: 0.006
        turn_speed: 0.42
        sensor_angle: 28
        sensor_dist: 0.032
        sensor_size: 1
    spawn_radius: 0.28
fields:
  chemical:
    frame: grid
    res: 80
    couples_to: cell
operators:
- op: deposit
  at: cell
  to: chemical
  amount: 0.025
- op: diffuse
  at: chemical
  rate: 0.014
- op: decay
  at: chemical
  rate: 0.0015
- op: sense
  at: cell
  from: chemical
  cross: 1.0
- op: bounce
  at: cell
- op: advance
  at: cell
schedule:
- deposit
- diffuse
- decay
- sense
- bounce
- advance
plotting:
  colors:
    a:
    - 0.2
    - 0.95
    - 0.65
    b:
    - 1.0
    - 0.35
    - 0.45
  background: black
  splat_size: 2.4
  splat_sharpness: 0.85
  splat_transparency: 0.14
  splat_fog: 0.5
  camera_azim: 0.7
  camera_elev: 0.5

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a collection of particles forming elongated, worm-like structures
      that move and shift over time. These structures appear to be interconnected or overlapping, creating
      a complex, tangled network. As the video progresses, the individual strands undergo subtle deformations
      and reorientations within the bounded space. The overall density of the network remains relatively
      constant, with the strands weaving through one another.
    objects: The scene contains two distinct sets of particles, colored in shades of red and green. These
      particles are arranged into long, continuous, and winding filaments that resemble polymer chains
      or biological fibers. Each filament is composed of many small, discrete points that maintain a consistent
      spacing to form a coherent line. The structures are distributed throughout a central cluster, exhibiting
      a high degree of entanglement and overlapping topology.
  movie_chemical:
    description: The simulation shows a dense cluster of intertwined, worm-like filaments in a state of
      constant motion. Over time, the filaments undergo subtle conformational changes, shifting and twisting
      within the bounded volume. The overall density of the cluster remains relatively stable as the individual
      strands fluctuate. The motion appears stochastic, suggesting a dynamic equilibrium or a diffusion-like
      process within the group.
    objects: The scene contains numerous elongated, curvilinear filaments that are highly entangled with
      one another. These objects are primarily colored in shades of muted green and reddish-brown, creating
      a multi-colored mesh. Each filament has a consistent, medium thickness and varies in length, forming
      a complex, three-dimensional network. The objects are concentrated in a central diamond-shaped region
      against a solid black background.
