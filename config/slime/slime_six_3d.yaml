# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, chaotic cloud of multicolored particles distributed
      in a diamond-shaped volume. As time progresses, the particles begin to organize into distinct, elongated
      filaments or strands. These strands weave through the volume, creating a complex network of interconnected
      paths. By the final frame, the structure has evolved into a highly organized, tangled web of continuous
      trajectories.
    objects: The scene contains thousands of small, point-like particles in various colors including red,
      orange, green, blue, and purple. These particles are initially arranged in a stochastic, high-density
      distribution within a bounded space. Over time, they form continuous, thread-like filaments that
      exhibit a complex, intertwined topology. Each filament maintains a consistent color, representing
      a specific path or agent trajectory within the simulation.
  movie_chemical:
    description: The simulation begins with a dense cloud of discrete, multi-colored particles scattered
      in a roughly diamond-shaped volume. Over time, these particles begin to elongate and connect, transforming
      into a complex network of intertwined filaments. As the simulation progresses, the filaments become
      more distinct and defined, weaving through one another to form a dense, tangled web. By the final
      frame, the structure has evolved into a highly complex, three-dimensional mesh of continuous, overlapping
      strands.
    objects: The scene contains a large collection of multi-colored filaments that are densely interconnected
      in a tangled, non-linear topology. These objects transition from small, point-like particles to
      long, continuous strands that occupy a significant portion of the central volume. The color palette
      is diverse, featuring distinct strands of magenta, cyan, yellow, and orange. The filaments vary
      slightly in thickness but maintain a consistent, thread-like appearance as they weave together.
