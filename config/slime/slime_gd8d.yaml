general: {name: slime_gd8d, seed: 0, n_frames: 200, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 6000
    spawn: random
    types:
      a: {fraction: 1.0, move_speed: 0.004567, turn_speed: 0.2717, sensor_angle: 44.193,
        sensor_dist: 0.02635, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 140, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.069592}
- {op: diffuse, at: chemical, rate: 0.039464}
- {op: decay, at: chemical, rate: 0.001971}
- {op: sense, at: cell, from: chemical, cross: -0.605124}
- {op: bounce, at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a static distribution of particles that does not change across the
      four frames. The teal dots remain in fixed positions throughout the entire sequence. There is no
      visible motion, flow, or evolution of the patterns over time. The scene represents a steady-state
      snapshot of a spatial distribution.
    objects: The scene contains thousands of small, circular teal particles distributed across a black
      background. These particles are arranged in a complex, web-like topology characterized by filamentary
      structures and clusters. The filaments appear as interconnected chains of dots, while the surrounding
      areas contain more isolated, scattered points. Each individual particle is uniform in size and color,
      creating a high-contrast speckled effect.
  movie_chemical:
    description: The simulation begins with a dense, interconnected network of teal-colored filaments
      and clusters. Over time, these structures begin to fragment and break apart into smaller, isolated
      components. As the video progresses, the density of the teal regions decreases while the black background
      becomes more prominent. By the final frame, the original network has completely disintegrated into
      a sparse distribution of small, scattered dots.
    objects: The scene contains a set of teal-colored structures that transition from a continuous network
      to isolated particles. Initially, the teal objects are large and interconnected, forming a complex,
      web-like topology across the frame. As time passes, the objects shrink in size and lose their connectivity,
      becoming smaller and more rounded. In the final frames, the objects are tiny, discrete points distributed
      randomly against a black background.
