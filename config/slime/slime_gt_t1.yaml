general: {name: slime_gt_t1, seed: 0, n_frames: 200, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 6000
    spawn: random
    types:
      a: {fraction: 1.0, move_speed: 0.004673, turn_speed: 0.6268, sensor_angle: 20.631,
        sensor_dist: 0.0215, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 140, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.0666}
- {op: diffuse, at: chemical, rate: 0.005032}
- {op: decay, at: chemical, rate: 0.002064}
- {op: sense, at: cell, from: chemical, cross: -1.316704}
- {op: bounce, at: cell}
- {op: glide, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, glide]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a static distribution of cyan particles on a black background. There
      is no visible movement or evolution between the four keyframes provided. The spatial arrangement
      of the dots remains constant throughout the sequence. The overall scene represents a steady-state
      configuration of a point-based system.
    objects: The scene contains thousands of small, circular cyan particles. These particles are arranged
      in a complex, web-like topology forming interconnected filaments and clusters. The dots vary slightly
      in density, creating a porous, sponge-like network across the frame. Each individual particle is
      uniform in size and color, contrasting sharply against the solid black background.
  movie_chemical:
    description: The simulation shows a static, unchanging network of interconnected filaments. There
      is no movement or evolution of the structures across the time sequence. The spatial distribution
      of the network remains constant in every frame. The visual representation is a steady-state configuration
      of a porous or cellular structure.
    objects: The scene contains a network of interconnected, thread-like filaments. These filaments are
      colored in a bright cyan or teal hue against a black background. The structure forms a complex,
      irregular mesh with various sized polygonal voids. The filaments vary slightly in thickness but
      maintain a consistent overall scale throughout the image.
