# 3D variant of slime_default -- N-D scalar field + vector-heading agents
# (sense cone sensing / glide / bounce). Field res 80.
general:
  name: slime_default_3d
  seed: 0
  n_frames: 800
  dt: 1.0
  boundary: wall
  dim: 3
  world:
  - 1.0
  - 1.0
  - 1.0
sets:
  cell:
    n: 12000
    spawn: disc
    spawn_radius: 0.3
    types:
      a:
        fraction: 1.0
        move_speed: 0.006
        turn_speed: 0.45
        sensor_angle: 28
        sensor_dist: 0.025
        sensor_size: 1
fields:
  chemical:
    frame: grid
    res: 80
    couples_to: cell
operators:
- op: deposit
  at: cell
  to: chemical
  amount: 0.045
- op: diffuse
  at: chemical
  rate: 0.0175
- op: decay
  at: chemical
  rate: 0.0006
- op: sense
  at: cell
  from: chemical
  cross: -1.0
  noise: 1.0
- op: bounce
  at: cell
- op: glide
  at: cell
schedule:
- deposit
- diffuse
- decay
- sense
- bounce
- glide
plotting:
  colors:
    a:
    - 0.2
    - 0.95
    - 0.65
  background: black
  splat_size: 2.4
  splat_sharpness: 0.85
  splat_transparency: 0.14
  splat_fog: 0.5
  camera_azim: 0.7
  camera_elev: 0.5

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A dense, spherical cluster of green particles initially appears as a solid mass. Over
      time, the cluster begins to fragment and expand outward into a more porous, web-like structure.
      Long, thin filaments of particles extend from the central mass into the surrounding black space.
      By the final frame, the central core has become highly irregular and sparse, with many isolated
      particles scattered throughout the field.
    objects: The primary object is a large, roughly spherical cluster of green particles. This cluster
      transitions from a solid, compact topology to a complex, interconnected network of filaments and
      voids. Numerous small, individual green particles are scattered around the main mass, appearing
      as a sparse cloud. The filaments are thin and elongated, extending several times the radius of the
      central core.
  movie_chemical:
    description: A single green spherical particle is initially shown in the center of a black background.
      Over time, several thin, branch-like structures emerge from the surface of the sphere. These protrusions
      extend outward in various directions, becoming more defined as the simulation progresses. The central
      sphere remains relatively stable in size and position while the surrounding filaments grow.
    objects: The primary object is a large, circular green sphere located in the center of the frame.
      Several thin, elongated green filaments sprout from the sphere's perimeter. These filaments are
      arranged in a radial pattern, extending into the surrounding black space. The sphere is significantly
      larger than the individual filaments, which appear as delicate, thread-like structures.
