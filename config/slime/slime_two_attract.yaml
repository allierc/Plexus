# slime_two_attract -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / glide.
general: {name: slime_two_attract, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 11000
    spawn: random
    types:
      a: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.025}
- {op: diffuse, at: chemical, rate: 0.014}
- {op: decay,   at: chemical, rate: 0.0015}
- {op: sense,   at: cell, from: chemical, cross: 1.0}
- {op: bounce,  at: cell}
- {op: glide, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, glide]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a collection of particles forming interconnected, winding paths
      across a black background. Over time, the paths appear to shift and morph slightly, though the overall
      network structure remains relatively stable. The particles move in a way that maintains the continuity
      of the lines, creating a fluid, organic motion. The overall scene remains consistent in its distribution
      of colors and spatial arrangement throughout the sequence.
    objects: The scene contains two primary sets of particles, colored in cyan and pink. These particles
      are arranged into long, continuous, and winding filaments that form a complex network of loops and
      branches. Each individual particle is very small, appearing as a single pixel or point of light.
      The cyan and pink particles are closely interleaved along the paths, creating a dual-toned, braided
      appearance for the filaments.
  movie_chemical:
    description: The video shows a static image of a network of interconnected lines. There is no movement
      or evolution of the lines over time. The structure remains perfectly still throughout the entire
      sequence. The scene represents a fixed state of a network or filamentary system.
    objects: The scene contains a network of thick, white, and thin, dark-colored lines. The thick lines
      are interconnected in a complex, web-like topology across the entire frame. The thin lines are interspersed
      between the thicker ones, creating a multi-scale filamentary structure. All lines are set against
      a solid black background, highlighting their contrasting colors and shapes.
