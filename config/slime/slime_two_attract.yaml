# slime_two_attract -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_two_attract, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 11000
    spawn: random
    types:
      a: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.025}
- {op: diffuse, at: chemical, rate: 0.014}
- {op: decay,   at: chemical, rate: 0.0015}
- {op: sense,   at: cell, from: chemical, cross: 1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The video shows a static image of a complex network of particles. There is no movement
      or evolution of the particles over time. The orange and blue dots remain in their fixed positions
      throughout the sequence. The overall structure of the interconnected paths does not change.
    objects: The scene contains thousands of small, circular particles in orange and blue. These particles
      are arranged into long, winding, interconnected filaments that form a web-like topology. The orange
      and blue dots are interspersed along these filaments, often appearing in alternating sequences.
      The particles are uniform in size and are set against a solid black background.
  movie_chemical:
    description: The simulation shows a network of interconnected filaments that gradually brighten and
      thicken over time. The white lines expand and merge, creating a denser and more complex web of connections.
      As the progression continues, the background remains dark while the foreground structure becomes
      more prominent. By the final frame, the network has reached a state of high intensity and structural
      complexity.
    objects: The scene contains a network of thin, curvilinear filaments that are interconnected to form
      a mesh-like topology. These filaments vary in color from faint teal and reddish hues to bright,
      glowing white. The size of the individual strands is relatively uniform, though they vary in thickness
      as they overlap. The overall structure is distributed evenly across the entire frame, creating a
      continuous, web-like pattern.
