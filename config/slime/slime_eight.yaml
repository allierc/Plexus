# slime_eight -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_eight, seed: 0, n_frames: 440, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 24000
    spawn: random
    types:
      a: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
      b: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
      c: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
      d: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
      e: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
      f: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
      g: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
      h: {fraction: 0.125, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.034, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 256, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.0165}
- {op: diffuse, at: chemical, rate: 0.012}
- {op: decay,   at: chemical, rate: 0.0025}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
    e: [0.95, 0.4, 0.95]
    f: [1.0, 0.6, 0.2]
    g: [0.2, 0.85, 0.85]
    h: [0.65, 0.5, 1.0]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, uniform distribution of multicolored particles scattered
      across a black background. Over time, the particles begin to organize into distinct, flowing streams
      and swirling patterns. These structures evolve into complex, interconnected filaments that resemble
      turbulent fluid flows or neural networks. By the final frame, the particles have formed highly defined,
      winding paths that weave across the entire space.
    objects: The scene contains thousands of tiny, point-like particles of varying colors including red,
      green, blue, orange, and purple. Initially, these objects are arranged in a stochastic, high-entropy
      distribution with no clear spatial correlation. As the simulation progresses, the particles align
      into elongated, continuous filaments that exhibit smooth, curvilinear topologies. These filaments
      vary in thickness and curvature, creating a dense web of interconnected trajectories.
  movie_chemical:
    description: The simulation begins with a dense, chaotic field of faint, multicolored filaments. Over
      time, these filaments become significantly more defined and vibrant as they organize into distinct,
      flowing paths. The movement transitions from a noisy, static-like state into a coherent, swirling
      fluid-like motion. By the final frame, the structures have fully developed into a complex network
      of high-contrast, undulating lines.
    objects: The scene contains numerous thin, thread-like filaments that are interconnected in a tangled,
      web-like topology. These filaments exhibit a variety of colors, including shades of cyan, magenta,
      yellow, and deep blue. Each individual strand is very small in width but spans across large portions
      of the frame. The objects are arranged in a dense, overlapping pattern that fills the entire two-dimensional
      space.
