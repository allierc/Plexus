# slime_six -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / glide.
general: {name: slime_six, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 18000
    spawn: random
    types:
      a: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      d: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      e: {fraction: 0.16666, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      f: {fraction: 0.16666, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.019}
- {op: diffuse, at: chemical, rate: 0.0125}
- {op: decay,   at: chemical, rate: 0.0021}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: glide, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, glide]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
    e: [0.95, 0.4, 0.95]
    f: [1.0, 0.6, 0.2]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, uniform distribution of multicolored particles scattered
      across a black background. Over time, the particles begin to organize into distinct, flowing streams
      that move in undulating, wave-like patterns. These streams gradually become more defined, forming
      intricate, intertwined loops and winding paths. By the final frame, the particles have settled into
      a complex network of coherent, swirling trajectories that fill the entire space.
    objects: The scene contains thousands of tiny, point-like particles of varying colors including yellow,
      cyan, magenta, and orange. These particles are initially arranged in a stochastic, disordered state
      with no clear spatial correlation. As the simulation progresses, they form elongated, continuous
      filaments that exhibit a fluid-like topology. The filaments are characterized by smooth, curved
      geometries and varying densities, creating a sense of dynamic flow.
  movie_chemical:
    description: The simulation shows a dense network of colorful, undulating lines moving across a black
      background. Over time, the lines shift and flow in a fluid, organic motion, creating a sense of
      constant, rhythmic turbulence. The paths of the lines appear to weave in and out of each other,
      maintaining a consistent density throughout the frame. The overall effect is a dynamic, abstract
      visualization of complex, interconnected trajectories.
    objects: The scene consists of numerous thin, continuous lines that are intertwined and overlapping.
      These lines are colored in a vibrant palette of pink, orange, yellow, and cyan. Each line follows
      a winding, non-linear path, creating a complex web-like topology. The lines are uniform in thickness
      and are distributed evenly across the entire field of view.
