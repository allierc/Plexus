# slime_six -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_six, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 18000
    spawn: random
    types:
      a: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      d: {fraction: 0.16667, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      e: {fraction: 0.16666, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      f: {fraction: 0.16666, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.019}
- {op: diffuse, at: chemical, rate: 0.0125}
- {op: decay,   at: chemical, rate: 0.0021}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
    e: [0.95, 0.4, 0.95]
    f: [1.0, 0.6, 0.2]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, uniform distribution of multicolored particles scattered
      across a black background. Over time, the particles begin to organize into distinct, flowing filaments
      and swirling patterns. These structures evolve into complex, interconnected networks of curved lines
      that move and shift across the frame. By the final frame, the particles have formed highly defined,
      coherent trajectories that resemble fluid dynamics or magnetic field lines.
    objects: The scene contains thousands of tiny, point-like particles of varying colors including red,
      green, blue, orange, and purple. Initially, these objects are arranged in a stochastic, disordered
      distribution with no clear spatial correlation. As the simulation progresses, the objects align
      into elongated, continuous filaments that form loops and vortices. These filaments maintain their
      distinct colors, allowing for the visualization of different flow paths or agent behaviors within
      the system.
  movie_chemical:
    description: The simulation shows a dense network of intertwined, thread-like filaments evolving in
      a complex, chaotic manner. Over time, the filaments shift and undulate, maintaining a high degree
      of entanglement throughout the space. The movement appears fluid and continuous, with no significant
      change in the overall density of the network. The filaments constantly weave over and under one
      another, creating a dynamic, three-dimensional web of motion.
    objects: The scene consists of numerous long, thin filaments that are highly curved and intertwined.
      These filaments are colored in a variety of hues, including cyan, magenta, yellow, and blue. They
      are arranged in a dense, stochastic network that fills the entire frame uniformly. Each filament
      is of a similar scale and length, creating a homogeneous texture of overlapping lines.
