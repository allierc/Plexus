general: {name: slime4_gt, seed: 0, n_frames: 200, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 6000
    spawn: random
    types:
      a: {fraction: 0.25, move_speed: 0.005002, turn_speed: 0.6368, sensor_angle: 10.184,
        sensor_dist: 0.04374, sensor_size: 1}
      b: {fraction: 0.25, move_speed: 0.005002, turn_speed: 0.6368, sensor_angle: 10.184,
        sensor_dist: 0.04374, sensor_size: 1}
      c: {fraction: 0.25, move_speed: 0.005002, turn_speed: 0.6368, sensor_angle: 10.184,
        sensor_dist: 0.04374, sensor_size: 1}
      d: {fraction: 0.25, move_speed: 0.005002, turn_speed: 0.6368, sensor_angle: 10.184,
        sensor_dist: 0.04374, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 140, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.053757}
- {op: diffuse, at: chemical, rate: 0.036402}
- {op: decay, at: chemical, rate: 0.003148}
- {op: sense, at: cell, from: chemical, cross: -0.824378}
- {op: bounce, at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, uniform distribution of multicolored particles scattered
      across a black background. Over time, the particles begin to organize into distinct, winding filaments
      and curved trajectories. These structures evolve into complex, interconnected networks of paths
      that weave across the entire frame. By the final frame, the particles have formed a highly structured,
      web-like pattern of continuous lines.
    objects: 'The scene contains thousands of small, circular particles of uniform size. These particles
      appear in four primary colors: red, blue, green, and yellow. Initially, the objects are arranged
      in a stochastic, disordered distribution with no clear spatial correlation. As the simulation progresses,
      the objects align into elongated, curvilinear chains that form a dense topological network.'
  movie_chemical:
    description: The simulation begins with a dense, chaotic field of multicolored, thread-like filaments
      that appear almost as static. Over time, these filaments begin to organize and thicken, becoming
      more distinct and coherent in their structure. The movement transitions from a high-frequency jitter
      to a smoother, more fluid flow as the filaments align. By the final frame, the structures have reached
      a state of high definition with clear, undulating paths and vibrant colors.
    objects: The scene contains numerous elongated, curvilinear filaments that are intertwined and overlapping
      throughout the space. These filaments are colored in a repeating palette of cyan, yellow, and magenta.
      Each filament is relatively thin but increases in visual weight and thickness as the simulation
      progresses. The topology is a complex, non-linear network where the strands weave in and out of
      one another without forming closed loops.
