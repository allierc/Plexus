# slime_three -- THREE species sharing one domain (3-channel field), each repelling
# the others (cross=-1). Three interleaved networks competing for territory.
general: {name: slime_three, seed: 2, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 15000
    spawn: random
    types:
      a: {fraction: 0.3334, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.3333, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.3333, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
# below-saturation density (low deposit, higher decay) so the cross=-1 gradient
# survives and the three species carve out distinct territories.
- {op: deposit, at: cell, to: chemical, amount: 0.025}
- {op: diffuse, at: chemical,            rate: 0.014}
- {op: decay,   at: chemical,            rate: 0.0015}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors: {a: [0.2, 0.95, 0.65], b: [1.0, 0.35, 0.45], c: [0.45, 0.6, 1.0]}
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a complex system of particles moving in fluid-like, undulating patterns.
      Over time, the paths of the particles shift and morph, creating a sense of continuous flow. The
      different colored streams appear to interact, occasionally merging or diverging as they navigate
      the space. The overall motion is smooth and organic, resembling the movement of currents or biological
      structures.
    objects: The scene contains three distinct sets of particles colored orange, green, and blue. These
      particles are arranged in elongated, curvilinear paths that form intricate, interconnected networks
      across the frame. Each set of particles consists of small, individual dots that maintain a consistent
      density along their respective trajectories. The paths vary in size and complexity, with some forming
      tight loops and others stretching across the entire field of view.
  movie_chemical:
    description: The simulation shows a complex network of intertwined, undulating filaments evolving
      over time. These filaments appear to move with a fluid-like motion, shifting and overlapping as
      they traverse the space. The overall structure maintains a high degree of entanglement throughout
      the sequence. There is no significant change in the global density or the overall pattern of the
      network.
    objects: The scene contains three distinct sets of filaments colored red, green, and blue. These filaments
      are long, continuous, and highly curved, forming a dense, tangled web. They are distributed uniformly
      across the entire frame, overlapping and weaving through one another. Each filament has a similar
      thickness and length, creating a homogeneous texture of intertwined lines.
