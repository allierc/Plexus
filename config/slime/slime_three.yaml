# slime_three -- THREE species sharing one domain (3-channel field), each repelling
# the others (cross=-1). Three interleaved networks competing for territory.
general: {name: slime_three, seed: 2, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 15000
    spawn: random
    types:
      a: {fraction: 0.3334, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.3333, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.3333, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
# below-saturation density (low deposit, higher decay) so the cross=-1 gradient
# survives and the three species carve out distinct territories.
- {op: deposit, at: cell, to: chemical, amount: 0.5}
- {op: diffuse, at: chemical,            rate: 0.28}
- {op: decay,   at: chemical,            rate: 0.03}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, advance]
plotting:
  colors: {a: [0.2, 0.95, 0.65], b: [1.0, 0.35, 0.45], c: [0.45, 0.6, 1.0]}
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, chaotic distribution of multicolored particles scattered
      across a black background. Over time, these particles begin to organize into distinct, flowing streams
      that move in undulating, wave-like patterns. The streams develop complex, intertwined trajectories,
      weaving around each other and forming intricate loops and branches. By the final frame, the particles
      have settled into a highly structured network of continuous, flowing filaments.
    objects: The scene contains thousands of tiny, point-like particles that are primarily orange, green,
      and blue. These particles are arranged into elongated, thread-like filaments that exhibit a fluid,
      continuous topology. The filaments are interconnected and overlapping, creating a dense web of winding
      paths across the entire field of view. Each individual particle is uniform in size, but they collectively
      form large-scale, coherent structures that dominate the visual space.
  movie_chemical:
    description: The simulation begins with a dense field of scattered, multicolored noise. Over time,
      these particles organize into distinct, flowing filaments that weave across the frame. The filaments
      gradually thicken and smooth out, forming a complex network of interconnected paths. By the final
      frame, the structure stabilizes into a coherent, turbulent web of continuous lines.
    objects: The scene contains three primary sets of filaments in red, green, and blue. These filaments
      are arranged in a dense, interconnected topology that resembles a fluid flow or a neural network.
      Each filament is composed of small, glowing points that aggregate into continuous, wavy lines. The
      size of the filaments varies, with some forming thick bundles and others remaining as thin, delicate
      strands.
