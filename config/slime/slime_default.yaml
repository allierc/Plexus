# slime_default -- one species, the canonical Physarum transport network.
# The monolithic `slime` operator decomposed into 5 primitives over 1 set + 1 scalar
# field: deposit (set->field) | diffuse, decay (field->field) | sense (field->set,
# turns the heading) | advance (self-propelled move). Agents spawn in a central disc;
# stigmergy grows a self-reinforcing, coarsening network.
general: {name: slime_default, seed: 0, n_frames: 400, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 12000
    spawn: disc
    spawn_radius: 0.3
    types:
      a: {fraction: 1.0, move_speed: 0.006, turn_speed: 0.45, sensor_angle: 28, sensor_dist: 0.025, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 220, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.045}
- {op: diffuse, at: chemical,            rate: 0.0175}
- {op: decay,   at: chemical,            rate: 0.0006}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors: {a: [0.2, 0.95, 0.65]}
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A dense cluster of blue particles initially forms a solid, circular mass. Over time,
      the internal structure of this mass begins to organize into a complex, interconnected web of filaments.
      These filaments eventually extend outward from the central core, creating a radial, spider-web-like
      pattern. The overall structure transitions from a uniform distribution to a highly structured, branching
      network.
    objects: The scene contains thousands of small, bright blue particles against a black background.
      These particles are initially arranged in a large, circular cluster in the center of the frame.
      As the simulation progresses, they form a network of thin, curved lines that connect to one another.
      The final structure consists of a central web with numerous long, radiating filaments extending
      toward the edges.
  movie_chemical:
    description: A dense cluster of green particles initially forms a spherical shape in the center of
      a black field. Over time, the particles begin to organize into a complex, interconnected network
      of filaments. These filaments extend outward from the central sphere, creating a radial, web-like
      structure. The final frames show a highly structured, symmetrical pattern of branching lines radiating
      from a porous core.
    objects: The primary objects are small, teal-colored particles that aggregate into a large central
      sphere. This sphere is composed of a porous, sponge-like topology with many internal voids. Long,
      thin filaments of the same teal color extend outward from the sphere's surface. These filaments
      branch and curve as they move toward the edges of the frame, forming a radial network.
