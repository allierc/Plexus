# slime_default -- one species, the canonical Physarum transport network.
# The monolithic `slime` operator decomposed into 5 primitives over 1 set + 1 scalar
# field: deposit (set->field) | diffuse, decay (field->field) | sense (field->set,
# turns the heading) | advance (self-propelled move). Agents spawn in a central disc;
# stigmergy grows a self-reinforcing, coarsening network.
general: {name: slime_default, seed: 0, n_frames: 400, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 12000
    spawn: disc
    spawn_radius: 0.3
    types:
      a: {fraction: 1.0, move_speed: 0.006, turn_speed: 0.45, sensor_angle: 28, sensor_dist: 0.025, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 220, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.9}
- {op: diffuse, at: chemical,            rate: 0.35}
- {op: decay,   at: chemical,            rate: 0.012}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, advance]
plotting:
  colors: {a: [0.2, 0.95, 0.65]}
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A dense cluster of blue particles initially forms a nearly solid circular mass. Over
      time, the internal structure of this mass begins to organize into a network of interconnected loops
      and cells. These loops expand and thin out as they push toward the periphery of the cluster. Finally,
      long filaments of particles extend outward from the central network into the surrounding black space.
    objects: The primary objects are small blue particles that aggregate into a large, circular formation.
      These particles organize into a complex topology of interconnected, cell-like loops in the center.
      Several long, linear filaments branch out from the central network toward the edges of the frame.
      The entire system is composed of uniform blue dots set against a solid black background.
  movie_chemical:
    description: A dense cluster of teal particles initially forms a roughly spherical shape against a
      black background. Over time, the particles begin to organize into a complex, interconnected network
      of filaments. These filaments extend outward from the central mass, creating a web-like structure
      with many branching points. The final frames show a highly intricate, porous lattice that fills
      much of the frame.
    objects: The primary objects are teal-colored particles and filaments. They are arranged in a dense,
      spherical core that transitions into a radiating, web-like topology. The filaments are thin and
      elongated, connecting to one another to form a continuous, porous network. The overall size of the
      structure expands from a compact sphere to a large, sprawling geometric lattice.
