# slime_curly -- one species, high turn rate + short sensors -> tight curly filaments
# (a fine, meandering network). Same 5 operators; only the `types:` scalars change.
general: {name: slime_curly, seed: 1, n_frames: 400, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 12000
    spawn: disc
    spawn_radius: 0.32
    types:
      a: {fraction: 1.0, move_speed: 0.006, turn_speed: 0.95, sensor_angle: 45, sensor_dist: 0.013, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 220, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.045}
- {op: diffuse, at: chemical,            rate: 0.015}
- {op: decay,   at: chemical,            rate: 0.00075}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors: {a: [0.45, 0.75, 1.0]}
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A large spherical cluster of blue particles begins as a dense, uniform mass. Over time,
      the cluster develops a distinct porous, web-like internal structure. Small filaments of particles
      begin to extend outward from the main sphere into the surrounding black space. The overall shape
      remains spherical while the internal connectivity becomes increasingly complex and defined.
    objects: The primary object is a large, spherical cluster composed of thousands of small blue dots.
      These dots are arranged in a complex, interconnected network that resembles a porous sponge or a
      geodesic dome. Several thin, linear filaments of blue particles radiate outward from the sphere's
      surface into the void. All particles are uniform in size and maintain a consistent bright blue color
      against a solid black background.
  movie_chemical:
    description: A central spherical cluster of interconnected filaments undergoes a structural transformation
      over time. Initially, the internal network is coarse and highly porous with large open spaces. As
      the simulation progresses, the internal filaments become increasingly dense and the pores shrink
      significantly. By the final frame, the cluster appears as a nearly solid mass with only tiny, scattered
      voids remaining.
    objects: The primary object is a large, blue spherical cluster located in the center of the frame.
      This cluster is composed of a complex, interconnected network of thin filaments. Radiating outward
      from the sphere are numerous long, thin blue lines that extend into the black background. The overall
      structure maintains a consistent size while the internal density of the central sphere increases.
