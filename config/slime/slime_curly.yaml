# slime_curly -- one species, high turn rate + short sensors -> tight curly filaments
# (a fine, meandering network). Same 5 operators; only the `types:` scalars change.
general: {name: slime_curly, seed: 1, n_frames: 400, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 12000
    spawn: disc
    spawn_radius: 0.32
    types:
      a: {fraction: 1.0, move_speed: 0.006, turn_speed: 0.95, sensor_angle: 45, sensor_dist: 0.013, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 220, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.9}
- {op: diffuse, at: cell, to: chemical, rate: 0.30}
- {op: decay,   at: cell, to: chemical, rate: 0.015}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, advance]
plotting:
  colors: {a: [0.45, 0.75, 1.0]}
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A dense cluster of blue particles initially forms a nearly solid circular mass. Over
      time, the internal structure of the cluster begins to organize into a porous, web-like network of
      interconnected loops. The outer boundary of the cluster becomes irregular as individual filaments
      and small groups of particles break away from the main body. By the final frame, the central structure
      is a complex, cellular lattice with several distinct "tentacles" extending into the surrounding
      space.
    objects: The primary objects are small, blue dots that represent individual particles or agents. These
      particles are arranged in a complex, interconnected topology that resembles a biological cellular
      network or a foam structure. The size of the individual particles is uniform and very small relative
      to the overall cluster. The cluster itself is large and roughly circular, though it develops increasingly
      irregular and elongated protrusions as the simulation progresses.
  movie_chemical:
    description: A dense cluster of blue particles initially appears as a uniform, circular mass. Over
      time, the cluster begins to expand and reorganize into a complex, interconnected network of filaments.
      These filaments extend outward from the central mass, creating a web-like structure with many branching
      points. By the final frame, the structure has evolved into a highly intricate, porous lattice of
      interconnected blue strands.
    objects: The primary objects are blue, thread-like filaments that form a porous, sponge-like network.
      These filaments are interconnected at various points, creating a complex topology of loops and branches.
      The color of the filaments is a consistent light blue against a solid black background. The size
      of the individual filaments varies, but they collectively form a large, roughly circular cluster
      that occupies most of the frame.
