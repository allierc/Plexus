# slime_filaments -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_filaments, seed: 0, n_frames: 450, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 13000
    spawn: disc
    spawn_radius: 0.3
    types:
      a: {fraction: 1.0, move_speed: 0.007, turn_speed: 0.18, sensor_angle: 14, sensor_dist: 0.035, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 220, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.045}
- {op: diffuse, at: chemical, rate: 0.015}
- {op: decay,   at: chemical, rate: 0.0005}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A dense collection of blue particles initially forms a large, roughly circular cluster
      in the center of a black field. Over time, the particles begin to organize into distinct, linear
      filaments that radiate outward from the center. These filaments gradually lengthen and branch out,
      creating a complex, web-like network across the entire frame. By the final frame, the original central
      cluster has largely dissipated into a highly interconnected, sprawling structure of interconnected
      lines.
    objects: The primary objects are small, bright blue dots that represent individual particles or agents.
      These particles are arranged in a dynamic topology, transitioning from a concentrated circular mass
      to a sprawling, radial network of filaments. The filaments are composed of these dots connected
      in linear paths that branch and intersect as they expand. The overall size of the structure grows
      from a localized central region to fill the entire visual field.
  movie_chemical:
    description: A dense cluster of particles initially appears as a faint, speckled sphere against a
      black background. Over time, the sphere becomes more defined and begins to emit long, fibrous filaments
      that radiate outward. These filaments grow increasingly thick and bright, eventually filling the
      entire frame with a complex web of interconnected lines. By the final frame, the central sphere
      is almost entirely obscured by the dense, overlapping network of cyan fibers.
    objects: The primary object is a spherical cluster of small, cyan-colored particles located in the
      center of the frame. Radiating from this sphere are numerous long, thin filaments that extend toward
      the edges of the image. These filaments are interconnected, forming a dense, web-like topology that
      covers the background. The color of all elements remains a consistent cyan, while the size of the
      filaments increases as they move away from the center.
