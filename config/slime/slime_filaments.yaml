# slime_filaments -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / glide.
general: {name: slime_filaments, seed: 0, n_frames: 450, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 13000
    spawn: disc
    spawn_radius: 0.3
    types:
      a: {fraction: 1.0, move_speed: 0.007, turn_speed: 0.18, sensor_angle: 14, sensor_dist: 0.035, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 220, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.045}
- {op: diffuse, at: chemical, rate: 0.015}
- {op: decay,   at: chemical, rate: 0.0005}
- {op: sense,   at: cell, from: chemical, cross: -1.0, noise: 1.0}
- {op: bounce,  at: cell}
- {op: glide, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, glide]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A large number of cyan particles are initially distributed in a dense, roughly spherical
      cluster against a black background. Over time, these particles begin to organize into distinct,
      elongated filaments that radiate outward from the center. A prominent circular boundary forms, with
      many filaments crossing through its interior and extending beyond its perimeter. The simulation
      concludes with a complex network of interconnected paths and scattered points, maintaining the overall
      spherical symmetry.
    objects: The primary objects are thousands of tiny cyan dots that represent individual particles or
      data points. These particles are arranged into a dense central mass that gradually transitions into
      a web-like topology of curved lines. A large, circular ring of high particle density defines a central
      region where many filaments intersect. The filaments vary in length and curvature, extending from
      the core to the edges of the frame in a radial pattern.
  movie_chemical:
    description: A dense cluster of green particles initially forms a spherical shape against a black
      background. Over time, the particles begin to organize into a complex, interconnected network of
      filaments. These filaments extend outward from the central sphere, creating a radial, web-like structure.
      The final frames show a highly structured, glowing orb with long, thread-like tendrils reaching
      toward the edges of the frame.
    objects: The primary objects are thousands of small, cyan-colored particles. These particles are arranged
      in a spherical topology, transitioning from a random distribution to a structured lattice. The filaments
      are thin, elongated, and interconnected, forming a dense mesh in the center. The overall structure
      is large relative to the frame, occupying most of the central space with radiating extensions.
