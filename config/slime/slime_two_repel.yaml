# slime_two_repel -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_two_repel, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 11000
    spawn: random
    types:
      a: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.025}
- {op: diffuse, at: chemical, rate: 0.014}
- {op: decay,   at: chemical, rate: 0.0015}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a dynamic system of orange and blue particles moving in a fluid-like
      motion. Over time, the particles form intricate, winding paths that resemble streamlines or flow
      patterns. The structures appear to shift and evolve, with some areas showing high concentration
      and others showing sparse distribution. The overall motion suggests a complex, interconnected field
      of movement across the entire frame.
    objects: 'The scene contains two primary sets of objects: orange and blue particles. These particles
      are arranged in long, continuous, and winding filaments that curve and loop across the black background.
      Each particle is a small, uniform dot, creating a granular texture within the larger flow structures.
      The orange and blue filaments often run parallel to or intertwine with each other, forming a complex
      network of paths.'
  movie_chemical:
    description: The simulation begins with a dense, chaotic network of intertwined red and cyan filaments.
      Over time, these filaments undergo a continuous, fluid-like deformation as they shift and undulate
      across the frame. The overall structure maintains its interconnected complexity while the individual
      paths of the lines evolve dynamically. By the final frame, the network has shifted into a new configuration
      of winding, overlapping curves.
    objects: 'The scene contains two primary sets of objects: red filaments and cyan filaments. These
      filaments are arranged in a complex, non-linear topology, forming a dense web of interconnected
      loops and curves. Each filament is relatively thin and uniform in width, spanning across the entire
      field of view. The red and cyan lines are interwoven, creating a high-contrast, multi-layered network
      against a black background.'
