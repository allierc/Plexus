# slime_two_repel -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_two_repel, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 11000
    spawn: random
    types:
      a: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.5, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.5}
- {op: diffuse, at: chemical, rate: 0.28}
- {op: decay,   at: chemical, rate: 0.03}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a dynamic system of particles forming complex, undulating patterns.
      Over time, the orange and blue paths shift and morph, creating a fluid-like motion across the frame.
      The structures appear to flow and weave around one another, maintaining a consistent density. The
      overall movement suggests a continuous evolution of a field or a collective behavior of agents.
    objects: The scene contains two primary sets of particles, one colored orange and the other blue.
      These particles are arranged into elongated, curvilinear strands that resemble topographic contour
      lines or streamlines. The strands are interconnected and intertwined, forming a dense, web-like
      topology across the black background. Each individual particle is small and point-like, but they
      collectively form large, continuous structures.
  movie_chemical:
    description: The simulation begins with a dense field of scattered, multicolored noise. Over time,
      these particles organize into distinct, winding filaments that move and shift across the frame.
      The filaments continuously evolve, changing their curvature and connectivity while maintaining a
      fluid, organic motion. By the final frame, the system has settled into a complex, interconnected
      network of undulating lines.
    objects: The scene contains two primary sets of filaments, one colored in vibrant pink and the other
      in bright cyan. These filaments are arranged in a dense, intertwined topology, forming a labyrinthine
      network of loops and branches. Each filament is relatively thin and uniform in width, though they
      vary in length and curvature. The objects are set against a solid black background, which highlights
      their high-contrast colors and intricate spatial arrangement.
