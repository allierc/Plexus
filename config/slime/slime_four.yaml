# slime_four -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_four, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 14000
    spawn: random
    types:
      a: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      d: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.02}
- {op: diffuse, at: chemical, rate: 0.013}
- {op: decay,   at: chemical, rate: 0.002}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, chaotic distribution of multi-colored particles scattered
      across a black background. Over time, the particles begin to organize into distinct, winding filaments
      and swirling patterns. These structures evolve and shift, with some filaments lengthening while
      others curve and loop into complex shapes. By the final frame, the particles have formed a highly
      structured network of interconnected, flowing paths.
    objects: The scene contains thousands of tiny, point-like particles in red, green, blue, and orange.
      These particles are arranged in long, continuous, and sinuous filaments that weave across the entire
      frame. The filaments exhibit a complex topology of loops, curves, and branching paths that resemble
      fluid flow or magnetic field lines. Each individual particle is uniform in size, but their collective
      arrangement creates large-scale, dynamic structures.
  movie_chemical:
    description: The simulation shows a complex network of intertwined, undulating lines that remain relatively
      static in their overall structure. The lines exhibit subtle, fluid-like oscillations and slight
      shifts in their curvature over the duration of the sequence. There is no significant migration or
      large-scale deformation of the network, suggesting a steady-state dynamic. The visual effect is
      one of a shimmering, organic web of energy or flow.
    objects: The scene consists of numerous thin, continuous lines that are densely packed and interwoven
      across the entire frame. These lines are colored in a repeating palette of cyan, magenta, yellow,
      and blue. They form a chaotic, non-linear topology characterized by frequent loops, knots, and overlapping
      paths. Each individual line is of a uniform, small thickness, creating a high-frequency texture
      against the black background.
