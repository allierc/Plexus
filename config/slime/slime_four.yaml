# slime_four -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_four, seed: 0, n_frames: 420, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 14000
    spawn: random
    types:
      a: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      d: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.4}
- {op: diffuse, at: chemical, rate: 0.26}
- {op: decay,   at: chemical, rate: 0.04}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a chaotic distribution of multicolored particles scattered
      across a black background. Over time, these particles begin to organize into distinct, flowing streams
      that move in undulating, wave-like patterns. The streams develop complex, swirling structures and
      loops as they interact with the underlying field. By the final frame, the particles have formed
      highly coherent, continuous filaments that weave through the space in a fluid motion.
    objects: The scene contains thousands of tiny, point-like particles in colors including red, green,
      blue, and yellow. These particles are initially arranged in a random, high-entropy distribution
      across the entire frame. As the simulation progresses, they form elongated, continuous filaments
      that exhibit a smooth, curvilinear topology. The filaments vary in thickness and curvature, creating
      a dense network of interconnected, flowing paths.
  movie_chemical:
    description: The simulation begins with a dense field of random, multicolored noise and scattered
      points. Over time, these points organize into distinct, continuous curvilinear paths that weave
      across the frame. The paths evolve by shifting and flowing, maintaining a complex, tangled network
      of interconnected lines. By the final frame, the system has stabilized into a dense, fluid-like
      web of vibrant, undulating trajectories.
    objects: The scene contains multiple sets of continuous, thread-like trajectories that form a complex,
      intertwined network. These lines are colored in distinct shades of cyan, magenta, yellow, and green.
      Each individual path is relatively thin and elongated, winding and looping to fill the entire spatial
      domain. The objects are densely packed, creating a high-entropy topological structure of overlapping
      and adjacent curves.
