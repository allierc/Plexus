# 3D variant of slime_filaments -- N-D scalar field + vector-heading agents
# (sense cone sensing / glide / bounce). Field res 80.
general:
  name: slime_filaments_3d
  seed: 0
  n_frames: 900
  dt: 1.0
  boundary: wall
  dim: 3
  world:
  - 1.0
  - 1.0
  - 1.0
sets:
  cell:
    n: 13000
    spawn: disc
    spawn_radius: 0.3
    types:
      a:
        fraction: 1.0
        move_speed: 0.007
        turn_speed: 0.18
        sensor_angle: 14
        sensor_dist: 0.035
        sensor_size: 1
fields:
  chemical:
    frame: grid
    res: 80
    couples_to: cell
operators:
- op: deposit
  at: cell
  to: chemical
  amount: 0.045
- op: diffuse
  at: chemical
  rate: 0.015
- op: decay
  at: chemical
  rate: 0.0005
- op: sense
  at: cell
  from: chemical
  cross: -1.0
- op: bounce
  at: cell
- op: glide
  at: cell
schedule:
- deposit
- diffuse
- decay
- sense
- bounce
- glide
plotting:
  colors:
    a:
    - 0.2
    - 0.95
    - 0.65
  background: black
  splat_size: 2.4
  splat_sharpness: 0.85
  splat_transparency: 0.14
  splat_fog: 0.5
  camera_azim: 0.7
  camera_elev: 0.5

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A dense cluster of green particles begins as a compact, roughly spherical mass. Over
      time, the particles begin to disperse outward from the center, creating a more diffuse and irregular
      shape. The expansion is non-uniform, with some particles forming elongated filaments or streaks
      while others scatter randomly. By the final frame, the central core remains visible but is surrounded
      by a much larger, more chaotic cloud of scattered points.
    objects: The primary objects are thousands of small, individual green particles. These particles are
      initially arranged in a high-density, spherical topology at the center of the frame. As the simulation
      progresses, the topology shifts from a solid-like cluster to a sparse, branching network of points.
      The particles maintain a consistent small size and vibrant green color throughout the entire sequence.
  movie_chemical:
    description: A single green spherical particle is initially shown in the center of a black background.
      Over time, numerous thin, thread-like filaments begin to sprout outward from the surface of the
      sphere. These filaments grow longer and more complex, creating a fuzzy, starburst-like appearance
      around the central core. By the final frame, the sphere is almost entirely enveloped by a dense
      network of these radiating green structures.
    objects: The primary object is a large, solid green sphere located in the center of the frame. Surrounding
      this sphere is a set of thin, elongated filaments that radiate outward in all directions. These
      filaments are the same green color as the central sphere and vary in length and thickness. The overall
      structure forms a complex, symmetrical topology where the filaments appear to be anchored to the
      surface of the central body.
