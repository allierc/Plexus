general: {name: slime_gt, seed: 0, n_frames: 200, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 6000
    spawn: random
    types:
      a: {fraction: 1.0, move_speed: 0.004567, turn_speed: 0.2837, sensor_angle: 40.68,
        sensor_dist: 0.02136, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 140, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.069604}
- {op: diffuse, at: chemical, rate: 0.039694}
- {op: decay, at: chemical, rate: 0.001972}
- {op: sense, at: cell, from: chemical, cross: -0.605124, noise: 1.0}
- {op: bounce, at: cell}
- {op: glide, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, glide]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The video shows a static field of blue particles against a black background. There is
      no movement or evolution of the particles across the four keyframes. The distribution of the points
      remains constant throughout the sequence. The overall scene is a steady-state representation of
      a spatial distribution.
    objects: The scene contains thousands of small, circular blue particles. These particles are arranged
      in a complex, web-like topology forming filamentary structures. The filaments appear as interconnected
      chains of points with varying densities. Each individual particle is uniform in size and bright
      blue in color.
  movie_chemical:
    description: The simulation begins with a dense, interconnected network of teal-colored filaments.
      Over time, these filaments break apart and fragment into smaller, isolated clusters. As the simulation
      progresses, the clusters continue to shrink and disperse across the field. By the final frame, the
      original network has completely disintegrated into a sparse distribution of small, disconnected
      dots.
    objects: The primary objects are teal-colored structures that transition from continuous filaments
      to discrete particles. Initially, the filaments are large and highly interconnected, forming a complex,
      web-like topology. As time passes, the objects become smaller and lose their connectivity, becoming
      isolated from one another. In the final stages, the objects are tiny, scattered points with no remaining
      spatial correlation.
