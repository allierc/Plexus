# slime_two_asym -- ported from prototype/slime to the decomposed src operators:
# deposit(set->field) / diffuse,decay(field->field) / sense(field->set) / bounce / advance.
general: {name: slime_two_asym, seed: 0, n_frames: 440, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 11000
    spawn: random
    types:
      fast: {fraction: 0.5, move_speed: 0.009, turn_speed: 0.2, sensor_angle: 16, sensor_dist: 0.04, sensor_size: 1}
      curly: {fraction: 0.5, move_speed: 0.004, turn_speed: 0.85, sensor_angle: 42, sensor_dist: 0.022, sensor_size: 1}
fields:
  chemical: {frame: grid, res: 240, couples_to: cell}
operators:
- {op: deposit, at: cell, to: chemical, amount: 0.025}
- {op: diffuse, at: chemical, rate: 0.014}
- {op: decay,   at: chemical, rate: 0.0015}
- {op: sense,   at: cell, from: chemical, cross: -1.0}
- {op: bounce,  at: cell}
- {op: advance, at: cell}
schedule: [deposit, diffuse, decay, sense, bounce, advance]
plotting:
  colors:
    fast: [0.2, 0.95, 0.65]
    curly: [1.0, 0.35, 0.45]
  background: black
  gamma: 0.7

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a dense network of orange and blue particles moving in complex,
      winding paths. Over time, the particles appear to follow fluid-like trajectories, weaving around
      each other to form intricate, interconnected filaments. The overall structure remains relatively
      stable, with the paths maintaining their general shapes while the individual points shift slightly.
      The motion suggests a system governed by local interactions or a underlying flow field that guides
      the particles into these organic, web-like patterns.
    objects: The scene contains two distinct sets of particles, one colored bright orange and the other
      a muted blue. These particles are arranged into long, continuous, and winding filaments that resemble
      neural networks or river systems. Each individual particle is a small, uniform dot, but they cluster
      together to form large, sprawling structures across the entire frame. The orange and blue filaments
      frequently overlap and intertwine, creating a dense, multi-layered topological web against a black
      background.
  movie_chemical:
    description: The simulation shows a complex network of intertwined filaments that remain relatively
      static in their overall structure. There is a subtle, flickering intensity change across the filaments
      as the simulation progresses. The spatial distribution of the red and green paths does not shift
      significantly over the time sequence. The overall visual effect is a steady-state representation
      of a dense, interconnected web.
    objects: The scene contains two distinct sets of filaments, one colored in vibrant pinkish-red and
      the other in bright cyan-green. These filaments are highly convoluted and intertwined, forming a
      dense, non-linear mesh across the entire frame. Each filament is thin and elongated, exhibiting
      a worm-like topology with many loops and sharp turns. The two colors are distributed somewhat uniformly,
      overlapping and weaving through one another to create a complex network.
