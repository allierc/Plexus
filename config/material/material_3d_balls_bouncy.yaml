# material_3d_balls_bouncy -- the 3D version of the bouncing balls: three stiff elastic
# balls in a box, each with a different launch velocity (vel_init), damping near-off
# (drag 0, wall_damp 1.0) so they bounce around. Dots render + white box frame.
general: {name: material_3d_balls_bouncy, seed: 1, n_frames: 900, dt: 0.003, boundary: wall, dim: 3, world: [1.0, 1.0, 1.0]}
sets:
  cell:
    n: 3
    start: [[0.30, 0.62, 0.5], [0.5, 0.74, 0.5], [0.70, 0.58, 0.5]]
    types:
      a: {fraction: 0.3334, youngs: 500}
      b: {fraction: 0.3333, youngs: 500}
      c: {fraction: 0.3333, youngs: 500}
  mpm_particle: {parent: cell, per_parent: 6000, radius: 0.10, density: 1.0, vel_init: 0.4}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 64}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 9.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.0, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, wall_damp: 1.0}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 1.0, wall_contact: 0.04, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- {substep_dt: 0.0002, steps: [mpm_strain, p2g, mpm_grid_update, g2p]}
plotting:
  background: black
  up_axis: 1
  camera_elev: 1.18
  camera_turns: 0.0
  camera_zoom: 0.0
  render_3d: dots
  dot_size: 1.6
  splat_res: 600
  box_frame: true
  fps: 60
  hide_sets: [cell]
  colors: {a: [1.0, 0.45, 0.4], b: [0.4, 0.85, 0.55], c: [0.45, 0.6, 1.0]}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_mpm_particle:
    description: Three spherical particles are shown moving within a 3D bounding box. The blue particle moves towards the center while the red and green particles move towards each other. The red and green particles eventually collide and overlap in the center of the box. The blue particle then moves towards the combined red and green cluster.
    objects: There are three spherical particles in the scene. The particles are colored blue, red, and green. They are of approximately equal size and are initially separated from each other. The particles move independently until the red and green ones merge into a single overlapping cluster.
