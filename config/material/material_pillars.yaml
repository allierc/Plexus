# material_pillars -- auto-ported from prototype/water (overnight_suite:ob_pillars).
general:
  name: material_pillars
  seed: 0
  n_frames: 900
  dt: 1.0
  boundary: wall
  obstacles:
  - [0.2, 0.0, 0.28, 0.3]
  - [0.46, 0.0, 0.54, 0.3]
  - [0.72, 0.0, 0.8, 0.3]
  - [0.33, 0.0, 0.41, 0.16]
  - [0.59, 0.0, 0.67, 0.16]
sets:
  cell:
    n: 1
    start: [0.5, 0.82, 0.5, 0.82]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.2, density: 1.0}
fields: {}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mls_mpm_mechanics, at: mpm_particle, n_grid: 128, substeps: 18, dt_sub: 0.0002, a_max: 200, drag: 0.25, wall_damp: 0.5,
  wall_contact: 0.06, surface_tension: 12}
schedule: [aggregate, gravity, mls_mpm_mechanics]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A large blue sphere is positioned above a set of grey bars. As time progresses, a blue
      horizontal field emerges and expands across the bottom of the frame. This blue field eventually
      covers the grey bars and fills the lower portion of the scene. The final frame shows the blue field
      fully integrated with the grey bars at the bottom.
    objects: A large, circular blue sphere is located in the upper half of the frame. Five grey vertical
      bars of varying heights are arranged in a row at the bottom. A blue horizontal field appears and
      grows to span the width of the lower section. The blue field is semi-transparent and overlaps with
      the grey bars in the final frames.
  movie_mpm_particle:
    description: A large cluster of blue particles is initially suspended in the upper half of the frame.
      As the simulation progresses, these particles descend and interact with a series of grey vertical
      bars. The particles eventually settle into the gaps between the bars, forming a continuous horizontal
      layer. By the final frame, the particles have completely filled the lower section, creating a level
      surface across the structure.
    objects: The scene contains a large, roughly circular cluster of small blue particles at the top.
      Below this, there are five grey vertical bars of varying heights arranged in a row. The bars are
      solid in color and have a rectangular topology. The blue particles are much smaller than the grey
      bars and transition from a concentrated mass to a distributed fluid-like state.
