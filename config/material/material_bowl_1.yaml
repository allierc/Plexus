general:
  name: material_bowl_1
  seed: 0
  n_frames: 1000
  dt: 1.0
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.1, 0.6]
  - [0.1, 0.0, 0.2, 0.47]
  - [0.2, 0.0, 0.3, 0.36]
  - [0.3, 0.0, 0.4, 0.26]
  - [0.4, 0.0, 0.46, 0.18]
  - [0.54, 0.0, 0.6, 0.18]
  - [0.6, 0.0, 0.7, 0.26]
  - [0.7, 0.0, 0.8, 0.36]
  - [0.8, 0.0, 0.9, 0.47]
  - [0.9, 0.0, 1.0, 0.6]
sets:
  cell:
    n: 1
    start: [0.4, 0.78, 0.4, 0.78]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 6000, radius: 0.2, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle, dt_sub: 0.0002}
- {op: p2g, at: mpm_particle, to: mpm_grid, dt_sub: 0.0002, drag: 0.3, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, dt_sub: 0.0002, surface_tension: 30.0, wall_damp: 0.4}
- {op: g2p, at: mpm_particle, from: mpm_grid, dt_sub: 0.0002, wall_damp: 0.4, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep: 18
  dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A light blue circular particle is positioned at the top of the frame. Below it, a light
      blue fluid-like shape expands horizontally across a grey background. The fluid shape gradually narrows
      into a vertical channel at the bottom center. The overall scene remains static in its composition
      throughout the sequence.
    objects: A single light blue circle is located in the upper half of the image. A larger, irregular
      light blue shape sits in the middle, spanning most of the width. A grey background provides a structured,
      stepped border at the bottom of the frame. A thin vertical light blue line connects the middle shape
      to the bottom edge.
  movie_mpm_particle:
    description: A dense cluster of blue particles begins as a solid sphere at the top of the frame. The
      sphere rapidly collapses downward, transitioning into a fluid-like state as it interacts with a
      gray stepped boundary. As it descends, the particles spread out horizontally across the steps before
      funneling into a narrow vertical channel. By the final frame, the particles have mostly settled
      into the bottom channel, leaving a mostly empty white space above.
    objects: The primary objects are numerous small, light-blue particles that form a cohesive group.
      These particles initially form a large, circular cluster with a diameter roughly half the width
      of the frame. A gray, stepped geometric structure serves as a container, featuring a wide top and
      a narrow bottom outlet. The background is a plain white field that provides high contrast for the
      blue and gray elements.
