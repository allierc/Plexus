# material_two_drops_st -- two tangent liquid droplets in ZERO GRAVITY, surface
# tension ON. VERY LONG run (n_frames 4000) to see whether, after coalescing, the two
# bodies actually MIX (interdiffuse across the interface) or stay segregated as two
# halves under the internal circulation. (ported from prototype/water ph_two_drops_st.)
general: {name: material_two_drops_st, seed: 0, n_frames: 4000, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 2
    start:
    - [0.39, 0.5]
    - [0.61, 0.5]
    types:
      a:
        fraction: 0.5
        youngs: 200
        layers:
        - {frac: 1.0, youngs: 200, material: liquid}
      b:
        fraction: 0.5
        youngs: 200
        layers:
        - {frac: 1.0, youngs: 200, material: liquid}
  mpm_particle: {parent: cell, per_parent: 3000, radius: 0.11, density: 1.0}
fields: {}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 0.0}
- {op: mls_mpm_mechanics, at: mpm_particle, n_grid: 128, substeps: 14, dt_sub: 0.0002, a_max: 200, drag: 0.1, wall_damp: 1.0,
  surface_tension: 120.0}
schedule: [aggregate, gravity, mls_mpm_mechanics]
