# mpm3d_cube_drop -- a single elastic (jelly) CUBE dropped under gravity in a 3D box.
# The minimal 3D MLS-MPM smoke test: block-fill an axis-aligned cube, let it fall,
# hit the reflective floor and bounce (fixed-corotated elasticity springs it back).
# Exercises the dimension-generic mpm stack (mpm_grid 64^3, p2g/g2p 27-cell stencil,
# 3D polar rotation via SVD) -- the 3D counterpart of the 2D material_* ball specs.
general: {name: material_3d_cube_drop, seed: 0, n_frames: 320, dt: 1.0, boundary: wall, dim: 3, world: [1.0, 1.0, 1.0]}
sets:
  cell:
    n: 1
    start: [[0.5, 0.62, 0.5]]
    types:
      jelly: {fraction: 1.0, youngs: 240, block: [0.36, 0.50, 0.36, 0.64, 0.78, 0.64]}
  mpm_particle: {parent: cell, per_parent: 14000, radius: 0.16, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 64}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 16.0}
- {op: mpm_strain, at: mpm_particle, dt_sub: 0.0002}
- {op: p2g, at: mpm_particle, to: mpm_grid, dt_sub: 0.0002, drag: 0.0, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, dt_sub: 0.0002, wall_damp: 0.7}
- {op: g2p, at: mpm_particle, from: mpm_grid, dt_sub: 0.0002, wall_damp: 0.7, wall_contact: 0.04, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- {substep: 15, dt: 0.0002, steps: [mpm_strain, p2g, mpm_grid_update, g2p]}
plotting:
  background: black
  up_axis: 1
  camera_elev: 1.18
  camera_zoom: 0.0
  box_frame: true
  fps: 60
  hide_sets: [cell]
  dot_size: 1.2
  render_3d: dots
  splat_size: 2.6
  splat_res: 560
  camera_turns: 0.0
  colors: {jelly: [0.40, 0.80, 1.0]}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_mpm_particle:
    description: A dense cluster of blue particles is initially positioned in the center of a large wireframe
      cube. Over time, the cluster remains stationary and maintains its compact, roughly spherical shape.
      There is no visible movement or expansion of the particles throughout the sequence. The scene remains
      static, showing a stable distribution of points within the bounded volume.
    objects: The primary objects are a large number of small, blue particles clustered together. These
      particles form a dense, roughly spherical cloud in the center of the frame. They are contained within
      a large, white wireframe cube that defines the spatial boundaries. The particles are uniform in
      color and size, creating a textured, volumetric appearance.
