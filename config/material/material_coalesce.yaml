# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with two distinct, rectangular blocks of blue and orange color.
      Over time, the sharp edges of these blocks begin to soften and round out. The two shapes gradually
      move toward each other until they make contact at the center. Finally, the shapes merge into a single,
      continuous, pill-shaped blob with a shared boundary.
    objects: 'The scene contains two primary objects: a blue block and an orange block. Initially, they
      are separate, rectangular shapes with sharp corners. As the simulation progresses, they transform
      into rounded, organic shapes while maintaining their distinct colors. By the end, they are joined
      together to form a single, elongated, bi-colored object.'
  movie_mpm_particle:
    description: The simulation begins with two distinct rectangular blocks of particles, one blue and
      one orange, positioned side-by-side. Over time, the sharp boundaries of these blocks begin to blur
      and deform as the particles shift. The rectangular shapes gradually transition into more rounded,
      organic, and irregular blobs. By the final frame, the two clusters have merged into a single, continuous,
      and roughly oval-shaped mass with a distinct color split.
    objects: The scene contains two primary clusters of particles, one blue and one orange. Initially,
      the blue cluster is a sharp rectangle on the left, and the orange cluster is a sharp rectangle on
      the right. As the simulation progresses, both clusters lose their geometric edges and expand into
      irregular, rounded shapes. In the final state, the two clusters are joined together to form a single,
      large, bi-colored oval.
