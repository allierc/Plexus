general: {name: material_coalesce, seed: 0, n_frames: 500, dt: 0.0036, boundary: wall}
sets:
  cell:
    n: 2
    start: [0.5, 0.54, 0.5, 0.54]
    types:
      a:
        fraction: 0.5
        youngs: 200
        block: [0.3, 0.44, 0.5, 0.64]
        layers:
        - {frac: 1.0, youngs: 200, material: liquid}
      b:
        fraction: 0.5
        youngs: 200
        block: [0.5, 0.44, 0.7, 0.64]
        layers:
        - {frac: 1.0, youngs: 200, material: liquid}
  mpm_particle: {parent: cell, per_parent: 3500, radius: 0.24, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 0.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.12, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 30, wall_damp: 1.0}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 1.0, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with two distinct, sharp-edged rectangular blocks of blue and orange. Over time, the boundaries of these shapes become increasingly rounded and irregular. The two shapes gradually merge at their center, losing their clear separation. By the final frame, the two colors have blended into a single, unified amorphous blob.
    objects: 'The scene contains two primary objects: a blue shape on the left and an orange shape on the right. Initially, both objects are large, solid rectangles with straight edges. As the simulation progresses, the objects shrink slightly in area while their perimeters become wavy and organic. In the final state, the two objects are joined into a single composite entity with a shared central boundary.'
  movie_mpm_particle:
    description: The simulation begins with two distinct rectangular blocks of particles, one blue and one orange, positioned side-by-side. As time progresses, the sharp boundaries of the rectangles begin to blur and deform into irregular, rounded shapes. The particles shift and reorganize, causing the two masses to merge slightly at their center. By the final frame, the two clusters have settled into a cohesive, pill-shaped formation with a clearly defined interface.
    objects: There are two primary clusters of particles in the scene. The left cluster is composed of blue particles and starts as a rectangle before becoming an irregular blob. The right cluster is composed of orange particles and undergoes a similar transformation from a rectangle to a rounded shape. Both clusters are roughly equal in size and maintain a side-by-side arrangement throughout the simulation.
