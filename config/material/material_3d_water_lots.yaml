fields:
  mpm_grid: {frame: mpm_grid, n_grid: 96}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 16.0}
- {op: mpm_strain, at: mpm_particle, dt_sub: 0.0002}
- {op: p2g, at: mpm_particle, to: mpm_grid, dt_sub: 0.0002, drag: 0.05, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, dt_sub: 0.0002, wall_damp: 0.9}
- {op: g2p, at: mpm_particle, from: mpm_grid, dt_sub: 0.0002, wall_damp: 1.0, wall_contact: 0.04, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- {substep: 18, dt: 0.0002, steps: [mpm_strain, p2g, mpm_grid_update, g2p]}
