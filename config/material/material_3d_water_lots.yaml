# material_3d_water_lots -- a BIG body of water: 27 liquid cubes (3x3x3), ~94500 particles,
# each cube a DISTINCT colour (same material -> colour just tags the cube so you can watch
# them merge/mix), launched with per-cube velocity and dropped in a box -> a large splash.
