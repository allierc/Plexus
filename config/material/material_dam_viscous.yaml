# material_dam_viscous -- auto-ported from prototype/water (overnight_suite:ob_dam_viscous).
general: {name: material_dam_viscous, seed: 0, n_frames: 900, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 1
    start: [0.17, 0.4, 0.17, 0.4]
    types:
      honey:
        fraction: 1.0
        youngs: 300
        block: [0.04, 0.03, 0.3, 0.78]
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 9000, radius: 0.3, density: 1.0}
fields: {}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
