general: {name: material_crown_splash, seed: 0, n_frames: 900, dt: 1.0, boundary: wall}
sets:
  cell:
    n: 2
    start: [0.5, 0.86, 0.5, 0.86]
    types:
      water:
        fraction: 0.5
        youngs: 300
        block: [0.03, 0.03, 0.97, 0.38]
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
      ball:
        fraction: 0.5
        youngs: 500
        layers:
        - {frac: 1.0, youngs: 500, material: elastic}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.1, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle, dt_sub: 0.0001326}
- {op: p2g, at: mpm_particle, to: mpm_grid, dt_sub: 0.0001326, drag: 0.1, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, dt_sub: 0.0001326, surface_tension: 10, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, dt_sub: 0.0001326, wall_damp: 0.5, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep: 28
  dt: 0.0001326
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
