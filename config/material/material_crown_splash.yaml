      entirely hidden beneath the blue textured layer.
    objects: A large orange sphere composed of small dots represents the sun. A wide blue rectangular
      field of dots at the bottom represents the ocean. The blue field is arranged horizontally and features
      a wavy top edge. The orange sphere is centered horizontally and moves vertically through the white
      space.
