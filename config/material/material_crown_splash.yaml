descriptions:
  movie_cell:
    description: 'An orange sphere starts high in the white space above a blue rectangular base.

      The sphere moves downward toward the blue base over the course of the sequence.

      As it descends, the top edge of the blue base begins to deform into a wave-like shape.

      The sphere eventually settles into the center of the blue base, which has formed a peak around it.'
