general:
  name: material_vessel_1
  seed: 0
  n_frames: 1000
  dt: 0.0036
  boundary: wall
  obstacles:
  - [0.58, 0.15, 0.64, 1.0]
sets:
  cell:
    n: 1
    start: [0.28, 0.72, 0.28, 0.72]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.22, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.18, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 0.0, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.5, wall_contact: 0.05, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A blue spherical particle is initially positioned to the left of a vertical grey bar. As time progresses, the particle moves toward the bar and begins to deform upon contact. The particle eventually flattens and spreads out along the bottom of the frame, forming a horizontal layer. The grey bar remains stationary throughout the entire duration of the simulation.
    objects: The primary object is a light blue spherical particle that changes shape into a flat, irregular layer. A vertical grey bar serves as a stationary boundary or obstacle in the center of the scene. The background is a plain white field that provides high contrast for the moving elements. The blue material transitions from a compact, circular topology to a wide, elongated horizontal distribution.
  movie_mpm_particle:
    description: A large cluster of blue particles initially forms a circular shape in the upper left of the frame. As time progresses, the cluster collapses and spreads rapidly toward the bottom of the container. A vertical grey bar descends into the expanding blue mass, causing the particles to accumulate around its base. By the final frame, the blue particles have settled into a thin, uneven layer across the bottom of the space.
    objects: The primary objects are numerous small, light-blue particles that behave like a fluid or granular material. A single, solid grey rectangular bar is positioned vertically in the center-right of the scene. The background is a plain white space that serves as the container for the simulation. The blue particles are densely packed in some areas and sparse in others, while the grey bar remains a constant, uniform size.
