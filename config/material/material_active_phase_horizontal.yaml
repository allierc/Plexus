fields:
  activation: {frame: grid, res: 128}
  direction: {frame: vector_grid, source: material/dir_horizontal.tif}
  mpm_grid: {frame: mpm_grid, n_grid: 128}
  delay_map: {frame: image, source: material/delay_x.tif}
general: {boundary: wall, dt: 1.0, n_frames: 250, name: material_active_phase_horizontal,
  seed: 0}
operators:
- {at: cell, op: aggregate}
- {op: phase_delay_pulse, at: activation, delay_from: delay_map, max_delay: 60.0,
  period: 150.0, duration: 30.0}
- {amplitude: 10.0, at: mpm_particle, direction_from: direction, from: activation,
  op: pulse_to_active_stress}
- {at: mpm_particle, k: 30.0, op: mpm_drag}
- {at: mpm_particle, dt_sub: 0.0002, op: mpm_strain}
- {a_max: 200, at: mpm_particle, drag: 0.0, dt_sub: 0.0002, op: p2g, to: mpm_grid}
- {at: mpm_grid, dt_sub: 0.0002, op: mpm_grid_update, wall_contact: 0.06, wall_damp: 0.5}
- {at: mpm_particle, dt_sub: 0.0002, from: mpm_grid, op: g2p, wall_contact: 0.06,
  wall_damp: 0.5}
schedule:
- aggregate
- phase_delay_pulse
- pulse_to_active_stress
- mpm_drag
- dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
  substep: 10
sets:
  cell:
    n: 1
    start:
    - [0.5, 0.5]
    types:
      sheet:
        block: [0.15, 0.15, 0.85, 0.85]
        fraction: 1.0
        youngs: 80
  mpm_particle: {density: 1.0, parent: cell, per_parent: 16384}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_activation:
    description: A vertical white gradient bar shifts from the left side of the frame toward the right.
      The bar maintains a consistent width and intensity as it moves across the black background. By the
      final frame, the white gradient has moved almost entirely out of view to the right. The motion is
      smooth and linear, representing a steady translation of a field or object.
    objects: The primary object is a vertical white gradient bar with soft, blurred edges. It is positioned
      against a solid black background that fills the entire frame. The bar is large, occupying approximately
      one-third of the horizontal space at its peak. The color transitions smoothly from pure white in
      the center to black at the outer boundaries.
  movie_cell:
    description: The simulation shows a static distribution of blue particles within a square boundary.
      There is no observable movement or evolution of the particles across the provided keyframes. The
      spatial arrangement of the blue dots remains constant throughout the sequence. The overall density
      and pattern of the field do not change over time.
    objects: The scene contains a large number of small, blue circular particles. These particles are
      arranged in a dense, stochastic distribution that fills a square area. The particles are disconnected
      from one another, forming a granular texture. Each individual particle is uniform in size and color,
      creating a consistent blue field.
  movie_mpm_particle:
    description: The simulation shows a dense field of blue particles distributed uniformly across a square
      domain. Over the course of the video, the particles exhibit a high-frequency, stochastic jittering
      motion. There is no discernible global flow or large-scale structural evolution in the distribution.
      The overall density and spatial occupancy of the particles remain constant throughout the sequence.
    objects: The scene contains a large number of small, individual blue dots. These particles are arranged
      in a random, non-connected distribution across the entire frame. Each particle is approximately
      the same size and maintains a consistent blue hue. The particles do not form clusters or chains,
      appearing as a homogeneous point cloud.
