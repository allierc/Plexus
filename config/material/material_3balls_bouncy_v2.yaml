# material_3balls_bouncy_v2 -- like material_3balls_bouncy but each ball gets a DIFFERENT
# initial launch velocity (vel_init), so they fly off in different directions and
# bounce around the box. Damping near-off (drag 0, wall_damp 1.0); stiff elastic rebound.
general:
  {
    name: material_3balls_bouncy_v2,
    seed: 1,
    n_frames: 1500,
    dt: 0.5,
    boundary: wall,
  }
sets:
  cell:
    n: 3
    start: [[0.25, 0.6], [0.5, 0.78], [0.75, 0.58]]
    types:
      a: { fraction: 0.3334, youngs: 600 }
      b: { fraction: 0.3333, youngs: 600 }
      c: { fraction: 0.3333, youngs: 600 }
  mpm_particle:
    {
      parent: cell,
      per_parent: 3000,
      radius: 0.085,
      density: 1.0,
      vel_init: 0.25,
    }
fields:
  mpm_grid: { frame: mpm_grid, n_grid: 128 }
operators:
  - { op: aggregate, at: cell }
  - { op: gravity, at: cell, g: 9.0 }
  - { op: mpm_strain, at: mpm_particle, dt_sub: 0.0001 }
  - {
      op: p2g,
      at: mpm_particle,
      to: mpm_grid,
      dt_sub: 0.0001,
      drag: 0.0,
      a_max: 200,
    }
  - {
      op: mpm_grid_update,
      at: mpm_grid,
      dt_sub: 0.0001,
      surface_tension: 0.0,
      wall_damp: 1.0,
    }
  - {
      op: g2p,
      at: mpm_particle,
      from: mpm_grid,
      dt_sub: 0.0001,
      wall_damp: 1.0,
      wall_contact: 0.04,
      vmax: 1000000000.0,
    }
schedule:
  - aggregate
  - gravity
  - { substep: 30, dt: 0.0001, steps: [mpm_strain, p2g, mpm_grid_update, g2p] }
plotting:
  background: black
  colormap: tab10

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description:
      Three colored circular particles are initially arranged in a triangular formation. Over
      time, the particles move toward each other and converge into a linear horizontal arrangement. The
      orange particle moves from the top center to the left side of the group. Finally, the blue and green
      particles shift to the right, resulting in a horizontal line of orange, blue, and green.
    objects:
      The scene contains three distinct circular particles of approximately equal size. The particles
      are colored blue, orange, and green. Initially, they are arranged in a triangular pattern with the
      orange particle at the apex. By the end of the sequence, they are aligned horizontally in an orange-blue-green
      order.
  movie_mpm_particle:
    description:
      The three clusters of particles begin in a triangular formation with the orange cluster
      at the top. Over time, the orange cluster moves downward and to the left, while the blue cluster
      moves toward the center. The green cluster remains relatively stationary on the right side of the
      frame. By the final frame, the orange and blue clusters have merged into a single group on the left,
      while the green cluster remains isolated on the right.
    objects:
      There are three distinct clusters of small particles, each forming a roughly spherical shape.
      The clusters are colored blue, orange, and green. Each cluster is approximately the same size and
      contains a dense concentration of individual points. The clusters are initially separated in space
      but move toward each other as the simulation progresses.
