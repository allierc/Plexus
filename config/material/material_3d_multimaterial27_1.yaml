# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_mpm_particle:
    description: The simulation begins with several distinct clusters of particles arranged in a structured
      grid within a 3D bounding box. Over time, the particles begin to move and deform, losing their initial
      geometric organization. The blue and white clusters expand and merge into larger, more amorphous
      shapes while the brown clusters shift positions. By the final frame, the particles have settled
      into a complex, interconnected network of flowing streams and dense masses.
    objects: 'There are three distinct sets of particles: blue, white, and brown. The blue particles form
      a large, sprawling mass that eventually spreads across the bottom of the volume. The white particles
      start as a vertical column and a cluster, eventually merging into a central, dense group. The brown
      particles appear as smaller, isolated clusters that remain relatively compact but shift their positions
      throughout the sequence. All particle sets are composed of small, individual points that aggregate
      to form larger, cloud-like structures.'
