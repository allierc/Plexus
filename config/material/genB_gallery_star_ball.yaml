# genB_gallery_star_ball -- authored from the 110 CONFIG SPECS + their captions only
# (no source code). Retrieved bases: material_crown_splash (an ELASTIC ball falling
# under gravity -- copy its proven MPM params) + material_steps_1 (a body falling onto
# a static OBSTACLE). Adapted with overrides: obstacle -> a single circle (rigid ball),
# material -> elastic, colour -> red, shape -> a "+"-cross star. Intent: a red elastic
# star falls under gravity onto a fixed rigid ball.
general:
  name: genB_gallery_star_ball
  seed: 0
  n_frames: 600
  dt: 0.0023868
  boundary: wall
  obstacles:
  - [0.5, 0.30, 0.12]              # fixed rigid ball (a single circular obstacle)
sets:
  cell:
    n: 2
    start: [0.5, 0.82, 0.5, 0.82]
    types:
      star_v: {fraction: 0.5, youngs: 200, block: [0.47, 0.70, 0.53, 0.96], layers: [{frac: 1.0, youngs: 200, material: elastic}]}
      star_h: {fraction: 0.5, youngs: 200, block: [0.39, 0.80, 0.61, 0.86], layers: [{frac: 1.0, youngs: 200, material: elastic}]}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.12, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.1, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 10, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.5, wall_contact: 0.06, vmax: 1.0e9}
schedule:
- aggregate
- gravity
- {substep_dt: 0.0001326, steps: [mpm_strain, p2g, mpm_grid_update, g2p]}
plotting:
  colors: {star_v: [0.9, 0.12, 0.12], star_h: [0.9, 0.12, 0.12]}
  background: white

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
