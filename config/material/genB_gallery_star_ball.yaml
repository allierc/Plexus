      The orange bar begins to rotate clockwise while the blue bar remains vertical.

      The blue bar then begins to rotate clockwise along with the orange bar.

      The entire cross structure rotates until it is tilted at a 45-degree angle and moves to the right of the circle.'
    objects: 'There is a blue vertical bar that is medium in size.

      There is an orange horizontal bar that is medium in size and intersects the blue bar.

      There is a large grey circle located below the cross structure.

      The cross structure is composed of the blue and orange bars intersecting at their centers.'
  movie_mpm_particle:
    description: 'The blue vertical bar and orange horizontal bar start as a perpendicular cross.

      The orange bar begins to rotate clockwise around the center of the blue bar.

      The blue bar simultaneously begins to rotate clockwise around the center of the orange bar.

      The entire cross structure rotates clockwise while the grey circle remains stationary.'
    objects: 'The scene contains a blue vertical bar and an orange horizontal bar.

      The blue and orange bars are arranged in a cross shape at the top of the frame.

      A large grey circle is positioned at the bottom of the frame.

      The bars are smaller in size compared to the grey circle.'
