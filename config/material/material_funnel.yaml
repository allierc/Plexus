# material_funnel -- auto-ported from prototype/water (overnight_suite:ob_funnel).
general:
  name: material_funnel
  seed: 0
  n_frames: 1000
  dt: 1.0
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.18, 1.0]
  - [0.18, 0.0, 0.28, 0.62]
  - [0.28, 0.0, 0.38, 0.42]
  - [0.38, 0.0, 0.45, 0.26]
  - [0.55, 0.0, 0.62, 0.26]
  - [0.62, 0.0, 0.72, 0.42]
  - [0.72, 0.0, 0.82, 0.62]
  - [0.82, 0.0, 1.0, 1.0]
sets:
