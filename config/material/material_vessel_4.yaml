general:
  name: material_vessel_4
  seed: 0
  n_frames: 1300
  dt: 1.0
  boundary: wall
  obstacles:
  - [0.58, 0.15, 0.64, 1.0]
sets:
  cell:
    n: 1
    start: [0.27, 0.52, 0.27, 0.52]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.23, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle, dt_sub: 0.0002}
- {op: p2g, at: mpm_particle, to: mpm_grid, dt_sub: 0.0002, drag: 0.35, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, dt_sub: 0.0002, surface_tension: 18.0, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, dt_sub: 0.0002, wall_damp: 0.5, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep: 18
  dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A large blue sphere is initially positioned to the left of a vertical grey bar. As time
      progresses, the sphere rapidly deforms and expands into a horizontal blue mass at the bottom of
      the frame. This blue mass eventually settles into a relatively flat, irregular shape along the base.
      The vertical grey bar remains stationary throughout the entire transformation.
    objects: A large, circular blue sphere occupies the left side of the initial frame. A thin, vertical
      grey bar stands upright in the center-right of the scene. A horizontal blue mass forms at the bottom,
      expanding from the sphere's position. The background is a plain white field that provides contrast
      for the blue and grey elements.
  movie_mpm_particle:
    description: A large cluster of blue particles initially forms a circular shape on the left side of
      the frame. As time progresses, the particles rapidly disperse and fall toward the bottom of the
      container. The particles eventually settle into a horizontal layer at the base, with a small amount
      remaining on the right wall. A vertical grey bar remains stationary throughout the entire duration
      of the simulation.
    objects: The blue particles are small, individual dots that form a large, dense cluster in the first
      frame. These particles are light blue in color and move independently to fill the bottom of the
      space. A single, thick grey bar is positioned vertically in the center-right of the frame. The background
      is a plain white surface that provides a high-contrast environment for the moving particles.
