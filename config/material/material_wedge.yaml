# material_wedge -- auto-ported from prototype/water (overnight_suite:ob_wedge).
general:
  name: material_wedge
  seed: 0
  n_frames: 1100
  dt: 1.0
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.2, 0.45]
  - [0.2, 0.0, 0.4, 0.35]
  - [0.4, 0.0, 0.6, 0.25]
  - [0.6, 0.0, 0.8, 0.15]
  - [0.8, 0.0, 1.0, 0.06]
sets:
  cell:
    n: 1
    start: [0.2, 0.7, 0.2, 0.7]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.2, density: 1.0}
fields: {}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mls_mpm_mechanics, at: mpm_particle, n_grid: 128, substeps: 18, dt_sub: 0.0002, a_max: 200, drag: 0.3, wall_damp: 0.5,
  wall_contact: 0.06, surface_tension: 12}
schedule: [aggregate, gravity, mls_mpm_mechanics]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A large blue sphere is positioned above a grey stepped structure. As time progresses,
      the sphere begins to descend towards the steps. The sphere eventually makes contact with the top
      of the grey structure. The sphere then appears to merge with or transform into a blue liquid-like
      field that flows over the steps.
    objects: A large, circular blue sphere is the primary moving object in the scene. A grey stepped structure
      is located at the bottom of the frame, composed of four distinct levels. A blue liquid-like field
      emerges and flows over the grey steps in the final frames. The background is a plain white space
      that provides contrast for the objects.
  movie_mpm_particle:
    description: A large cluster of blue particles begins as a spherical mass in the upper left of the
      frame. As time progresses, the cluster descends and spreads out across a series of gray steps. The
      particles flow downward, following the contours of the steps while maintaining a dense, fluid-like
      structure. By the final frame, the particles have settled into a thick layer covering the lower
      steps and the bottom right corner.
    objects: The primary objects are thousands of small, light-blue particles that form a cohesive, granular
      mass. These particles are arranged in a dense cluster that transitions into a flowing, stratified
      layer over time. The background features a set of four large, gray rectangular steps arranged in
      a descending staircase pattern. The steps are solid, opaque, and provide a geometric boundary for
      the movement of the blue particles.
