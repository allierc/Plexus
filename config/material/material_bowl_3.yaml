general:
  name: material_bowl_3
  seed: 0
  n_frames: 1300
  dt: 1.0
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.12, 0.5]
  - [0.12, 0.0, 0.24, 0.38]
  - [0.24, 0.0, 0.36, 0.27]
  - [0.36, 0.0, 0.44, 0.18]
  - [0.56, 0.0, 0.64, 0.18]
  - [0.64, 0.0, 0.76, 0.27]
  - [0.76, 0.0, 0.88, 0.38]
  - [0.88, 0.0, 1.0, 0.5]
sets:
  cell:
    n: 1
    start: [0.5, 0.56, 0.5, 0.56]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 11000, radius: 0.22, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 192}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle, dt_sub: 0.00015}
- {op: p2g, at: mpm_particle, to: mpm_grid, dt_sub: 0.00015, drag: 0.35, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, dt_sub: 0.00015, surface_tension: 4.0, wall_damp: 0.6}
- {op: g2p, at: mpm_particle, from: mpm_grid, dt_sub: 0.00015, wall_damp: 0.6, wall_contact: 0.05, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep: 22
  dt: 0.00015
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
