fields:
  activation: {frame: grid, res: 128}
  direction: {frame: vector_grid, source: material/dir_swirl.tif}
  mpm_grid: {frame: mpm_grid, n_grid: 128}
  delay_map: {frame: image, source: material/map_four_quadrants.tif}
general: {boundary: wall, dt: 0.002, n_frames: 250, name: material_active_phase_quadrants, seed: 0}
operators:
- {at: cell, op: aggregate}
- {op: phase_delay_pulse, at: activation, delay_from: delay_map, max_delay: 60.0, period: 150.0, duration: 30.0}
- {amplitude: 10.0, at: mpm_particle, direction_from: direction, from: activation, op: pulse_to_active_stress}
- {at: mpm_particle, k: 30.0, op: mpm_drag}
- {at: mpm_particle, op: mpm_strain}
- {a_max: 200, at: mpm_particle, drag: 0.0, op: p2g, to: mpm_grid}
- {at: mpm_grid, op: mpm_grid_update, wall_contact: 0.06, wall_damp: 0.5}
- {at: mpm_particle, from: mpm_grid, op: g2p, wall_contact: 0.06, wall_damp: 0.5}
schedule:
- aggregate
- phase_delay_pulse
- pulse_to_active_stress
- mpm_drag
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
sets:
  cell:
    n: 1
    start:
    - [0.5, 0.5]
    types:
      sheet:
        block: [0.15, 0.15, 0.85, 0.85]
        fraction: 1.0
        youngs: 80
  mpm_particle: {density: 1.0, parent: cell, per_parent: 16384}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_activation:
    description: 'The video shows a black background with a gray square that changes its position.

      Initially, the gray square is located in the top right corner of the frame.

      As time progresses, the square moves diagonally towards the bottom left.

      Finally, the square settles in the bottom right corner of the frame.'
    objects: 'The scene contains a single gray square object.

      The square is solid gray in color and has a uniform size.

      It is positioned against a solid black background.

      The square''s position changes relative to the frame''s corners over time.'
  movie_cell:
    description: The simulation shows a dense collection of blue particles distributed within a square boundary. Over the course of the video, the particles undergo subtle stochastic fluctuations in their positions. The overall density and spatial distribution of the blue field remain constant throughout the sequence. There is no discernible global motion or large-scale structural evolution in the system.
    objects: The scene contains a large number of small, blue, irregularly shaped particles. These particles are arranged in a high-density, disordered distribution that fills a square area. Each individual particle is roughly uniform in size and color. The particles are not connected to one another, forming a granular, point-like field.
  movie_mpm_particle:
    description: The simulation shows a static distribution of blue particles within a square boundary. There is no visible movement or evolution of the particles across the four keyframes. The spatial arrangement of the dots remains constant throughout the sequence. The overall density and pattern of the field do not change over time.
    objects: The scene contains a large number of small, blue dots scattered across a white background. These particles are arranged in a stochastic, non-uniform distribution within a square frame. Each individual dot is tiny and appears as a single pixel or a small cluster of pixels. The dots are disconnected from one another, forming a granular field rather than a continuous structure.
