general:
  name: material_bowl_2
  seed: 0
  n_frames: 1300
  dt: 0.0036
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.12, 0.5]
  - [0.12, 0.0, 0.24, 0.38]
  - [0.24, 0.0, 0.36, 0.27]
  - [0.36, 0.0, 0.44, 0.18]
  - [0.56, 0.0, 0.64, 0.18]
  - [0.64, 0.0, 0.76, 0.27]
  - [0.76, 0.0, 0.88, 0.38]
  - [0.88, 0.0, 1.0, 0.5]
sets:
  cell:
    n: 1
    start: [0.5, 0.56, 0.5, 0.56]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.22, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.35, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 16.0, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.5, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: 'A large blue circle appears in the center of a white background with gray stepped borders.

      The circle then transforms into a horizontal blue band that fills the space between the gray borders.

      The blue band gradually darkens in color as the simulation progresses.

      The final frame shows a dark blue band with a vertical extension at the bottom center.'
    objects: 'The primary object is a large, circular blue shape centered in the upper half of the frame.

      The background consists of a white upper region and a gray lower region with a stepped, symmetrical border.

      A horizontal blue band emerges, spanning the width of the central white area.

      A vertical blue column extends downward from the center of the horizontal band in the final frames.'
  movie_mpm_particle:
    description: A large circular cluster of blue particles is initially suspended in the upper half of the frame. As the simulation progresses, this cluster rapidly disintegrates and falls downward. The particles settle into a stepped, symmetrical formation at the bottom of the frame. Finally, the particles stabilize into a solid, tiered structure against a gray background.
    objects: The primary objects are thousands of small, blue, circular particles. These particles are initially arranged in a dense, spherical cluster in the center. They then transition into a structured, symmetrical, stepped formation at the bottom. The background consists of a white upper region and a gray, stepped lower region.
