general: {name: material_central_contraction, seed: 0, n_frames: 450, dt: 1.0, boundary: wall}

# A square elastic sheet (16384 MLS-MPM material points filling [0.15,0.85]^2) that
# is contracted toward its centre by a periodically pulsed active force. The force is
# decomposed into three single-concern operators:
#   pacemaker            (when)  -- a periodic scalar clock p(t) -> H.signals["beat"]
#   pulse_stimulus       (where) -- p(t) x Gaussian(centre,radius) -> activation field
#   pulse_to_contraction (what)  -- amplitude * grad(activation) -> H.part_accel (MPM body force)
# and MPM (mpm_strain / p2g / mpm_grid_update / g2p) is HOW the material responds.
sets:
  cell:
    n: 1
    start: [[0.5, 0.5]]
    types:
      sheet: {fraction: 1.0, youngs: 80, block: [0.15, 0.15, 0.85, 0.85]}
  mpm_particle: {parent: cell, per_parent: 16384, density: 1.0}

fields:
  activation: {frame: grid, res: 128}      # the scalar pulse field (rendered)
  mpm_grid:   {frame: mpm_grid, n_grid: 128}   # MLS-MPM background grid (transient)

operators:
  - {op: aggregate, at: cell}
  - {op: pacemaker,            at: activation, name: beat, period: 150, duration: 30, phase: 0}
  - {op: pulse_stimulus,       at: activation, clock: beat, center: [0.5, 0.5], radius: 0.12}
  - {op: pulse_to_contraction, at: mpm_particle, from: activation, amplitude: 20.0, mode: inward}
  - {op: mpm_drag,        at: mpm_particle, k: 30.0}
  - {op: mpm_strain,      at: mpm_particle, dt_sub: 2.0e-4}
  - {op: p2g,             at: mpm_particle, to: mpm_grid, dt_sub: 2.0e-4, drag: 0.0, a_max: 200}
  - {op: mpm_grid_update, at: mpm_grid, dt_sub: 2.0e-4, wall_damp: 0.5, wall_contact: 0.06}
  - {op: g2p,             at: mpm_particle, from: mpm_grid, dt_sub: 2.0e-4, wall_damp: 0.5, wall_contact: 0.06}

schedule:
  - aggregate
  - pacemaker
  - pulse_stimulus
  - pulse_to_contraction
  - mpm_drag
  - {substep: 10, dt: 2.0e-4, steps: [mpm_strain, p2g, mpm_grid_update, g2p]}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a dense field of blue particles distributed within a square boundary.
      Over time, the particles undergo a subtle redistribution, shifting slightly in position while maintaining
      a high overall density. The distribution remains relatively uniform throughout the sequence, with
      no significant clustering or large-scale movement. The final frame shows a nearly identical state
      to the initial frame, indicating a steady-state or highly localized fluctuation.
    objects: The scene contains a large number of small, blue particles. These particles are arranged
      in a dense, stochastic distribution that fills a square area. Each individual particle is tiny and
      appears as a single pixel or a small cluster of pixels. The particles are not connected to one another,
      forming a granular, cloud-like texture.
  movie_mpm_particle:
    description: The simulation shows a large collection of blue particles distributed within a square
      boundary. Over time, the particles exhibit a subtle shift in their spatial distribution, moving
      from a relatively uniform state toward a more concentrated pattern. A slight increase in density
      is visible in the central region as the simulation progresses. The overall movement appears stochastic,
      with individual particles shifting positions while maintaining a general global structure.
    objects: The scene contains thousands of small, blue, point-like particles. These particles are arranged
      in a dense, two-dimensional field that fills a square area. They are not connected to one another,
      appearing as independent agents or points in a continuous field. The size of each individual particle
      is uniform and very small relative to the overall dimensions of the square.
