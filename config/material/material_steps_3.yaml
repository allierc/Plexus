general:
  name: material_steps_3
  seed: 0
  n_frames: 1700
  dt: 0.0036
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.16, 0.34]
  - [0.16, 0.0, 0.32, 0.28]
  - [0.32, 0.0, 0.48, 0.22]
  - [0.48, 0.0, 0.64, 0.16]
  - [0.64, 0.0, 0.8, 0.1]
sets:
  cell:
    n: 1
    start: [0.11, 0.6, 0.11, 0.6]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 8000, radius: 0.25, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.35, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 12.0, wall_damp: 0.65}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.65, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A large, textured blue sphere is positioned above a grey stepped structure. As the simulation progresses, the sphere rapidly shrinks in size. The sphere eventually disappears from the frame entirely. The grey stepped structure remains stationary throughout the entire sequence.
    objects: A large, textured blue sphere is located in the upper left quadrant of the frame. The sphere has a mottled, light blue and white appearance. A grey stepped structure occupies the bottom left corner, consisting of four descending levels. The steps are uniform in width and height, creating a staircase-like pattern.
  movie_mpm_particle:
    description: A large cluster of blue particles initially sits atop a grey stepped structure. As time progresses, the particles begin to flow downward and spread across the steps. The particles eventually form a thin, continuous layer that covers the entire surface of the stairs. By the final frame, the particles have settled into a uniform distribution across the lower levels.
    objects: The scene contains a set of grey steps arranged in a descending staircase pattern. A large collection of small blue particles forms a dense, semi-circular cluster at the start. These blue particles are uniform in size and color throughout the simulation. The grey steps are solid, geometric shapes that provide a static foundation for the moving particles.
