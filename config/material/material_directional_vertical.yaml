fields:
  activation: {frame: grid, res: 128}
  mpm_grid: {frame: mpm_grid, n_grid: 128}
  direction: {frame: vector_grid, source: material/dir_vertical.tif}
general: {boundary: wall, dt: 1.0, n_frames: 250, name: material_directional_vertical,
  seed: 0}
operators:
- {at: cell, op: aggregate}
- {at: activation, duration: 30, name: beat, op: pacemaker, period: 150, phase: 0}
- at: activation
  center: [0.5, 0.5]
  clock: beat
  op: pulse_stimulus
  radius: 0.12
  profile: uniform
- {amplitude: 25.0, at: mpm_particle, from: activation, mode: directional, op: pulse_to_contraction,
  direction_from: direction}
- {at: mpm_particle, k: 30.0, op: mpm_drag}
- {at: mpm_particle, dt_sub: 0.0002, op: mpm_strain}
- {a_max: 200, at: mpm_particle, drag: 0.0, dt_sub: 0.0002, op: p2g, to: mpm_grid}
- {at: mpm_grid, dt_sub: 0.0002, op: mpm_grid_update, wall_contact: 0.06, wall_damp: 0.5}
- {at: mpm_particle, dt_sub: 0.0002, from: mpm_grid, op: g2p, wall_contact: 0.06,
  wall_damp: 0.5}
schedule:
- aggregate
- pacemaker
- pulse_stimulus
- pulse_to_contraction
- mpm_drag
- dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
  substep: 10
sets:
  cell:
    n: 1
    start:
    - [0.5, 0.5]
    types:
      sheet:
        block: [0.15, 0.15, 0.85, 0.85]
        fraction: 1.0
        youngs: 80
  mpm_particle: {density: 1.0, parent: cell, per_parent: 16384}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation shows a static distribution of blue particles within a square boundary.
      There is no observable movement or evolution of the particles across the provided keyframes. The
      spatial arrangement of the blue clusters remains constant throughout the sequence. The overall density
      and pattern of the field do not change over time.
    objects: The scene contains a large collection of small, blue particles. These particles are arranged
      in a dense, stochastic distribution that fills a square area. The individual particles are irregular
      in shape and vary slightly in size. They are not connected to one another but form a continuous,
      textured field.
  movie_mpm_particle:
    description: The video shows a static distribution of blue particles within a square frame. There
      is no visible movement or evolution of the particles over the four keyframes. The spatial arrangement
      of the dots remains constant throughout the sequence. The simulation appears to be a steady-state
      representation of a random point process.
    objects: The scene contains a large number of small, blue circular particles. These particles are
      distributed randomly across a white square background. They are not connected to one another and
      do not form any specific geometric patterns. Each particle is uniform in size and color, creating
      a dense, speckled texture.
