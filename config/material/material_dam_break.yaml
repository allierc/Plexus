general: {name: material_dam_break, seed: 0, n_frames: 900, dt: 0.0036, boundary: wall}
sets:
  cell:
    n: 1
    start: [0.17, 0.4, 0.17, 0.4]
    types:
      water:
        fraction: 1.0
        youngs: 300
        block: [0.04, 0.03, 0.3, 0.78]
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 9000, radius: 0.3, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.08, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 10, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.5, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A large blue rectangular block initially occupies the left side of the frame. It then rapidly transforms into a complex, irregular shape that stretches across the bottom of the screen. The shape continues to evolve, developing a prominent peak on the right side and a long, thin tail extending toward the top right. Finally, the structure settles into a low, undulating horizontal band with a small peak on the left.
    objects: The primary object is a large, solid blue mass that changes its geometry significantly over time. It starts as a vertical rectangle and transitions into a horizontal, organic-looking shape. The color remains a consistent light blue throughout the entire simulation. The size of the object remains relatively constant in terms of area, but its proportions shift from vertical to horizontal.
  movie_mpm_particle:
    description: A dense rectangular block of blue particles is initially positioned on the left side of the frame. Over time, the block undergoes a dramatic transformation, breaking apart and spreading across the bottom of the screen. The particles eventually form a thin, irregular layer that stretches horizontally across the entire base. By the final frame, the particles have settled into a low-profile, undulating shape with a slight peak on the left.
    objects: The scene contains a large collection of small, blue circular particles. Initially, these particles are tightly packed into a vertical rectangular formation. As the simulation progresses, the particles disperse and lose their original geometric structure. In the final state, the particles form a continuous, horizontal band of varying thickness along the bottom edge.
