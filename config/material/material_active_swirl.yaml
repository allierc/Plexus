# Active-stress test (M1): sigma_active = -amplitude * a(x,t) * n n^T  (n = swirl contraction AXIS).
# Counterpart of material_directional_swirl (body force A*a*d). Active stress acts through its
# DIVERGENCE: a uniform axis field makes the sheet SHORTEN along swirl (no net drift) -- vs the
# body-force version which would translate the sheet. Uniform youngs=80 so the motion is purely active.
fields:
  activation: {frame: grid, res: 128}
  mpm_grid: {frame: mpm_grid, n_grid: 128}
  direction: {frame: vector_grid, source: material/dir_swirl.tif}
general: {boundary: wall, dt: 0.002, n_frames: 250, name: material_active_swirl, seed: 0}
operators:
- {at: cell, op: aggregate}
- {at: activation, duration: 30, name: beat, op: pacemaker, period: 150, phase: 0}
- at: activation
  center: [0.5, 0.5]
  clock: beat
  op: pulse_stimulus
  radius: 0.12
  profile: uniform
- {amplitude: 10.0, at: mpm_particle, from: activation, op: pulse_to_active_stress, direction_from: direction}
- {at: mpm_particle, k: 30.0, op: mpm_drag}
- {at: mpm_particle, op: mpm_strain}
- {a_max: 200, at: mpm_particle, drag: 0.0, op: p2g, to: mpm_grid}
- {at: mpm_grid, op: mpm_grid_update, wall_contact: 0.06, wall_damp: 0.5}
- {at: mpm_particle, from: mpm_grid, op: g2p, wall_contact: 0.06, wall_damp: 0.5}
schedule:
- aggregate
- pacemaker
- pulse_stimulus
- pulse_to_active_stress
- mpm_drag
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
sets:
  cell:
    n: 1
    start:
    - [0.5, 0.5]
    types:
      sheet:
        block: [0.15, 0.15, 0.85, 0.85]
        fraction: 1.0
        youngs: 80
  mpm_particle: {density: 1.0, parent: cell, per_parent: 16384}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_activation:
    description: The video shows a black screen with no visible movement or changes. There are no particles, agents, or fields evolving over time. The scene remains static and completely dark throughout the entire duration. No scientific simulation is occurring in this sequence.
    objects: There are no objects present in the scene. The entire frame is a uniform black color. There is no topology or arrangement to describe as the space is empty. The size of any potential objects is zero as they do not exist.
  movie_cell:
    description: The simulation shows a dense collection of blue particles contained within a square boundary. Over the course of the video, the particles undergo subtle stochastic fluctuations in their positions. The overall density and distribution of the blue field remain constant throughout the sequence. There is no significant macroscopic movement or structural change observed in the system.
    objects: The scene contains a large number of small, blue particles. These particles are arranged in a dense, disordered distribution that fills a square area. Each individual particle is tiny and appears as a single pixel or a small cluster of pixels. The particles are not connected to one another, forming a granular and homogeneous field.
  movie_mpm_particle:
    description: The simulation shows a dense field of blue particles distributed uniformly across a square domain. Over time, the particles exhibit very subtle fluctuations in their spatial distribution. The overall density and pattern of the field remain nearly constant throughout the sequence. There is no significant movement, clustering, or large-scale evolution of the particles.
    objects: The scene contains a large number of small, individual blue dots. These particles are arranged in a stochastic, non-connected distribution across the entire frame. Each particle is uniform in size and color, appearing as a distinct point of light. The particles are bounded within a square area, maintaining a consistent spatial occupancy.
