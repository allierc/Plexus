general:
  name: material_zigzag
  seed: 0
  n_frames: 1100
  dt: 0.0036
  boundary: wall
  obstacles:
  - [0.0, 0.66, 0.66, 0.72]
  - [0.34, 0.4, 1.0, 0.46]
  - [0.0, 0.16, 0.66, 0.22]
sets:
  cell:
    n: 1
    start: [0.18, 0.82, 0.18, 0.82]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 7000, radius: 0.1, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.25, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 12, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.5, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A blue fluid-like substance initially appears as a circular blob in the upper left corner. It then stretches horizontally to the right while simultaneously dripping downwards into a lower section. As the simulation progresses, the blue substance expands and flows more freely across the horizontal gray bars. By the final frame, the blue substance has formed a complex, interconnected network of drips and pools across the three gray levels.
    objects: The scene contains three horizontal gray bars of equal thickness and length, arranged vertically. A blue substance, which changes from a solid circle to a fluid shape, interacts with these bars. The blue substance is light blue in color and varies in size as it spreads and drips. The gray bars are static, rectangular, and serve as the structural framework for the fluid's movement.
  movie_mpm_particle:
    description: A large mass of blue particles begins as a single concentrated sphere at the top left. The mass then flows horizontally to the right, spilling over the edge of a gray platform. As it falls, it splits and spreads across multiple lower gray platforms in a cascading motion. By the final frame, the particles have distributed themselves across three distinct levels, forming horizontal layers.
    objects: The primary objects are thousands of small blue particles that form a fluid-like mass. There are three solid gray rectangular platforms arranged in a staggered, descending formation. The top platform is the longest and positioned at the highest elevation. The middle and bottom platforms are shorter and shifted to the right, creating a stepped structure for the particles to fall onto.
