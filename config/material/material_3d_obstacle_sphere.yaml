# material_3d_obstacle_sphere -- 3D MLS-MPM with fixed obstacles (no-slip box/sphere solids).
general:
  name: material_3d_obstacle_sphere
  seed: 0
  n_frames: 320
  dt: 0.0036
  boundary: wall
  dim: 3
  world: [1.0, 1.0, 1.0]
  obstacles:
  - [0.5, 0.3, 0.5, 0.13]
sets:
  cell:
    n: 1
    types:
      water: {fraction: 1.0, youngs: 200, block: [0.36, 0.58, 0.36, 0.64, 0.86, 0.64], layers: [{frac: 1.0, youngs: 200, material: liquid}]}
  mpm_particle: {parent: cell, per_parent: 16000, radius: 0.05, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 96}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 14.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.05, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, wall_damp: 0.9}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.9, wall_contact: 0.04, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- {substep_dt: 0.0002, steps: [mpm_strain, p2g, mpm_grid_update, g2p]}
plotting:
  background: black
  up_axis: 1
  camera_elev: 1.18
  camera_turns: 0.0
  camera_zoom: 0.0
  render_3d: dots
  dot_size: 1.2
  splat_res: 620
  box_frame: true
  fps: 60
  hide_sets: [cell]
  colors:
    water: [0.30, 0.62, 1.0]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_mpm_particle:
    description: A blue cluster of particles initially occupies the upper half of a cubic volume. Over time, the cluster descends toward the bottom surface, gradually flattening into a thin layer. A smaller, spherical cluster of grey particles is positioned directly beneath the blue mass and is eventually enveloped by it. By the final frame, the blue particles have spread out to cover the entire bottom face of the cube.
    objects: The primary object is a large, dense cluster of blue particles that changes shape from a cube to a flat sheet. A secondary, smaller spherical cluster of grey particles is located in the center of the cube. Both sets of particles are contained within a large, transparent white wireframe cube. The blue particles are significantly more numerous and larger in total volume than the grey particles.
