fields:
  activation: {frame: grid, res: 128}
  mpm_grid: {frame: mpm_grid, n_grid: 128}
  direction: {frame: vector_grid, source: material/dir_swirl.tif}
general: {boundary: wall, dt: 1.0, n_frames: 250, name: material_directional_swirl,
  seed: 0}
operators:
- {at: cell, op: aggregate}
- {at: activation, duration: 30, name: beat, op: pacemaker, period: 150, phase: 0}
- at: activation
  center: [0.5, 0.5]
  clock: beat
  op: pulse_stimulus
  radius: 0.12
  profile: uniform
- {amplitude: 25.0, at: mpm_particle, from: activation, mode: directional, op: pulse_to_contraction,
  direction_from: direction}
- {at: mpm_particle, k: 30.0, op: mpm_drag}
- {at: mpm_particle, dt_sub: 0.0002, op: mpm_strain}
- {a_max: 200, at: mpm_particle, drag: 0.0, dt_sub: 0.0002, op: p2g, to: mpm_grid}
- {at: mpm_grid, dt_sub: 0.0002, op: mpm_grid_update, wall_contact: 0.06, wall_damp: 0.5}
- {at: mpm_particle, dt_sub: 0.0002, from: mpm_grid, op: g2p, wall_contact: 0.06,
  wall_damp: 0.5}
schedule:
- aggregate
- pacemaker
- pulse_stimulus
- pulse_to_contraction
- mpm_drag
- dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
  substep: 10
sets:
  cell:
    n: 1
    start:
    - [0.5, 0.5]
    types:
      sheet:
        block: [0.15, 0.15, 0.85, 0.85]
        fraction: 1.0
        youngs: 80
  mpm_particle: {density: 1.0, parent: cell, per_parent: 16384}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a dense, square-shaped cluster of blue particles. Over time,
      the entire cluster undergoes a slight clockwise rotation. The internal distribution of the particles
      remains relatively stable throughout the sequence. The overall shape and density of the blue field
      do not change significantly.
    objects: The scene contains a single large, square-shaped cluster of particles. The particles are
      a consistent medium blue color against a white background. They are arranged in a dense, stochastic
      distribution that fills the square area. Each individual particle is small and irregular in shape,
      creating a textured appearance.
  movie_mpm_particle:
    description: The simulation shows a large collection of blue particles distributed within a square
      boundary. Over time, the entire square region undergoes a slight clockwise rotation. The density
      and distribution of the particles remain constant throughout the sequence. The background remains
      a solid white color as the shape rotates.
    objects: The scene contains thousands of small, blue dots representing individual particles. These
      particles are arranged in a dense, stochastic distribution across a square area. The particles are
      uniform in size and color, appearing as a fine mist or noise. The overall shape is a large, slightly
      tilted square composed of these discrete points.
