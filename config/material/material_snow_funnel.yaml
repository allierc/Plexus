general:
  name: material_snow_funnel
  seed: 0
  n_frames: 900
  dt: 0.00375
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.18, 1.0]
  - [0.18, 0.0, 0.3, 0.55]
  - [0.3, 0.0, 0.42, 0.32]
  - [0.58, 0.0, 0.7, 0.32]
  - [0.7, 0.0, 0.82, 0.55]
  - [0.82, 0.0, 1.0, 1.0]
sets:
  cell:
    n: 1
    start: [0.5, 0.8, 0.5, 0.8]
    types:
      snow:
        fraction: 1.0
        youngs: 250
        layers:
        - {frac: 1.0, youngs: 250, material: snow}
  mpm_particle: {parent: cell, per_parent: 6000, radius: 0.18, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.2, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 0, wall_damp: 0.5}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.5, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0001875
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: A blue circular particle is initially centered within a white rectangular frame. The particle then undergoes a rapid transformation, stretching vertically into a series of blue segments. These segments appear to move downward while the white frame remains stationary. Finally, the blue shapes settle into a fragmented, vertical column at the bottom of the frame.
    objects: The scene contains a large white rectangular frame that serves as the background. A blue circular particle is the primary dynamic object in the first frame. In subsequent frames, this particle transforms into multiple smaller blue rectangular segments. These blue segments are arranged vertically and decrease in size as they move toward the bottom.
  movie_mpm_particle:
    description: A large circular cluster of blue particles is initially centered in a white rectangular area. The cluster then rapidly disintegrates and moves downward into a narrower white channel. As it descends, the particles spread out and form a dense, horizontal band across the channel. Finally, the particles continue to fall, settling into a smaller, concentrated mass at the bottom of the channel.
    objects: The scene contains a large, circular cluster of blue particles at the top. A white rectangular background provides a container for the initial particle distribution. A narrower white channel is positioned below the rectangle to guide the falling particles. The blue particles are small, individual points that aggregate into larger, distinct shapes as they move.
