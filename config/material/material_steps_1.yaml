general:
  name: material_steps_1
  seed: 0
  n_frames: 1000
  dt: 0.0036
  boundary: wall
  obstacles:
  - [0.0, 0.0, 0.142, 0.46]
  - [0.142, 0.0, 0.285, 0.39]
  - [0.285, 0.0, 0.428, 0.32]
  - [0.428, 0.0, 0.571, 0.25]
  - [0.571, 0.0, 0.714, 0.18]
  - [0.714, 0.0, 0.857, 0.11]
  - [0.857, 0.0, 1.0, 0.04]
sets:
  cell:
    n: 1
    start: [0.1, 0.8, 0.1, 0.8]
    types:
      water:
        fraction: 1.0
        youngs: 300
        layers:
        - {frac: 1.0, youngs: 300, material: liquid}
  mpm_particle: {parent: cell, per_parent: 6000, radius: 0.2, density: 1.0}
fields:
  mpm_grid: {frame: mpm_grid, n_grid: 128}
operators:
- {op: aggregate, at: cell}
- {op: gravity, at: cell, g: 12.0}
- {op: mpm_strain, at: mpm_particle}
- {op: p2g, at: mpm_particle, to: mpm_grid, drag: 0.3, a_max: 200}
- {op: mpm_grid_update, at: mpm_grid, surface_tension: 30.0, wall_damp: 0.4}
- {op: g2p, at: mpm_particle, from: mpm_grid, wall_damp: 0.4, wall_contact: 0.06, vmax: 1000000000.0}
schedule:
- aggregate
- gravity
- substep_dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: 'A blue, textured sphere is positioned in the upper left corner of the frame.

      A grey, stepped structure occupies the bottom left and center of the image.

      The blue sphere remains stationary while the grey steps appear to be a static background element.

      The background is white, providing a high-contrast environment for the two primary objects.'
    objects: 'The blue sphere is a large, circular object with a mottled, icy texture.

      The grey structure consists of five distinct rectangular steps arranged in a descending staircase pattern.

      The steps are solid grey and vary in width to create a diagonal downward slope.

      The white background is a uniform, empty space that surrounds the two main objects.'
  movie_mpm_particle:
    description: A large cluster of blue particles is initially located in the upper-left corner of the frame. As the simulation progresses, these particles begin to descend and spread out across the lower half of the screen. They interact with a grey, stepped geometric structure, accumulating along its upper edges. By the final frame, the particles have mostly settled into a thin layer following the downward slope of the steps.
    objects: The primary objects are numerous small, blue circular particles that form a dense cloud. A large, solid grey geometric shape occupies the bottom-left area, consisting of a series of descending rectangular steps. The background is a plain, solid white field that provides high contrast for the moving elements. The blue particles vary in density, appearing as a concentrated mass at the start and a dispersed layer at the end.
