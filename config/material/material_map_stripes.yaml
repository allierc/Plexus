fields:
  activation: {frame: grid, res: 128}
  mpm_grid: {frame: mpm_grid, n_grid: 128}
  stiffness_map: {frame: image, source: material/map_stripes.tif}
general: {boundary: wall, dt: 1.0, n_frames: 250, name: material_map_stripes, seed: 0}
operators:
- {at: cell, op: aggregate}
- {op: apply_material_map, at: mpm_particle, from: stiffness_map, target: youngs,
  min: 20, max: 200}
- {at: activation, duration: 30, name: beat, op: pacemaker, period: 150, phase: 0}
- at: activation
  center: [0.5, 0.5]
  clock: beat
  op: pulse_stimulus
  radius: 0.12
- {amplitude: 20.0, at: mpm_particle, from: activation, mode: inward, op: pulse_to_contraction}
- {at: mpm_particle, k: 30.0, op: mpm_drag}
- {at: mpm_particle, dt_sub: 0.0002, op: mpm_strain}
- {a_max: 200, at: mpm_particle, drag: 0.0, dt_sub: 0.0002, op: p2g, to: mpm_grid}
- {at: mpm_grid, dt_sub: 0.0002, op: mpm_grid_update, wall_contact: 0.06, wall_damp: 0.5}
- {at: mpm_particle, dt_sub: 0.0002, from: mpm_grid, op: g2p, wall_contact: 0.06,
  wall_damp: 0.5}
schedule:
- aggregate
- apply_material_map
- pacemaker
- pulse_stimulus
- pulse_to_contraction
- mpm_drag
- dt: 0.0002
  steps: [mpm_strain, p2g, mpm_grid_update, g2p]
  substep: 10
sets:
  cell:
    n: 1
    start:
    - [0.5, 0.5]
    types:
      sheet:
        block: [0.15, 0.15, 0.85, 0.85]
        fraction: 1.0
        youngs: 80
  mpm_particle: {density: 1.0, parent: cell, per_parent: 16384}

# --- auto: video descriptions (gemma-4-12B) ---
descriptions:
  movie_cell:
    description: The simulation begins with a uniform distribution of blue particles within a square boundary.
      Over time, a subtle inward migration occurs, causing the density of the particles to increase toward
      the center. This central concentration creates a darker, more opaque core while the edges remain
      relatively sparse. The overall distribution maintains a stochastic, noise-like texture throughout
      the entire duration.
    objects: The scene contains a large collection of small, blue particles. These particles are arranged
      in a roughly square formation with irregular, jagged edges. The individual particles are tiny and
      appear as discrete points of color. They are densely packed in the center and more loosely distributed
      toward the periphery.
  movie_mpm_particle:
    description: The simulation begins with a uniform distribution of blue particles across a square domain.
      Over time, the particles begin to cluster toward the center of the space. This central concentration
      becomes increasingly dense as the simulation progresses. By the final frame, a distinct, high-density
      core is visible amidst a sparser surrounding field.
    objects: The scene contains a large number of small, individual blue particles. These particles are
      initially arranged in a random, homogeneous distribution. As time passes, they form a dense, roughly
      circular cluster in the center. The particles maintain their small size and blue color throughout
      the entire evolution.
