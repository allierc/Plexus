# MIX: all three operator families in ONE schedule, one world.
#   reaction_diffusion -> a Gray-Scott morphogen pattern (FIELD)
#   wave_acoustic      -> an acoustic ripple in the same domain (FIELD)
#   active_matter      -> Vicsek particles that flock (SET)         + radius_graph (Rewire)
#   chemotaxis         -> particles climb the morphogen's B channel (EXCHANGE set<->field)
# Flocking and chemotaxis deltas simply SUM on the particle set (the framework's
# 'several operators on one set, deltas add' rule). Mixing is just a longer schedule.
name: mix_world
seed: 1
n_frames: 600
record_every: 3
world: 1.0
fields:
  chem:     {frame: grid, res: 128, channels: 2, bc: periodic}
  acoustic: {frame: grid, res: 128, channels: 3, bc: periodic}
sets:
  active: {n: 3000}
init:
  chem:
    A: 1.0
    B: {seed: clusters, n: 18, radius: 2.0, value: 1.0}
  acoustic:
    rho: {kind: uniform, value: 1.0}
    p: {seed: rings, n: 3}
operators:
  - {op: reaction_diffusion, at: chem, f: 0.058, k: 0.065, substeps: 12}
  - {op: wave_acoustic, at: acoustic, K: 4.0, cfl: 0.30, substeps: 4, sponge: 0.0}
  - {op: radius_graph, at: active, radius: 0.05}
  - {op: active_matter, at: active, v0: 0.004, noise: 0.12}
  - {op: chemotaxis, at: active, from_field: chem, channel: 1, gain: 0.0006}
schedule: [reaction_diffusion, wave_acoustic, radius_graph, active_matter, chemotaxis]
