# Buoyant thermal plume: a hot blob rises and rolls into a mushroom cap.
name: ns_plume
seed: 0
n_frames: 600
record_every: 4
world: 1.0
fields: {fluid: {frame: grid, res: 256, channels: 4, bc: periodic}}
init: {fluid: {preset: plume, cx: 0.5, cy: 0.15, r: 0.07}}
operators:
  - {op: body_force, at: fluid, scalar: 2, g: 40.0, ref: 0.0, dt_sub: 0.006}
  - {op: advect, at: fluid, vel: [0,1], channels: [0,1], dt_sub: 0.006, substeps: 2}
  - {op: diffuse, at: fluid, channels: [0,1], D: 0.00004, dt_sub: 0.012}
  - {op: poisson_solve, at: fluid, vel: [0,1]}
  - {op: advect, at: fluid, vel: [0,1], channels: [2,3], dt_sub: 0.006, substeps: 2}
schedule: [body_force, advect, diffuse, poisson_solve, advect]
