# slime_three -- THREE mutually-repelling species (cross=-1): three territories meet
# at triple junctions. One new species is one new `type` + one auto channel -- no code.
general: {name: slime_three, seed: 0, n_frames: 420, record_every: 4, boundary: wall}
sets:
  cell:
    n: 13000
    spawn: random
    types:
      a: {fraction: 0.3334, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.3333, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.3333, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  trail: {frame: trail, res: 240, deposit: 0.45, decay: 0.035, diffuse: 0.27, couples_to: cell}
operators:
- {op: slime, at: cell, from: trail, to: trail, cross: -1.0}
schedule: [slime, trail.diffuse]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
  background: black
  gamma: 0.7
