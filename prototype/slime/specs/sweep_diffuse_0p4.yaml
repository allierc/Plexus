# sweep_diffuse_0p4 -- trail diffusion weight = 0.4
general: {name: sweep_diffuse_0p4, seed: 0, n_frames: 320, record_every: 4, boundary: wall}
sets:
  cell:
    n: 12000
    spawn: disc
    spawn_radius: 0.3
    types:
      a: {fraction: 1.0, move_speed: 0.006, turn_speed: 0.45, sensor_angle: 28, sensor_dist: 0.025, sensor_size: 1}
fields:
  trail: {frame: trail, res: 220, deposit: 0.9, decay: 0.012, diffuse: 0.4, couples_to: cell}
operators:
  - {op: slime, at: cell, from: trail, to: trail, cross: -1.0}
schedule: [slime, trail.diffuse]
plotting: {colors: {a: [0.20, 0.95, 0.65]}, background: black, gamma: 0.7}
