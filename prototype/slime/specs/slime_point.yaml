# slime_point -- all agents from a single point: a radiating burst that reticulates
# into a network. Decay kept high enough that the spreading front stays a network
# instead of filling and saturating the whole dish.
general: {name: slime_point, seed: 0, n_frames: 400, record_every: 4, boundary: wall}
sets:
  cell:
    n: 12000
    spawn: point
    types:
      a: {fraction: 1.0, move_speed: 0.006, turn_speed: 0.45, sensor_angle: 28, sensor_dist: 0.025, sensor_size: 1}
fields:
  trail: {frame: trail, res: 220, deposit: 0.7, decay: 0.025, diffuse: 0.32, couples_to: cell}
operators:
- {op: slime, at: cell, from: trail, to: trail, cross: -1.0}
schedule: [slime, trail.diffuse]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
  background: black
  gamma: 0.7
