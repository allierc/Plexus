# slime_four -- FOUR mutually-repelling species: the full RGBA-channel showcase
# (Lague's int4 speciesMask). Four colours partition the dish into four domains.
# Lowest deposit + highest decay of the suite: four overlapping channels saturate
# (and additive-blend to white) fastest, so the density must be the most restrained.
general: {name: slime_four, seed: 0, n_frames: 420, record_every: 4, boundary: wall}
sets:
  cell:
    n: 14000
    spawn: random
    types:
      a: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      b: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      c: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
      d: {fraction: 0.25, move_speed: 0.006, turn_speed: 0.42, sensor_angle: 28, sensor_dist: 0.032, sensor_size: 1}
fields:
  trail: {frame: trail, res: 240, deposit: 0.4, decay: 0.04, diffuse: 0.26, couples_to: cell}
operators:
- {op: slime, at: cell, from: trail, to: trail, cross: -1.0}
schedule: [slime, trail.diffuse]
plotting:
  colors:
    a: [0.2, 0.95, 0.65]
    b: [1.0, 0.35, 0.45]
    c: [0.4, 0.65, 1.0]
    d: [1.0, 0.85, 0.3]
  background: black
  gamma: 0.7
