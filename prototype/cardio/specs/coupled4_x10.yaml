general: {name: coupled4_x10, step: 2, seed: 0, n_frames: 7200, dt: 0.1, fps: 24, video_fps: 96, video_stride: 1, record_every: 6, n_cycles: 4, cycle_frames: 1800}
sets:
  tissue_particle:
    layout: grid
    shape: [137, 137]            # 18769 nodes -- same count as the real microscope_cog data
    pattern_wavelength: 14       # ~10-node-equivalent feature size on the larger grid
    k_lo: 0.6
    k_hi: 1.8
    g_lo: 0.4
    g_hi: 1.6
operators:
  - {op: grid_graph, neighbours: 8}
  - {op: trigger_pulse, pulses: [
      {region: [0.0, 0.08, 0.0, 0.08], t_start: 1,    dur: 20, amp: 2.0, mode: set},
      {region: [0.0, 0.08, 0.0, 0.08], t_start: 1801, dur: 20, amp: 2.0, mode: set},
      {region: [0.0, 0.08, 0.0, 0.08], t_start: 3601, dur: 20, amp: 2.0, mode: set},
      {region: [0.0, 0.08, 0.0, 0.08], t_start: 5401, dur: 20, amp: 2.0, mode: set}]}
  - {op: excitable_nagumo, D: 2.0, a: 0.7, b: 0.8, eps: 0.08}
  - {op: signal_to_mpm_force, theta: 0.0, eta: 0.3}
  - {op: mls_mpm_mechanics, beta: 0.3, k_anchor: 0.03, gamma: 0.5, aniso: 0.85, substeps: 4}
schedule: [trigger_pulse, excitable_nagumo, signal_to_mpm_force, mls_mpm_mechanics]
