general: {name: coupled_sync, step: 2, seed: 0, n_frames: 1080, dt: 0.1, fps: 24, video_fps: 96, video_stride: 1, record_every: 2, n_cycles: 6, cycle_frames: 180}
sets:
  tissue_particle:
    layout: grid
    shape: [137, 137]            # 18769 nodes -- same count as the real microscope_cog data
    pattern_wavelength: 10       # smooth heterogeneity, ~10-node wavelength (breaks symmetry)
    k_lo: 0.6
    k_hi: 1.8
    g_lo: 0.4
    g_hi: 1.6
operators:
  - {op: grid_graph, neighbours: 8}                                   # interconnect signaling nodes
  - {op: pulse_field, period: 180, dur: 6, amp: 2.0, t_start: 1}      # global synchronous stimulus (no wave)
  - {op: excitable_nagumo, D: 2.0, a: 0.7, b: 0.8, eps: 0.3}         # FHN beat + coupling keeps nodes synced
  - {op: signal_to_mpm_force, theta: 0.0, eta: 0.3}
  - {op: mls_mpm_mechanics, beta: 0.4, k_anchor: 0.1, gamma: 0.3, aniso: 0.85, substeps: 4}
schedule: [pulse_field, excitable_nagumo, signal_to_mpm_force, mls_mpm_mechanics]
