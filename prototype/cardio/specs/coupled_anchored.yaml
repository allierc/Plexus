general: {name: coupled_anchored, step: 8, seed: 0, n_frames: 1080, dt: 0.1, fps: 24, video_fps: 96, video_stride: 1, record_every: 2, n_cycles: 6, cycle_frames: 180}
sets:
  tissue_particle:
    layout: grid
    shape: [137, 137]
    boundary_width: 5
    patterns:
      stiffness: {lo: 0.6, hi: 1.8, wavelength: [8, 26], angle: 0.0, phase: 0.7}
      gain:      {lo: 0.4, hi: 1.6, wavelength: [26, 8], angle: 0.0, phase: 0.0}
      fiber:     {mode: smooth, wavelength: 16, angle: 0.6, amp: 3.14159}
operators:
  - {op: grid_graph, neighbours: 8}
  - {op: pulse_field, period: 180, dur: 6, amp: 2.0, t_start: 1}
  - {op: excitable_nagumo, D: 2.0, a: 0.7, b: 0.8, eps: 0.3}
  - {op: signal_to_mpm_force, theta: 0.0, eta: 0.3}
  - {op: mls_mpm_mechanics, beta: 0.4, k_anchor: 0.1, gamma: 0.3, aniso: 0.85, substeps: 4}
  - {op: boundary_data}                          # drive the edge ring with the REAL data (Dirichlet BC)
schedule: [pulse_field, excitable_nagumo, signal_to_mpm_force, mls_mpm_mechanics, boundary_data]
