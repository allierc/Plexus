# B36 STRATEGIC FRAME — TWO PRONGS:
#   (alpha) **ADJUDICATE** the suspected metric-artefact wins
#       (sw 11/sw 15) via stress sweeps + n_final reporting.
#       Sweeps cover substeps x n_frames=1200, youngs x n_frames=1200,
