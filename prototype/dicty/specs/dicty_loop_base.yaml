#     (under-aggregation).** The project's central structural
#     hypothesis ("finite cell volume is the missing mechanism") is
#     FALSIFIED in pilot.
#   - DECISIVE NEGATIVE: cell.youngs across 4 orders of magnitude
#     [1, 1000] AND at the n_frames=1200 stress test (sw 7, sw 15)
#     produces NO morphological change (Est #136 + Est #144). The
#     "structural stiffness is the key Est #82 mitigator" frame
#     from B31 is FALSIFIED. High Young's >= 2000 explodes
#     numerically; not a structural transition.
#   - METHODOLOGICAL: engine outer `dt` is INERT in MPM (sw 10
