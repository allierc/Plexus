# B37 WILL ADD INTER-CELL COHESION IN MPM (deferred from B36
# to keep the infra surface stable while adjudicating B35):
#   - Option A: enable existing `surface_tension` in `mpm.py:194`
#     by adding `is_liquid` mask in `dicty_engine_mpm.build()`
#     (conditional on `cell.types.dicty.liquid: true` flag).
