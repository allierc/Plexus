#   - INFRASTRUCTURE: cell.n upper ceiling ~1600 at per_parent=24
#     (Est #137); particle budget hard-fails at n >= 1800. Joint
#     bound now respected in B36 plan.
#   - SUSPECTED ARTEFACTS: PROJECT-BEST LOSS 1.141 at sw 11
#     substeps=32 AND loss=1.17 at sw 15 youngs=5 (n_frames=1200)
#     are both consistent with PARTICLE DEPLETION (numerical
