#   - DECISIVE NEGATIVE: the MPM engine with the bare {secrete, sense,
#     inflow_mpm, mpm} stack is STRUCTURALLY NON-AGGREGATING at every
#     tested parameter (Est #130). sw 0 (n_frames at MPM base parent)
