# Reconstructed B30/B31 "D=0.0042" parent — the closest-to-real point-cell config the agent found
# (Est #113: first parent in 30 batches to show REAL-like 4-8 dense compact mounds across all seeds).
# Evaluated at n_frames=400 (its multi-mound window; it collapses to a single blob if run much longer
# — Est #82, the headline negative result). sense_sat = Hill-saturated chemotaxis (the one mechanism
# that survived as a regularizer).
name: dicty_good
seed: 0
boundary: periodic
n_frames: 400
record_every: 8
dt: 0.5
vmax: 0.061
sets:
  cell: {n: 1800, buffer: 3000, init_npz: target_density.npz, types: {dicty: {fraction: 1.0}}}
fields:
  camp: {res: 160, diffusion: 0.0042, decay: 0.07, couples_to: cell}
operators:
  - {op: spring,      at: cell, k_rep: 60.0, r0: 0.018, kadh: 10.0, r_on: 0.20, delta: 0.001, mu_f: 0.05}
  - {op: secrete,     at: cell, to: camp,   rate: 11.0}
  - {op: sense_sat,   at: cell, from: camp, gain: 500.0, c_sat: 0.50, sat_n: 2.1}
  - {op: inflow,      at: cell, rate: 4.0}
  - {op: random_walk, at: cell, strength: 0.003}
schedule: [spring, secrete, camp.diffuse, sense_sat, inflow, random_walk, integrate]
