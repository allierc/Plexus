# water_vessel_1: the proper "water takes the shape of the container" test. NOT pre-shaped
# (no block) -- a round BLOB of stiff, near-incompressible water (E=300) is dropped on the
# LEFT and must FLOW to conform to a non-cube container: two chambers of UNEQUAL width joined
# by a gap under a central divider wall (communicating vessels). Correct water should flow
# under the divider and settle to the SAME height in both chambers with a flat surface.
name: water_vessel_1
seed: 0
n_frames: 1000
record_every: 4
boundary: wall
obstacles:
  - [0.58, 0.15, 0.64, 1.00]      # central divider with a gap below y=0.15 (connects the chambers)
sets:
  cell:
    n: 1
    start: [0.28, 0.72, 0.28, 0.72]          # blob dropped on the wide LEFT chamber
    types:
      water: {fraction: 1.0, youngs: 300, layers: [{frac: 1.0, youngs: 300, material: liquid}]}
  particle: {parent: cell, per_parent: 7000, radius: 0.22, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 18, dt_sub: 2.0e-4, a_max: 200, drag: 0.18, wall_damp: 0.5, wall_contact: 0.05}
schedule: [aggregate, gravity, mpm]
