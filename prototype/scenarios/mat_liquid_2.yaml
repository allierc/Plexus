# mat_liquid_2 vs _1: tame the explosive splash. Softer EOS (E 300->100), much more
# viscous (drag 0.05->0.25), energy-absorbing walls (wall_damp 0.7) and a lower drop
# (0.62->0.42) so the water settles into a calm flat pool instead of coating the ceiling.
name: mat_liquid_2
seed: 0
n_frames: 700
record_every: 3
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5, 0.42, 0.5, 0.42]
    types:
      water: {fraction: 1.0, youngs: 100, layers: [{frac: 1.0, youngs: 100, material: liquid}]}
  particle: {parent: cell, per_parent: 4500, radius: 0.20, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 15, dt_sub: 2.0e-4, a_max: 200, drag: 0.25, wall_damp: 0.7}
schedule: [aggregate, gravity, mpm]
