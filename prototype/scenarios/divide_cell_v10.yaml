# v9: the winners combined -- droplet mechanics (cleanest, from v3/v4/v6) + a
# membrane MADE OF PARTICLES (ring rewire + spring lateral, from v8 but on the
# droplet) + a rigid nucleus role + gradual mitosis. No MPM.
name: divide_cell_v10
seed: 0
n_frames: 600
dt: 0.02
record_every: 4
sets:
  cell:     {n: 1, buffer: 16}
  particle:
    parent: cell
    per_parent: 300
    buffer: 4000
    radius: 0.06
    types: {nucleus: {fraction: 0.18}, cyto: {fraction: 0.64}, membrane: {fraction: 0.18}}
fields: {}
operators:
  - {op: cohere, at: particle, k: 0.3,  role: cyto}      # weak: cyto FILLS out to the membrane
  - {op: cohere, at: particle, k: 5.0,  role: nucleus}   # rigid nuclear core
  - {op: repulse, at: particle, r0: 0.013, k: 0.6}       # incompressibility + cross-cell spacing
  - {op: ring,   at: particle, role: membrane}           # rewire: rebuild membrane loop each tick
  - {op: spring, at: particle, k: 2.0, rest: 0.006}      # lateral: membrane hugs the cytoplasm
  - {op: duplicate, at: particle, rate: 6, r0: 0.013}
  - {op: mitosis,   at: cell, ratio: 2.0, frames: 30, elong: 0.16, furrow: 3.5, furrow_w: 0.016, pole: 0.6}
schedule: [aggregate, cohere, repulse, ring, spring, mitosis, integrate, duplicate]
