# mat_liquid_1: a BIG ball of water dropped into the box [0,1]^2 to check it fills the
# container properly (should fall, splash, and settle into a flat-topped pool). Stiffer
# than mat_liquid (E 80->300, less compressible) and NO surface tension so it spreads and
# fills instead of balling up. More substeps (15) for liquid stability; low drag so it flows.
name: mat_liquid_1
seed: 0
n_frames: 700
record_every: 3
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5, 0.62, 0.5, 0.62]
    types:
      water: {fraction: 1.0, youngs: 300, layers: [{frac: 1.0, youngs: 300, material: liquid}]}
  particle: {parent: cell, per_parent: 4500, radius: 0.20, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 15, dt_sub: 2.0e-4, a_max: 200, drag: 0.05, wall_damp: 1.0}
schedule: [aggregate, gravity, mpm]
