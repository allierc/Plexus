name: divide_mpm_v30
seed: 0
n_frames: 760
dt: 0.02
record_every: 5
sets:
  cell: {n: 1, buffer: 8, types: {soft: {fraction: 1.0, youngs: 40}}}
  particle:
    parent: cell
    per_parent: 1000
    buffer: 8000
    radius: 0.09
    density: 1.0
    types:
      nucleus:  {fraction: 0.14, youngs: 320}
      cyto:     {fraction: 0.72, youngs: 30}
      membrane: {fraction: 0.14, youngs: 1000}
fields: {}
operators:
  - {op: skin,    at: particle, nucleus: 0.14, membrane: 0.14}
  - {op: cohere,  at: particle, k: 80.0}
  - {op: tension, at: particle, strength: 360.0, radius: 0.018, nfull: 16}
  - {op: separate, at: particle, r0: 0.018, k: 0.5}
  - {op: tissue,  at: cell, strength: 80.0, radius: 0.22}
  - {op: mitosis, at: cell, ratio: 2.0, frames: 40, elong: 0.5, furrow: 7.0, furrow_w: 0.02, pole: 1.4, round_frames: 10, round_k: 7.0}
  - {op: duplicate, at: particle, rate: 5, r0: 0.011}
  - {op: mpm, at: particle, n_grid: 160, substeps: 14, dt_sub: 2.0e-4, a_max: 500, drag: 3.0, vmax: 5.0}
schedule: [aggregate, skin, cohere, tension, separate, tissue, mitosis, duplicate, mpm]
