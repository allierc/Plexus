name: ob_wedge
seed: 0
n_frames: 1100
record_every: 5
boundary: wall
obstacles:
  - [0.00,0.0,0.20,0.45]
  - [0.20,0.0,0.40,0.35]
  - [0.40,0.0,0.60,0.25]
  - [0.60,0.0,0.80,0.15]
  - [0.80,0.0,1.00,0.06]
sets:
  cell:
    n: 1
    start: [0.2,0.7,0.2,0.7]
    types:
      water: {fraction: 1.0, youngs: 300, layers: [{frac: 1.0, youngs: 300, material: liquid}]}
  particle: {parent: cell, per_parent: 7000, radius: 0.20, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 18, dt_sub: 2.0e-4, a_max: 200, drag: 0.3, wall_damp: 0.5, wall_contact: 0.06, surface_tension: 12}
schedule: [aggregate, gravity, mpm]
