# Two behaviours at once: stiff cells flock (boids), soft cells chemotax-aggregate.
name: mixed
seed: 0
boundary: periodic
n_frames: 250
record_every: 4
sets:
  cell:
    n: 100
    dim: 2
    types: {soft: {fraction: 0.5, youngs: 12}, stiff: {fraction: 0.5, youngs: 300}}
  particle: {parent: cell, per_parent: 100, dim: 2, radius: 0.02, density: 1.0}
fields:
  chemical: {frame: grid, res: 96, diffusion: 0.1, decay: 0.05, couples_to: cell}
operators:
  - {op: motility, at: cell, speed: 20.0, rot: 0.4}
  - {op: boids, at: "cell[type=stiff]", radius: 0.12, cohesion: 0.5, align: 1.0, separate: 0.7}
  - {op: mpm, at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 800, drag: 4, vmax: 6.0}
  - {op: secrete, at: "cell[type=soft]", to: chemical, rate: 1.0}
  - {op: sense, at: "cell[type=soft]", from: chemical, gain: 150.0}
schedule: [aggregate, [motility, boids], secrete, chemical.diffuse, sense, mpm]
