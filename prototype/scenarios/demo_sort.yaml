# Demo 1 -- Cell sorting (differential adhesion).
# Two types start mixed; same-type cohesion (strength>0) plus cross-type repulsion
# (cross<0) segregate them into same-type domains -- Steinberg's DAH.
# Intent check (driver): cross-type neighbour fraction must drop over the run.
name: demo_sort
seed: 0
boundary: periodic
n_frames: 1100
record_every: 4
sets:
  cell:
    n: 120
    types: {red: {fraction: 0.5, youngs: 60}, blue: {fraction: 0.5, youngs: 60}}
  particle: {parent: cell, per_parent: 50, radius: 0.014, density: 1.0}
fields:
  chemical: {frame: grid, res: 96, diffusion: 0.1, decay: 0.05, couples_to: cell}   # unused; engine records one field
operators:
  - {op: motility, at: cell, speed: 6.0, rot: 0.5}               # gentle agitation (lets domains coarsen)
  - {op: adhesion, at: cell, radius: 0.12, strength: 4.0, cross: -3.0}   # strong cohere own, repel other
  - {op: mpm, at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 800, drag: 4, vmax: 6.0}
schedule: [aggregate, [motility, adhesion], mpm]
