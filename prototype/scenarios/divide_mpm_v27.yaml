name: divide_mpm_v27
seed: 0
n_frames: 620
dt: 0.02
record_every: 4
sets:
  cell: {n: 1, buffer: 8, types: {soft: {fraction: 1.0, youngs: 40}}}
  particle:
    parent: cell
    per_parent: 700
    buffer: 6000
    radius: 0.09
    density: 1.0
    types:
      nucleus:  {fraction: 0.14, youngs: 320}
      cyto:     {fraction: 0.72, youngs: 25}
      membrane: {fraction: 0.14, youngs: 800}
fields: {}
operators:
  - {op: skin,    at: particle, nucleus: 0.14, membrane: 0.14}
  - {op: cohere,  at: particle, k: 28.0}                   # within-cell containment -> crisp round body
  - {op: separate, at: particle, r0: 0.022, k: 1.1}        # anti-fusion gap
  - {op: tissue,  at: cell, strength: 90.0, radius: 0.22}  # pack daughters
  - {op: mitosis, at: cell, ratio: 2.0, frames: 36, elong: 0.8, furrow: 7.0, furrow_w: 0.02, pole: 1.5, round_frames: 8, round_k: 6.0}
  - {op: duplicate, at: particle, rate: 7, r0: 0.012}
  - {op: mpm, at: particle, n_grid: 128, substeps: 12, dt_sub: 2.0e-4, a_max: 400, drag: 1.6, vmax: 6.0}
schedule: [aggregate, skin, cohere, separate, tissue, mitosis, duplicate, mpm]
