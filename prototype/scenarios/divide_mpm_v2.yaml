# v2: MPM + cortical surface TENSION to round the cells (v1 was wedge/triangular
# because MPM elastic shape-memory froze the post-division flat cut). `tension`
# pulls boundary particles inward -> minimises perimeter -> round daughters.
name: divide_mpm_v2
seed: 0
n_frames: 520
dt: 0.02
record_every: 4
sets:
  cell:
    n: 1
    buffer: 12
    types: {soft: {fraction: 1.0, youngs: 12}}   # soft -> low shear stiffness, easier to round
  particle: {parent: cell, per_parent: 200, buffer: 2200, radius: 0.06, density: 1.0}
fields: {}
operators:
  - {op: cohere,    at: particle, k: 60.0}                          # light identity
  - {op: tension,   at: particle, strength: 220.0, radius: 0.026, nfull: 12}  # round the cell
  - {op: tissue,    at: cell, strength: 150.0, radius: 0.25}        # hold the colony together
  - {op: duplicate, at: particle, rate: 4, r0: 0.013}
  - {op: divide,    at: cell, ratio: 2.0, push: 0.02}
  - {op: mpm,       at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 800, drag: 2.0, vmax: 6.0}
schedule: [aggregate, cohere, tension, tissue, duplicate, divide, mpm]
