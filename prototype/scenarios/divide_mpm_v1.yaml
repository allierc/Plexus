# Dividing soft cell, MPM version. The soft round cell is a disc of MLS-MPM
# particles (real elastic mechanics via the `mpm` Exchange operator); a light
# `cohere` keeps each cell's particles bound to its own centroid so daughters
# stay DISTINCT (single-material MPM would otherwise merge touching blobs).
# Grows by `duplicate`, splits on doubling via `divide`. Pure spec.
name: divide_mpm_v1
seed: 0
n_frames: 520
dt: 0.02
record_every: 4
sets:
  cell:
    n: 1
    buffer: 12
    types: {soft: {fraction: 1.0, youngs: 13}}   # mpm reads youngs -> mu, la (soft: less shape-memory)
  particle: {parent: cell, per_parent: 200, buffer: 2200, radius: 0.06, density: 1.0}
fields: {}
operators:
  - {op: cohere,    at: particle, k: 320.0}                       # surface-tension-to-centroid -> round cells
  - {op: tissue,    at: cell, strength: 150.0, radius: 0.25}      # inter-cell adhesion -> holds tissue together
  - {op: duplicate, at: particle, rate: 4, r0: 0.013}            # cell grows
  - {op: divide,    at: cell, ratio: 2.0, push: 0.02}            # split once doubled
  - {op: mpm,       at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 800, drag: 2.0, vmax: 6.0}
schedule: [aggregate, cohere, tissue, duplicate, divide, mpm]
