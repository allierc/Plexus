# Unbiased wanderer -- the FIX for the directional bias seen in forage_wander.yaml.
#
# The bias was NOT in any primitive: motility draws a uniform random heading, random_walk
# is zero-mean Gaussian, and `sense` is a generic up-gradient follow with no preferred
# direction in its code. The asymmetry lived in the FIELD `sense` reads: the geodesic
# `food_signal` is a global potential whose gradient points along the maze route to the
# top-right food source. From the central spawn that gradient points DOWN (toward wall-2's
# bottom gap), so even at gain 30 the whole group drifts coherently that way -- a bias
# toward the food, supplied by the data, transmitted by an unbiased operator.
#
# Fix: drop the field-reading `sense` (and the two navigation fields). Now the ONLY drivers
# are motility (isotropic heading) + random_walk (isotropic noise) + MPM contact repulsion,
# none of which encodes a direction -> cells spawned in the open middle scatter in ALL
# directions. Stiff cells (youngs 550) bounce apart instead of clumping. (Trade-off, stated
# honestly: with no gradient there is no forager -- you cannot have an unbiased start AND
# gradient-guided homing from the same operator; the gradient *is* the bias.)
name: forage_wander_unbiased
seed: 0
n_frames: 3600
record_every: 6
obstacles:                       # [x0,y0,x1,y1] in [0,1]  -- identical maze
  - [0.30, 0.00, 0.36, 0.70]     # wall with a gap at the top
  - [0.62, 0.30, 0.68, 1.00]     # wall with a gap at the bottom
sets:
  cell:
    n: 60
    start: [0.42, 0.42, 0.58, 0.58]            # spawn in the OPEN MIDDLE of the maze
    types: {A: {fraction: 0.5, youngs: 550}, B: {fraction: 0.5, youngs: 550}}  # stiff -> don't stick
  particle: {parent: cell, per_parent: 50, radius: 0.012, density: 1.0}
fields:
  scent: {frame: grid, res: 96, diffusion: 0.04, decay: 0.02, couples_to: cell}   # deposited tracks (shown)
operators:
  - {op: motility, at: cell, speed: 75.0, rot: 0.75}                       # isotropic random heading
  - {op: random_walk, at: cell, strength: 80.0}                            # isotropic zero-mean jitter
  - {op: secrete, at: cell, to: scent, rate: 1.0}                          # lay a track so spread is visible
  - {op: mpm, at: particle, n_grid: 128, substeps: 6, dt_sub: 2.0e-4, a_max: 700, drag: 2.0, vmax: 5.0}
schedule: [aggregate, [motility, random_walk], secrete, scent.diffuse, mpm]
