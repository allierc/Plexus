  - [0.16,0.0,0.30,0.34]
  - [0.30,0.0,0.42,0.18]
  - [0.58,0.0,0.70,0.18]
  - [0.70,0.0,0.84,0.34]
  - [0.84,0.0,1.0,0.55]
sets:
