# water_steps_3 vs _2: close the gap/dip where water meets the right wall. More water
# (r 0.22->0.25), longer settle (1300->1700 frames) so the cascade fully levels, and
# MILDER wall friction (wall_damp 0.5->0.65) so the asymmetric drainage doesn't carve a
# dip at the right wall. Last step extended to x=0.84 so the deep right pool is defined.
name: water_steps_3
seed: 0
n_frames: 1700
record_every: 6
boundary: wall
obstacles:
  - [0.00, 0.0, 0.16, 0.34]
  - [0.16, 0.0, 0.32, 0.28]
  - [0.32, 0.0, 0.48, 0.22]
  - [0.48, 0.0, 0.64, 0.16]
  - [0.64, 0.0, 0.80, 0.10]
sets:
  cell:
    n: 1
    start: [0.11, 0.60, 0.11, 0.60]
    types:
      water: {fraction: 1.0, youngs: 300, layers: [{frac: 1.0, youngs: 300, material: liquid}]}
  particle: {parent: cell, per_parent: 8000, radius: 0.25, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 18, dt_sub: 2.0e-4, a_max: 200, drag: 0.35, wall_damp: 0.65, wall_contact: 0.06, surface_tension: 12.0}
schedule: [aggregate, gravity, mpm]
