# mat_liquid_5: water as a pre-filled BLOCK (a pool) sitting at the bottom of the box,
# starting at rest. No drop -> no violent splash -> tests whether a calm pool stays flat
# and jet-free (the dropped-ball tests v1-v4 had wall jets from the impact pressure).
name: mat_liquid_5
seed: 0
n_frames: 500
record_every: 3
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5, 0.2, 0.5, 0.2]
    types:
      water:
        fraction: 1.0
        youngs: 120
        block: [0.04, 0.04, 0.96, 0.34]
        layers: [{frac: 1.0, youngs: 120, material: liquid}]
  particle: {parent: cell, per_parent: 12000, radius: 0.30, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 16, dt_sub: 2.0e-4, a_max: 200, drag: 0.20, wall_damp: 0.6, wall_contact: 0.05}
schedule: [aggregate, gravity, mpm]
