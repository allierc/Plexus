# Scenario 1 -- Race through pillars (porous medium).
# 120 soft cells start at the LEFT and must reach the FINISH line at the right.
# Navigation is a SELF-GENERATED gradient (Tweedy/Insall), NOT a precomputed
# potential: the attractant starts full everywhere, a reservoir at the right edge
# keeps it high there, cells graze (deplete) it and sense up-gradient. Pillars are
# obstacles: one mask is no-flux for the field (attractant routes around them) and
# zero-velocity for MPM (cells must squeeze through the gaps).
# Score (driver): how many of the 120 cross the finish line, and how fast.
name: race_pillars
seed: 0
boundary: wall
n_frames: 1200
record_every: 4
obstacles:                       # staggered pillar array [x0,y0,x1,y1]; start (x<0.14) & finish (x>0.86) clear
  - [0.28, 0.18, 0.34, 0.24]
  - [0.28, 0.40, 0.34, 0.46]
  - [0.28, 0.62, 0.34, 0.68]
  - [0.28, 0.84, 0.34, 0.90]
  - [0.43, 0.08, 0.49, 0.14]
  - [0.43, 0.30, 0.49, 0.36]
  - [0.43, 0.52, 0.49, 0.58]
  - [0.43, 0.74, 0.49, 0.80]
  - [0.43, 0.92, 0.49, 0.98]
  - [0.58, 0.18, 0.64, 0.24]
  - [0.58, 0.40, 0.64, 0.46]
  - [0.58, 0.62, 0.64, 0.68]
  - [0.58, 0.84, 0.64, 0.90]
  - [0.73, 0.30, 0.79, 0.36]
  - [0.73, 0.52, 0.79, 0.58]
  - [0.73, 0.74, 0.79, 0.80]
sets:
  cell:
    n: 120
    start: [0.00, 0.00, 0.12, 1.00]
    types: {A: {fraction: 0.5, youngs: 60}, B: {fraction: 0.5, youngs: 60}}   # soft -> squeeze through
  particle: {parent: cell, per_parent: 40, radius: 0.010, density: 1.0}
fields:
  attractant:
    frame: grid
    res: 128
    diffusion: 0.8
    decay: 0.0
    couples_to: cell
    init: 1.0                       # full everywhere at t=0
    source: [0.92, 0.0, 1.0, 1.0]   # reservoir at the FINISH edge
    source_rate: 0.6
    navigation: dynamic             # self-generated gradient (no precomputed geodesic)
operators:
  - {op: motility, at: cell, speed: 20.0, rot: 0.25}
  - {op: sense,  at: cell, from: attractant, gain: 250.0}     # climb toward the finish reservoir
  - {op: graze,  at: cell, from: attractant, rate: 1.0}       # deplete behind -> sharpen the gradient
  - {op: mpm, at: particle, n_grid: 128, substeps: 6, dt_sub: 2.0e-4, a_max: 800, drag: 2.0, vmax: 5.0}
schedule: [aggregate, [motility, sense], graze, attractant.diffuse, mpm]
