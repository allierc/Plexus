# core_ball_2 vs _1: a BIGGER solid core (frac 0.45 -> 0.70) -> only a thin soft skin
# remains. Hypothesis: with most of the radius rigid, the ball should behave almost
# like a homogeneous stiff ball -- stay round and bounce livelier, with just a thin
# blue rind squashing at the contact patch instead of the whole lower half pancaking.
name: core_ball_2
seed: 0
n_frames: 500
record_every: 2
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5, 0.80, 0.5, 0.80]
    types:
      layered:
        fraction: 1.0
        youngs: 20                       # soft shell (thin rind now)
        core: {youngs: 800, frac: 0.70}  # large stiff core
  particle: {parent: cell, per_parent: 2500, radius: 0.13, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 12, dt_sub: 2.0e-4, a_max: 200, drag: 0.2}
schedule: [aggregate, gravity, mpm]
