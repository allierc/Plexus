# 3-layer ball, LIVELY bounce (membrane test 8). Same materials as layer_ball_1..4
# (small elastic core 300 > soft cushion 25 > variable membrane) but dropped higher with
# LOW drag (0.06) and near-elastic walls (wall_damp 0.95) so it really bounces. Across
# layer_ball_5..8 the membrane youngs sweeps 40/200/600/1000: the question is which skin
# is stiff enough to hold the ball together through a hard, springy bounce (break -> 0%).
name: layer_ball_8
seed: 0
n_frames: 600
record_every: 2
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5, 0.84, 0.5, 0.84]
    types:
      ball:
        fraction: 1.0
        youngs: 25
        layers:
          - {frac: 0.30, youngs: 300}   # core: small, elastic
          - {frac: 0.72, youngs: 25}    # middle: soft cushion
          - {frac: 1.00, youngs: 1000}  # membrane: variable stiffness
  particle: {parent: cell, per_parent: 2500, radius: 0.12, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 12, dt_sub: 2.0e-4, a_max: 200, drag: 0.06, wall_damp: 0.95}
schedule: [aggregate, gravity, mpm]
