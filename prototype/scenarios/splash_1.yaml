# splash_1: a solid elastic BALL dropped into a CUBE OF WATER. Two cells in one box:
#   water  -> a liquid BLOCK pool filling the bottom (block init, starts settled)
#   ball   -> a stiff elastic disc spawned high, falls and plunges into the pool
# Same global particle radius (=ball size) but the water's per-particle volume comes
# from its block area, so densities are consistent. Expect a crown splash on entry,
# the ball plunging then bobbing (neutral buoyancy: ball & water share density).
name: splash_1
seed: 1
n_frames: 800
record_every: 3
boundary: wall
sets:
  cell:
    n: 2
    start: [0.45, 0.82, 0.55, 0.82]            # ball spawns high-centre (water ignores this -> block)
    types:
      water:
        fraction: 0.5
        youngs: 120
        block: [0.03, 0.03, 0.97, 0.32]
        layers: [{frac: 1.0, youngs: 120, material: liquid}]
      ball:
        fraction: 0.5
        youngs: 400
        layers: [{frac: 1.0, youngs: 400, material: elastic}]
  particle: {parent: cell, per_parent: 9000, radius: 0.12, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 16, dt_sub: 2.0e-4, a_max: 200, drag: 0.10, wall_damp: 0.6, wall_contact: 0.05}
schedule: [aggregate, gravity, mpm]
