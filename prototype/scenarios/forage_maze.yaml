# Maze foraging by EXPLORATION + STIGMERGY -- NO geodesic, no precomputed navigation field.
# Cells start at HOME (bottom-left) and must reach FOOD (right band) through a 2-wall maze with
# offset gaps, pick up, and carry back -- using only LOCAL rules:
#   - motility + random_walk : undirected exploration (this alone already threads the gaps),
#   - secrete + trail        : each cell lays a `scent` pheromone and the 3-sensor `trail`
#                              operator steers along the strongest scent -> discovered routes
#                              self-reinforce (Physarum/ant stigmergy), so repeat crossings and
#                              round-trips speed up over time. This is the self-organized
#                              replacement for the removed geodesic gradient.
# Pickup/drop use BAND regions (reachable by a wanderer): food = right band, home = left band.
# Soft cells (youngs 60) squeeze through the narrow gaps. Cells start bottom-left.
# Intent check: H.food_delivered > 0 (round trips completed) and a scent trail spans the maze.
name: forage_maze
seed: 0
n_frames: 5000
record_every: 6
obstacles:                       # [x0,y0,x1,y1] in [0,1]
  - [0.30, 0.00, 0.36, 0.70]     # wall with a gap at the top
  - [0.62, 0.30, 0.68, 1.00]     # wall with a gap at the bottom
sets:
  cell:
    n: 60
    start: [0.02, 0.02, 0.18, 0.18]            # spawn at home (bottom-left)
    types: {A: {fraction: 0.5, youngs: 60}, B: {fraction: 0.5, youngs: 60}}   # soft -> squeeze through gaps
  particle: {parent: cell, per_parent: 50, radius: 0.012, density: 1.0}
fields:
  scent: {frame: grid, res: 96, diffusion: 0.03, decay: 0.025, couples_to: cell}   # pheromone (low diffusion -> sharp trails)
operators:
  - {op: motility, at: cell, speed: 70.0, rot: 0.25}                       # persistent forward drive (low rot -> trail-following coheres)
  - {op: random_walk, at: cell, strength: 60.0}                            # exploration noise (discovers gaps)
  - {op: forage, at: cell, food: [0.70, 0.0, 1.0, 1.0], home: [0.0, 0.0, 0.28, 1.0]}  # band pickup/drop
  - {op: trail, at: cell, from: scent, turn: 0.5, sensor_dist: 0.05, sensor_angle: 0.6} # follow the pheromone ridge (stigmergy)
  - {op: secrete, at: cell, to: scent, rate: 2.0}                          # lay pheromone
  - {op: mpm, at: particle, n_grid: 128, substeps: 6, dt_sub: 2.0e-4, a_max: 700, drag: 2.0, vmax: 5.0}
schedule: [aggregate, forage, [motility, random_walk, trail], secrete, scent.diffuse, mpm]
