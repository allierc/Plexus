# Maze foraging by EXPLORATION + TWO-PHEROMONE STIGMERGY (ant-colony) -- NO geodesic.
# Cells start at HOME (bottom-left), cross a 2-wall maze (offset gaps) to FOOD (right band),
# pick up, carry back. Navigation is fully self-organized from LOCAL rules, scoped by the
# `loaded` state via SELECTORS (the framework's highest-leverage primitive):
#   unloaded (loaded=0): lay  home_scent, follow food_scent   -> explore out / home toward food trail
#   loaded   (loaded=1): lay  food_scent, follow home_scent   -> retrace the home trail back
# Bootstrap: initially food_scent is empty, so unloaded cells just EXPLORE (motility+random_walk
# already thread the gaps) while laying a home trail; the first to reach food becomes loaded and
# follows that home trail back, laying a food trail the others then follow. No precomputed field.
# Soft cells (youngs 60) squeeze the gaps. Intent: H.food_delivered > 0 (round trips complete).
name: forage_maze
seed: 0
n_frames: 8000
record_every: 8
obstacles:                       # [x0,y0,x1,y1] in [0,1]
  - [0.30, 0.00, 0.36, 0.70]     # wall, gap at the top
  - [0.62, 0.30, 0.68, 1.00]     # wall, gap at the bottom
sets:
  cell:
    n: 60
    start: [0.02, 0.02, 0.18, 0.18]            # spawn at home (bottom-left)
    types: {A: {fraction: 0.5, youngs: 60}, B: {fraction: 0.5, youngs: 60}}   # soft -> squeeze through gaps
  particle: {parent: cell, per_parent: 50, radius: 0.012, density: 1.0}
fields:
  food_scent: {frame: grid, res: 96, diffusion: 0.03, decay: 0.02, couples_to: cell}   # laid by loaded -> route to food
  home_scent: {frame: grid, res: 96, diffusion: 0.03, decay: 0.02, couples_to: cell}   # laid by unloaded -> route home
operators:
  - {op: motility, at: cell, speed: 90.0, rot: 0.40}                       # exploration drive
  - {op: random_walk, at: cell, strength: 110.0}                           # exploration noise (discovers gaps, bootstraps)
  - {op: forage, at: cell, food: [0.70, 0.0, 1.0, 1.0], home: [0.0, 0.0, 0.28, 1.0]}   # band pickup/drop
  - {op: trail, at: "cell[loaded=0]", from: food_scent, turn: 0.5, sensor_dist: 0.05, sensor_angle: 0.6}  # seek food trail
  - {op: trail, at: "cell[loaded=1]", from: home_scent, turn: 0.5, sensor_dist: 0.05, sensor_angle: 0.6}  # seek home trail
  - {op: secrete, at: "cell[loaded=0]", to: home_scent, rate: 2.0}         # unloaded lay home trail
  - {op: secrete, at: "cell[loaded=1]", to: food_scent, rate: 2.0}         # loaded lay food trail
  - {op: mpm, at: particle, n_grid: 128, substeps: 6, dt_sub: 2.0e-4, a_max: 700, drag: 2.0, vmax: 5.0}
schedule: [aggregate, forage, [motility, random_walk, trail], secrete, food_scent.diffuse, home_scent.diffuse, mpm]
