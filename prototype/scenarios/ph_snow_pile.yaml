name: ph_snow_pile
seed: 0
n_frames: 800
record_every: 5
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5,0.85,0.5,0.85]
    types:
      snow: {fraction: 1.0, youngs: 250, layers: [{frac: 1.0, youngs: 250, material: snow}]}
  particle: {parent: cell, per_parent: 6000, radius: 0.16, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 18, dt_sub: 2.0e-4, a_max: 200, drag: 0.2, wall_damp: 0.5, wall_contact: 0.06, surface_tension: 0}
schedule: [aggregate, gravity, mpm]
