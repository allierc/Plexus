# CSF validation: a SQUARE blob of water in ZERO gravity. Real surface tension should
# pull the square into a CIRCLE. surf=0 (0 = control: should stay square).
name: csf_test_0
seed: 0
n_frames: 400
record_every: 3
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5, 0.5, 0.5, 0.5]
    types:
      water: {fraction: 1.0, youngs: 200, block: [0.36, 0.36, 0.64, 0.64], layers: [{frac: 1.0, youngs: 200, material: liquid}]}
  particle: {parent: cell, per_parent: 4000, radius: 0.28, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 0.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 14, dt_sub: 2.0e-4, a_max: 200, drag: 0.10, wall_damp: 1.0, surface_tension: 0.0}
schedule: [aggregate, gravity, mpm]
