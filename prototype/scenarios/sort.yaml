# Type-specific adhesion (differential adhesion) -> the two types segregate.
name: sort
seed: 0
boundary: periodic
n_frames: 250
record_every: 4
sets:
  cell:
    n: 100
    dim: 2
    types: {soft: {fraction: 0.5, youngs: 60}, stiff: {fraction: 0.5, youngs: 300}}
  particle: {parent: cell, per_parent: 100, dim: 2, radius: 0.02, density: 1.0}
fields:
  chemical: {frame: grid, res: 96, diffusion: 0.1, decay: 0.05, couples_to: cell}
operators:
  - {op: motility, at: cell, speed: 25.0, rot: 0.4}
  - {op: adhesion, at: cell, radius: 0.12, strength: 1.5}
  - {op: mpm, at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 800, drag: 4, vmax: 6.0}
schedule: [aggregate, [motility, adhesion], mpm]
