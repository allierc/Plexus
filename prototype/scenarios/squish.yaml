# Large, very soft cells dragged together by strong chemotaxis -> visible deformation.
name: squish
seed: 0
n_frames: 250
record_every: 4
sets:
  cell:
    n: 80
    dim: 2
    types: {soft: {fraction: 0.5, youngs: 12}, stiff: {fraction: 0.5, youngs: 300}}
  particle: {parent: cell, per_parent: 200, dim: 2, radius: 0.045, density: 1.0}
fields:
  chemical: {frame: grid, res: 96, diffusion: 0.1, decay: 0.05, couples_to: cell}
operators:
  - {op: motility, at: cell, speed: 20.0, rot: 0.4}
  - {op: boids, at: cell, radius: 0.06, cohesion: 0.05, align: 0.1, separate: 0.4}
  - {op: mpm, at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 1500, drag: 4, vmax: 6.0}
  - {op: secrete, at: "cell[type=soft]", to: chemical, rate: 1.0}
  - {op: sense, at: "cell[type=soft]", from: chemical, gain: 400.0}
schedule: [aggregate, [motility, boids], secrete, chemical.diffuse, sense, mpm]
