sets:
  cell:
    n: 100
    start: [0.00, 0.00, 0.26, 1.00]            # open entry corridor (x < 0.30), clear of walls
    types: {A: {fraction: 0.5, youngs: 60}, B: {fraction: 0.5, youngs: 60}}
  particle: {parent: cell, per_parent: 30, radius: 0.008, density: 1.0}
fields:
  scent: {frame: grid, res: 160, diffusion: 0.05, decay: 0.05, couples_to: cell}                                          # SHOWN: faint deposited trail
  nav:   {frame: grid, res: 160, diffusion: 1.0, source: [3.78, 0.0, 4.0, 1.0], navigation: geodesic, couples_to: cell}   # HIDDEN: navigation to the exit
operators:
  - {op: motility, at: "cell[done=0]", speed: 45.0, rot: 0.30}
  - {op: random_walk, at: "cell[done=0]", strength: 25.0}
  - {op: sense,  at: "cell[done=0]", from: nav, gain: 220.0}     # navigate the maze to the exit
  - {op: boids,  at: "cell[done=0]", radius: 0.05, cohesion: 0.02, align: 0.05, separate: 0.6}  # flock + anti-jam
  - {op: secrete, at: "cell[done=0]", to: scent, rate: 0.5}      # lay a faint visible trail
  - {op: mpm, at: particle, n_grid: 160, substeps: 6, dt_sub: 2.0e-4, a_max: 800, drag: 2.0, vmax: 8.0}
  - {op: death, at: cell, x: 3.92}                               # exit: cells disappear at the line (sink) + counter
schedule: [aggregate, [motility, random_walk, sense, boids], secrete, scent.diffuse, mpm, death]
