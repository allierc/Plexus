# Scenario 2b -- Race through a HARD maze (long dead end).
# Identical cells and self-generated-gradient navigation as the easy maze, but a
# long dead-end pocket (the horizontal stub) holds enough attractant to look like a
# through-route, so cells are tempted in and waste time -- the Tweedy & Insall
# failure mode (hard mazes with long dead ends fool the self-generated gradient).
# The honest finding is the easy-vs-hard CONTRAST under the same parameters.
# Score (driver): arrivals/speed; expect markedly fewer/slower than the easy maze.
name: race_maze_hard
seed: 0
boundary: wall
n_frames: 2400
record_every: 8
obstacles:                       # BFS-verified solvable (path len ~162 vs easy ~shorter)
  - [0.30, 0.00, 0.35, 0.65]     # wall A, gap TOP (y > 0.65)
  - [0.60, 0.35, 0.65, 1.00]     # wall B, gap BOTTOM (y < 0.35)
  - [0.44, 0.18, 0.49, 1.00]     # long finger from the top -> a deep dead-end pocket on its left;
                                 # cells entering A's top gap are tempted UP into the pocket and must
                                 # instead descend the whole left wall to round the finger (the detour)
sets:
  cell:
    n: 120
    start: [0.00, 0.00, 0.10, 1.00]
    types: {A: {fraction: 0.5, youngs: 60}, B: {fraction: 0.5, youngs: 60}}
  particle: {parent: cell, per_parent: 40, radius: 0.010, density: 1.0}
fields:
  attractant:
    frame: grid
    res: 128
    diffusion: 1.0
    decay: 0.0
    couples_to: cell
    init: 1.0
    source: [0.90, 0.0, 1.0, 1.0]
    source_rate: 0.6
    navigation: dynamic
operators:
  - {op: motility, at: cell, speed: 16.0, rot: 0.20}
  - {op: sense,  at: cell, from: attractant, gain: 300.0}
  - {op: graze,  at: cell, from: attractant, rate: 1.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 6, dt_sub: 2.0e-4, a_max: 800, drag: 2.0, vmax: 5.0}
schedule: [aggregate, [motility, sense], graze, attractant.diffuse, mpm]
