# v6: cells with internal STRUCTURE -- a rigid nucleus + a membrane ring.
# particles carry a role (cytoplasm / nucleus); `nucleus` binds the nuclear
# particles into a stiff central core; `tension` defines a crisp membrane that
# the render draws as a ring. Round droplet mechanics + gradual mitosis as v4.
name: divide_cell_v6
seed: 0
n_frames: 600
dt: 0.02
record_every: 4
sets:
  cell:
    n: 1
    buffer: 16
  particle:
    parent: cell
    per_parent: 240
    buffer: 3200
    radius: 0.06
    types: {cyto: {fraction: 0.72}, nucleus: {fraction: 0.28}}
fields: {}
operators:
  - {op: cohere,    at: particle, k: 0.9}                 # cytosol cohesion -> round
  - {op: cohere,    at: particle, k: 6.0, role: nucleus}  # rigid nucleus (cohere scoped to the sub-set)
  - {op: repulse,   at: particle, r0: 0.013, k: 0.6}      # incompressibility
  - {op: tension,   at: particle, strength: 4.0, radius: 0.026, nfull: 12}  # crisp membrane
  - {op: duplicate, at: particle, rate: 5, r0: 0.013}     # grow
  - {op: mitosis,   at: cell, ratio: 2.0, frames: 24, elong: 0.18, furrow: 3.5, furrow_w: 0.018}
schedule: [aggregate, cohere, repulse, tension, mitosis, integrate, duplicate]
