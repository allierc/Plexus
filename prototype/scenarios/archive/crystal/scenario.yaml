# Pure repulsion (boids separation only) + motility -> cells space out into a lattice.
name: crystal
seed: 0
n_frames: 250
record_every: 4
sets:
  cell:
    n: 100
    dim: 2
    types: {soft: {fraction: 0.5, youngs: 12}, stiff: {fraction: 0.5, youngs: 300}}
  particle: {parent: cell, per_parent: 100, dim: 2, radius: 0.02, density: 1.0}
fields:
  chemical: {frame: grid, res: 96, diffusion: 0.1, decay: 0.05, couples_to: cell}
operators:
  - {op: motility, at: cell, speed: 30.0, rot: 0.4}
  - {op: boids, at: cell, radius: 0.12, cohesion: 0.0, align: 0.0, separate: 2.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 800, drag: 4}
schedule: [aggregate, [motility, boids], mpm]
