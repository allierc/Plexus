# layer_ball_9: the GREEN middle layer is now WATER (liquid material), held between an
# elastic core and an elastic membrane. Ports the liquid model from MPM_pytorch
# (T==0): mu=0 (no shear stress, pressure only) + F reset to sqrt(J)*I each substep
# (no shape memory -> it flows/sloshes). Compare against layer_ball_7 (identical but the
# middle is elastic): the water should slosh inside the membrane instead of springing.
name: layer_ball_9
seed: 0
n_frames: 600
record_every: 2
boundary: wall
sets:
  cell:
    n: 1
    start: [0.5, 0.84, 0.5, 0.84]
    types:
      ball:
        fraction: 1.0
        youngs: 25
        layers:
          - {frac: 0.30, youngs: 300}                      # core: elastic
          - {frac: 0.72, youngs: 60, material: liquid}     # middle: WATER
          - {frac: 1.00, youngs: 600}                      # membrane: stiff, contains the water
  particle: {parent: cell, per_parent: 2500, radius: 0.12, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: gravity, at: cell, g: 12.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 12, dt_sub: 2.0e-4, a_max: 200, drag: 0.06, wall_damp: 0.95}
schedule: [aggregate, gravity, mpm]
