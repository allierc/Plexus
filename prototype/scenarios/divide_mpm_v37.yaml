  - {op: separate, at: particle, r0: 0.013, k: 0.3}
  - {op: tissue,  at: cell, strength: 45.0, radius: 0.18}
  - {op: mitosis, at: cell, ratio: 2.0, size: 900.0, frames: 34, elong: 0.45, furrow: 6.0, furrow_w: 0.016, pole: 1.3, round_frames: 8, round_k: 6.0}
  - {op: duplicate, at: particle, rate: 16, r0: 0.009}
  - {op: mpm, at: particle, n_grid: 160, substeps: 12, dt_sub: 2.0e-4, a_max: 400, drag: 2.6, vmax: 6.0, surface_tension: 120}
