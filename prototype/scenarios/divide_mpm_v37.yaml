    parent: cell
    per_parent: 600
    buffer: 4200
    radius: 0.08
    density: 1.0
    types:
      nucleus:  {fraction: 0.16, youngs: 120}
      cyto:     {fraction: 0.68, youngs: 8}
      membrane: {fraction: 0.16, youngs: 650}
fields: {}
operators:
