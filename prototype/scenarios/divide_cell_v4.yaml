# v4: round droplet cells + GRADUAL mitosis (elongate + cleavage furrow, then
# split) for realistic division dynamics, instead of the instant `divide`.
name: divide_cell_v4
seed: 0
n_frames: 560
dt: 0.02
record_every: 4
sets:
  cell:     {n: 1, buffer: 12}
  particle: {parent: cell, per_parent: 200, buffer: 2200, radius: 0.06}
fields: {}
operators:
  - {op: cohere,    at: particle, k: 0.9}                 # surface-tension-to-centroid -> round
  - {op: repulse,   at: particle, r0: 0.013, k: 0.6}      # incompressibility
  - {op: duplicate, at: particle, rate: 4, r0: 0.013}     # grow
  - {op: mitosis,   at: cell, ratio: 2.0, frames: 24, elong: 0.18, furrow: 3.5, furrow_w: 0.018}
schedule: [aggregate, cohere, repulse, mitosis, integrate, duplicate]
