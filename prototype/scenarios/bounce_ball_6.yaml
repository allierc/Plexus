# v6 vs v5: same idea (central, random directions, stiff, gravity) but the balls are
# SPACED SO THEY DO NOT OVERLAP AT SPAWN. v5's 9 balls of r=0.05 packed into a 0.2x0.2
# box were co-located, so MPM fused them into a single blob that drifted as one --
# stiffness can't separate material that starts overlapping. Hypothesis for v6: with
# fewer, smaller balls (r=0.035) scattered over a wider central box (0.4x0.3), they
# start as distinct bodies; the random heading then fans them out and, being stiff,
# they bounce off each other and the floor as separate balls instead of merging.
name: bounce_ball_6
seed: 0
n_frames: 500
record_every: 2
boundary: wall
sets:
  cell:
    n: 5
    start: [0.30, 0.40, 0.70, 0.70]    # wider central zone -> room to not overlap
    types: {stiff: {fraction: 1.0, youngs: 600}}
  particle: {parent: cell, per_parent: 600, radius: 0.035, density: 1.0}
fields:
  chemical: {frame: grid, res: 64, diffusion: 0.1, decay: 0.0, couples_to: cell}
operators:
  - {op: motility, at: cell, speed: 60.0, rot: 0.02}   # stronger random fan-out
  - {op: gravity, at: cell, g: 10.0}
  - {op: mpm, at: particle, n_grid: 128, substeps: 12, dt_sub: 2.0e-4, a_max: 200, drag: 0.1}
schedule: [aggregate, motility, gravity, mpm]
