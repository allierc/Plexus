# B / v21: a single 3-layer cell as a UNIFIED MPM body that GROWS (no division ->
# no fusion). Layer-ball materials: elastic nucleus core, soft cytoplasm, stiff
# membrane skin. `skin` re-tags + re-stiffens the layers by radius each tick so
# they track growth. This is the regime where MPM shines.
name: divide_mpm_v21
seed: 0
n_frames: 500
dt: 0.02
record_every: 4
sets:
  cell:
    n: 1
    buffer: 2
    types: {soft: {fraction: 1.0, youngs: 40}}
  particle:
    parent: cell
    per_parent: 1200
    buffer: 5200
    radius: 0.10
    density: 1.0
    types:
      nucleus:  {fraction: 0.22, youngs: 300}
      cyto:     {fraction: 0.53, youngs: 25}
      membrane: {fraction: 0.25, youngs: 800}
fields: {}
operators:
  - {op: skin, at: particle, nucleus: 0.22, membrane: 0.25}
  - {op: duplicate, at: particle, rate: 8, r0: 0.012}
  - {op: mpm, at: particle, n_grid: 128, substeps: 12, dt_sub: 2.0e-4, a_max: 200, drag: 0.6, vmax: 5.0}
schedule: [aggregate, skin, duplicate, mpm]
