general:
  name: unknown_iter01
  seed: 0
  n_frames: 500
  dt: 1.0
  boundary: wall
sets:
  cell:
    n: 9
    start:
    - - 0.21
      - 0.87
    - - 0.45
      - 0.87
    - - 0.69
      - 0.87
    - - 0.21
      - 0.62
    - - 0.45
      - 0.62
    - - 0.69
      - 0.62
    - - 0.21
      - 0.38
    - - 0.45
      - 0.38
    - - 0.69
      - 0.38
    types:
      water:
        fraction: 0.3334
        youngs: 200
        layers:
        - frac: 1.0
          youngs: 200
          material: liquid
      jelly:
        fraction: 0.3333
        youngs: 90.0
        layers:
        - frac: 1.0
          youngs: 90.0
          material: elastic
      snow:
        fraction: 0.3333
        youngs: 120.0
        layers:
        - frac: 1.0
          youngs: 120.0
          material: snow
  mpm_particle:
    parent: cell
    per_parent: 900
    radius: 0.065
    density: 1.0
fields:
  mpm_grid:
    frame: mpm_grid
    n_grid: 128
operators:
- op: aggregate
  at: cell
- op: gravity
  at: cell
  g: 9.0
- op: mpm_strain
  at: mpm_particle
  dt_sub: 0.0002
- op: p2g
  at: mpm_particle
  to: mpm_grid
  dt_sub: 0.0002
  drag: 0.3
  a_max: 200
- op: mpm_grid_update
  at: mpm_grid
  dt_sub: 0.0002
  surface_tension: 8.0
  wall_damp: 0.5
  wall_contact: 0.06
- op: g2p
  at: mpm_particle
  from: mpm_grid
  dt_sub: 0.0002
  wall_damp: 0.5
  wall_contact: 0.06
  vmax: 1000000000.0
schedule:
- aggregate
- gravity
- substep: 18
  dt: 0.0002
  steps:
  - mpm_strain
  - p2g
  - mpm_grid_update
  - g2p
plotting:
  background: black
