# ant_islands -- ant colony (Lague Ant-Simulation) over the Plexus registry; only spec params differ.
name: ant_islands
seed: 1
boundary: wall
n_frames: 2600
record_every: 8
obstacles:
  - [0.5, 0.78, 0.07]
  - [0.78, 0.5, 0.07]
  - [0.22, 0.5, 0.07]
  - [0.5, 0.22, 0.07]
sets:
  cell:
    n: 200
    start: [0.42,0.42,0.58,0.58]
    types: {ant: {fraction: 1.0, youngs: 120}}
  particle: {parent: cell, per_parent: 20, radius: 0.010, density: 1.0}
fields:
  food_pher: {frame: grid, res: 140, diffusion: 0.02, decay: 0.02, couples_to: cell}
  home_pher: {frame: grid, res: 140, diffusion: 0.02, decay: 0.02, couples_to: cell}
operators:
  - {op: motility, at: cell, speed: 260.0, rot: 0.12}
  - {op: colony, at: cell, home: [0.5, 0.5, 0.055], food: [[0.85, 0.85, 0.05], [0.15, 0.85, 0.05], [0.85, 0.15, 0.05], [0.15, 0.15, 0.05]], perception: 0.09, turn_noise: 0.5, food_stock: 0.0}
  - {op: trail,   at: "cell[loaded=0]", from: food_pher, turn: 0.45, sensor_dist: 0.05, sensor_angle: 0.6}
  - {op: trail,   at: "cell[loaded=1]", from: home_pher, turn: 0.45, sensor_dist: 0.05, sensor_angle: 0.6}
  - {op: secrete, at: "cell[loaded=0]", to: home_pher, rate: 4.0, runout: 400}
  - {op: secrete, at: "cell[loaded=1]", to: food_pher, rate: 4.0, runout: 400}
  - {op: mpm, at: particle, n_grid: 128, substeps: 8, dt_sub: 2.0e-4, a_max: 1200, drag: 0.6, vmax: 6.0}
schedule: [aggregate, trail, colony, motility, secrete, food_pher.diffuse, home_pher.diffuse, mpm]
